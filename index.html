const TOPICS = [{
  id: 1,
  title: "הגדרה של למידה",
  icon: "🧠",
  color: "#8b5cf6",
  colorLight: "rgba(139,92,246,0.12)",
  sections: [{
    title: "מהי למידה?",
    content: "למידה היא ענף בפסיכולוגיה שעוסק בשאלה כיצד אנו יודעים דברים וכיצד אנו רוכשים ידע. תחום זה נקרא 'אפיסטמולוגיה' (התאוריה של הידע). הפילוסופים הראשונים עסקו בכך, ובעקבותיהם התחילה הפסיכולוגיה האקספרימנטלית (ניסיונית) שהייתה דומיננטית לקראת תחילת המאה ה-20.",
    concepts: [{
      name: "אריק קנדל ופרס נובל",
      definition: "הנוירופסיכיאטר אריק קנדל קיבל פרס נובל בשנת 2000 על תיאור ברמה המולקולרית כיצד מתבטאים זיכרון בטווח קצר וארוך.",
      example: "קנדל חקר את הרפלקס של שבלול ים (אפליזיה) — כל ידע נרכש חייב להיות מקודד ומיוצג במוח.",
      tip: "המשפט המרכזי של קנדל: 'אנחנו מה שאנחנו בגלל מה שאנחנו לומדים ומה שאנחנו זוכרים'."
    }, {
      name: "למידה באפליזיה",
      definition: "למידה מוכחת שידע נלמד מקודד ומיוצג במוח. אמנזיה אנטרוגרדית מוכיחה שלא ניתן ליצור זיכרונות חדשים מהרגע שאחרי הטראומה המוחית.",
      example: "קלייב וירינג (Clive Wearing) — לקה גם באמנזיה אנטרוגרדית וגם ברטרוגרדית-הדרגתית. הוא זכר את אשתו אך לא את ילדיו.",
      tip: "אמנזיה רטרוגרדית = אין יכולת לזכור אירועים שקרו לפני הטראומה. אנטרוגרדית = אין יכולת ליצור זיכרונות חדשים."
    }, {
      name: "סוגי זיכרון",

{id:20,topic:5,difficulty:"קשה",text:"מדוע התנהגויות שחוזקו באופן חלקי קשות יותר להכחדה?",options:["כי הן חזקות יותר מלכתחילה","כי הנבדק לא יכול להבחין מתי החיזוק הופסק — כי ממילא לא היה עקבי","כי הן מבוססות על אינסטינקט","כי הן לא מותנות"],correct:1,explanation:"בחיזוק חלקי, הנבדק <b>לא יכול לצפות</b> את ההתנהגות של ההורה. כי בחיים, רוב החיזוקים הם חלקיים — הילד לא יכול לצפות אם ההורה ייכנע או לא, ולכן <b>יתמיד בהתנהגות זמן ממושך ובעוצמה גבוהה</b> עד שהיא תכחד."},

// ===== נושא 6: התניה אופרנטית =====
{id:21,topic:6,difficulty:"קלה",text:"מהו חיזוק שלילי?",options:["ענישה","הסרת גירוי לא נעים כתוצאה מהתנהגות — מה שמגביר את ההתנהגות","הפסקת חיזוק חיובי","חיזוק שגורם לירידה בהתנהגות"],correct:1,explanation:"<b>חיזוק שלילי</b> = <b>הסרה</b> של גירוי לא נעים כתוצאה מהתנהגות, מה ש<b>מגביר</b> את ההתנהגות. חשוב: חיזוק שלילי הוא <b>לא עונש</b> — הוא מגביר התנהגות (בדיוק כמו חיזוק חיובי)."},
{id:22,topic:6,difficulty:"בינונית",text:"מהו עיקרון פרימאק?",options:["חיזוק תמיד עדיף על ענישה","פעילות מועדפת יכולה לחזק פעילות פחות מועדפת","ענישה יעילה יותר מחיזוק","למידה דורשת תמיד חיזוק חומרי"],correct:1,explanation:"<b>עיקרון פרימאק</b>: פעילות מועדפת (<b>high-probability behavior</b>) יכולה לשמש כחיזוק עבור פעילות פחות מועדפת. דוגמה: 'אם תגמור שיעורי בית (פחות מועדף) → תקבל לשחק (מועדף)'."},
{id:23,topic:6,difficulty:"קשה",text:"איזה לוח חיזוק מייצר את קצב התגובה הגבוה ביותר ואת העמידות הגבוהה ביותר בפני הכחדה?",options:["יחס קבוע (FR)","יחס משתנה (VR)","מרווח קבוע (FI)","מרווח משתנה (VI)"],correct:1,explanation:"<b>לוח יחס משתנה (VR)</b> מייצר את קצב התגובה <b>הגבוה ביותר</b> ואת העמידות <b>הגבוהה ביותר</b> בפני הכחדה. זו הסיבה שהימורים (מכונת מזל) כל כך ממכרים — לא יודעים מתי יגיע החיזוק הבא."},
{id:24,topic:6,difficulty:"בינונית",text:"מהו ההבדל בין עונש חיובי לעונש שלילי?",options:["אין הבדל","עונש חיובי = הוספת גירוי אוורסיבי; עונש שלילי = הסרת גירוי חיובי","עונש חיובי = שבח; עונש שלילי = נזיפה","עונש חיובי מגביר התנהגות; עונש שלילי מפחית"],correct:1,explanation:"<b>עונש חיובי</b> = הוספת גירוי לא נעים (נזיפה, מכה). <b>עונש שלילי</b> = הסרת גירוי חיובי (לקיחת טלוויזיה, חרמה מפעילות). שניהם <b>מפחיתים</b> התנהגות."},
{id:25,topic:6,difficulty:"קלה",text:"כלכלת אסימונים מבוססת על:",options:["חיזוק ראשוני","חיזוק משני","ענישה","הכחדה"],correct:1,explanation:"<b>כלכלת אסימונים</b> מבוססת על <b>חיזוק משני</b> — אסימונים שאין להם ערך כשלעצמם אבל ניתן להמיר אותם לחיזוק ראשוני (אוכל, פעילויות). גם שימפנזים למדו להשתמש באסימונים."},

// ===== נושא 7: למידה רגשית =====
{id:26,topic:7,difficulty:"קלה",text:"חוק ירקס-דודסון מתאר:",options:["הקשר בין חיזוק לעונש","הקשר בין רמת עוררות רגשית לביצוע — עקומה הפוכה בצורת U","ההבדל בין התניה קלאסית לאופרנטית","עקרונות ההכחדה"],correct:1,explanation:"<b>חוק ירקס-דודסון</b>: רמת עוררות רגשית אופטימלית מובילה לביצוע מיטבי. <b>יותר מדי</b> עוררות (סטרס) או <b>מעט מדי</b> (אדישות) — פוגעים בביצוע. עקומה בצורת U הפוך."},
{id:27,topic:7,difficulty:"בינונית",text:"מהו אפקט פוקוס הנשק (Weapon Focus Effect)?",options:["נטייה לזכור נשק בצורה טובה יותר מפנים","בסיטואציה רגשית הקשב מתמקד בגירוי הרגשי (נשק) על חשבון פרטים אחרים (פנים)","הנשק גורם לשכחה מוחלטת","הנשק משפר את הזיכרון לכל הפרטים"],correct:1,explanation:"<b>אפקט פוקוס הנשק</b>: ברמת עוררות גבוהה, הקשב <b>מצטמצם</b> ומתמקד בגירוי הרגשי (הנשק) — על חשבון פרטים פריפריאליים (פנים השודד). זה קשור להיפותזת Narrowing of Attention של אייסטרברוק."},
{id:28,topic:7,difficulty:"קשה",text:"מה הראה ניסוי בוקאנאן ולובאלו (2001) על קורטיזול וזיכרון?",options:["קורטיזול פוגע בכל סוגי הזיכרון","קורטיזול משפר קידוד זיכרון רגשי אבל פוגע בקידוד מידע ניטרלי","קורטיזול לא משפיע על זיכרון","קורטיזול משפר רק זיכרון סמנטי"],correct:1,explanation:"<b>בוקאנאן ולובאלו</b> הראו שלקורטיזול (הורמון סטרס) יש <b>השפעה חיובית על קידוד זיכרון רגשי</b> — קבוצת הקורטיזול זכרה יותר טוב את התמונות הרגשיות. אבל אין הבדל בזיכרון לגירויים ניטרליים."},
{id:29,topic:7,difficulty:"בינונית",text:"ניסוי כריסטיאנסון ולופטוס (1991) הראה ש:",options:["זיכרון רגשי תמיד מדויק","בסיטואציה רגשית הזיכרון לעיקר (gist) מוגבר אך הזיכרון לפרטים פריפריאליים נפגע","רגשות לא משפיעים על זיכרון","שינון חוזר מסביר את הזיכרון הרגשי"],correct:1,explanation:"<b>כריסטיאנסון ולופטוס</b>: הרגש <b>ממקד ומגביר</b> את הקשב והזיכרון <b>לעיקר (gist)</b> של האירוע, אך <b>מפחית</b> את הזיכרון לפרטים <b>פריפריאליים</b>. מסקנה: הפנייה קצרה רגשית משפיעה על איכות הקידוד."},

// ===== נושא 8: למידת שפה בבע"ח =====
{id:30,topic:8,difficulty:"קלה",text:"מי לימד את השימפנזה וואשו שפת סימנים?",options:["פבלוב","גרדנר (Gardner)","סקינר","לורנץ"],correct:1,explanation:"<b>גרדנר</b> (1966) לימד את השימפנזה <b>וואשו</b> שפת סימנים אמריקאית (ASL). וואשו למדה כ-350 סימנים והצליחה גם ללמד שימפנזים אחרים."},
{id:31,topic:8,difficulty:"בינונית",text:"מה הייתה הביקורת העיקרית של טראס (Terrace) על מחקרי שפה בשימפנזים?",options:["השימפנזים לא למדו כלום","השימוש בשפה היה תוצאה של חיקוי וחיזוק, לא הבנה אמיתית של שפה","השימפנזים למדו שפה מושלמת","הניסויים היו לא אתיים"],correct:1,explanation:"<b>טראס</b> מצא 4 בעיות: 1) לא נוצרו משפטים מורכבים 2) התגובות היו תוצאה של <b>חיקוי</b> 3) סדר המילים היה <b>אקראי</b> 4) לא הייתה <b>תקשורת ספונטנית</b>. טראס טען שזו התניה אופרנטית ולא שימוש אמיתי בשפה."},
{id:32,topic:8,difficulty:"קשה",text:"מהי עמדת פינקר וצ'ומסקי לגבי שפה?",options:["כל בעלי חיים יכולים ללמוד שפה","שפה היא מיומנות אנושית ייחודית המתבססת על מבנים מוחיים מולדים","שפה נלמדת רק על ידי התניה","שימפנזים ובני אדם משתמשים בשפה באופן זהה"],correct:1,explanation:"<b>פינקר וצ'ומסקי</b> טענו שהשפה היא <b>מיומנות אנושית ייחודית</b> שדומה לאינסטינקט, המתבססת על <b>מבנים מוחיים מולדים</b> (grammar universals). בני אדם רוכשים שפה במהירות מדהימה — מה שלא קורה אצל קופים."},
{id:33,topic:8,difficulty:"בינונית",text:"מה ייחודי במחקר של קנזי הבונובו?",options:["הוא לימד קנזי באמצעות ענישה","קנזי למד מצפייה מקרית באמו ולא מהוראה ישירה","קנזי למד רק 10 מילים","קנזי סירב להשתמש בשפה"],correct:1,explanation:"<b>קנזי</b> (בונובו) למד <b>מצפייה מקרית</b> באמו ומסרטים — הוא הפגין <b>תקשורת ספונטנית</b>, בניגוד למחקרים קודמים שהתבססו על חיזוק ישיר. קנזי למד לקסיגרמה (סמלים על מסך מחשב)."},

// ===== נושא 9: הביטואציה וסנסיטיזציה =====
{id:34,topic:9,difficulty:"קלה",text:"מהי הביטואציה?",options:["עלייה בתגובה לגירוי חוזר","ירידה בתגובה לגירוי חוזר ונשנה","למידה של התנהגות חדשה","שכחה של מידע ישן"],correct:1,explanation:"<b>הביטואציה</b> היא <b>ירידה בתגובה</b> כתוצאה מהצגה חוזרת ונשנית של גירוי. היא <b>זמנית</b> — עם הפסקה מחודשת תגיע החלמה ספונטנית. היא למידה לא-אסוציאטיבית."},
{id:35,topic:9,difficulty:"בינונית",text:"מה ההבדל בין הביטואציה לבין עייפות שרירים או אדפטציה סנסורית?",options:["אין הבדל","הביטואציה לא מתרחשת בעקבות מנוחה גופנית — ודיס-הביטואציה מוכיחה שזו למידה","הביטואציה קיימת רק אצל בני אדם","הביטואציה דורשת חיזוק"],correct:1,explanation:"דיס-הביטואציה (חידוש התגובה על ידי גירוי חדש <b>ללא מנוחה</b>) מוכיחה שהביטואציה היא <b>למידה</b> ולא עייפות פיזית. אם הייתה עייפות — גירוי חדש לא היה מחדש את התגובה."},
{id:36,topic:9,difficulty:"קשה",text:"מהו מודל התהליך הכפול (Dual Process)?",options:["הביטואציה וסנסיטיזציה פועלות בנפרד","הביטואציה וסנסיטיזציה פועלות במקביל — התגובה הסופית היא שקלול של שניהם","רק הביטואציה קיימת","רק סנסיטיזציה קיימת"],correct:1,explanation:"<b>מודל תהליך כפול</b>: הביטואציה וסנסיטיזציה פועלות <b>במקביל</b>. התגובה הסופית היא <b>שקלול</b> של שני התהליכים. גירוי חלש → הביטואציה דומיננטית. גירוי חזק → סנסיטיזציה דומיננטית."},
{id:37,topic:9,difficulty:"בינונית",text:"מהו אפקט קולידג' (Coolidge Effect)?",options:["הביטואציה לגירויים חזקים","הביטואציה לפרטנר מוכר ודיס-הביטואציה לפרטנר חדש","סנסיטיזציה לכל גירוי","חיזוק משתנה"],correct:1,explanation:"<b>אפקט קולידג'</b>: חולדות זכרים הראו <b>הביטואציה</b> לפרטנרית מוכרת (ירידה ביחסי מין) אך <b>דיס-הביטואציה</b> — חידוש התגובה — לפרטנרית חדשה. קיים גם אצל בני אדם (גברים)."},
{id:38,topic:9,difficulty:"קלה",text:"סבילות (tolerance) לסם היא דוגמה ל:",options:["סנסיטיזציה","התניה קלאסית","הביטואציה","חיזוק חיובי"],correct:2,explanation:"<b>סבילות (tolerance)</b> = ירידה ביעילות הסם עם חשיפה חוזרת — דוגמה ל<b>הביטואציה</b>. לעומת זאת, <b>קוקאין</b> מדגים סנסיטיזציה — האפקט מתגבר עם שימוש חוזר."},

// ===== נושא 10: אינטליגנציה בפרימאטים =====
{id:39,topic:10,difficulty:"קלה",text:"מהם קופי אדם (Apes)?",options:["כל הקופים","פרימאטים הדומים אנטומית לבני אדם — שימפנזים, גורילות, אורנגאוטנים, בונובוס","רק שימפנזים","רק גורילות"],correct:1,explanation:"<b>קופי אדם (Great Apes)</b> כוללים שימפנזים, בונובוס, גורילות ואורנגאוטנים. הם דומים אנטומית לבני אדם (99% דמיון גנטי בשימפנזים), משתמשים בכלים, ויש להם חיי חברה מורכבים."},
{id:40,topic:10,difficulty:"בינונית",text:"מה מדגים מבחן ה-Red Mark לגבי שימפנזים?",options:["יכולת זיכרון","מודעות עצמית — זיהוי סימן על הפנים במראה","יכולת למידה","יכולת שימוש בכלים"],correct:1,explanation:"<b>מבחן Red Mark</b> (גאלופ, הייס): שימפנזים שרואים סימן אדום על פניהם במראה — <b>נוגעים בסימן</b>, מה שמעיד על <b>מודעות עצמית (self-recognition)</b>. לא כל בעלי החיים עוברים מבחן זה."},

// ===== שאלות נוספות מעורבות =====
{id:41,topic:4,difficulty:"בינונית",text:"בניסוי אלברט הקטן, מהו ה-UCS?",options:["העכבר הלבן","הרעש החזק","הבכי של אלברט","המסכה"],correct:1,explanation:"ב-ניסוי אלברט הקטן: <b>UCS = רעש חזק</b> (פטיש על פס מתכת) → UCR = בכי/בהלה. CS = עכבר לבן → CR = בכי/פחד. העכבר (CS) זווג עם הרעש (UCS)."},
{id:42,topic:6,difficulty:"בינונית",text:"מהו ההבדל בין חיזוק ראשוני לחיזוק משני?",options:["אין הבדל","חיזוק ראשוני = גירויים שעונים על צורך בסיסי; חיזוק משני = גירוי שזווג עם חיזוק ראשוני","חיזוק ראשוני = כסף; חיזוק משני = אוכל","חיזוק ראשוני חזק יותר תמיד"],correct:1,explanation:"<b>חיזוק ראשוני</b>: גירויים שעונים על <b>צורך בסיסי</b> (אוכל, מים, שינה) — מחזקים באופן מולד. <b>חיזוק משני</b>: גירוי שאין לו ערך כשלעצמו אבל <b>שזווג עם חיזוק ראשוני</b> (כסף, אסימונים, ציונים)."},
{id:43,topic:5,difficulty:"קשה",text:"מהו extinction burst?",options:["חיזוק חזק במיוחד","עלייה זמנית בעוצמת ההתנהגות בתחילת ההכחדה לפני שהיא יורדת","הכחדה מיידית","חיזוק משתנה"],correct:1,explanation:"<b>Extinction burst</b>: בתחילת ההכחדה, ההתנהגות עלולה דווקא <b>לעלות בעוצמה</b> לפני שהיא יורדת. דוגמה: ילד שרגיל לבכי בסופר — כשהורים מפסיקים להיכנע, הבכי יגבר תחילה לפני שיכחד."},
{id:44,topic:1,difficulty:"בינונית",text:"H.M. שלקה ב-2 האמנזיות (נפגע בהיפוקמפוס ובאזורים פרונטליים ולימביים) מלמד על:",options:["סוגים שונים של זיכרון שמיוצגים באזורים שונים במוח","שכל הזיכרון במקום אחד במוח","שהזיכרון לא קשור למוח","שאפשר לחיות בלי זיכרון"],correct:0,explanation:"המקרה של <b>H.M.</b> מלמד שישנם <b>סוגים שונים של זיכרון</b> המיוצגים ב<b>אזורים שונים</b> במוח. ההפרדה של זיכרון מיכולות תפיסתיות וקוגניטיביות אחרות ועל חלוקת מערכות הזיכרון."},
{id:45,topic:2,difficulty:"קלה",text:"דוגמה לגירוי מסמן (Sign Stimulus) היא:",options:["קול הפעמון של פבלוב","הנקודה האדומה על מקור השחף שגורמת לגוזלים לנקר","ריח אוכל","קול אמא"],correct:1,explanation:"<b>גירוי מסמן (Sign Stimulus)</b> הוא גירוי ספציפי שמפעיל FAP. הנקודה האדומה על מקור השחף היא גירוי מסמן שגורם לגוזלים לנקר — תבנית פעולה קבועה של בקשת מזון."},
{id:46,topic:4,difficulty:"קלה",text:"בהתניה קלאסית, מהו הגירוי המותנה (CS)?",options:["הגירוי שמעורר תגובה באופן טבעי","הגירוי הניטרלי שלאחר זיווג עם UCS מעורר תגובה מותנית","התגובה הנלמדת","התגובה הטבעית"],correct:1,explanation:"<b>הגירוי המותנה (CS)</b> הוא גירוי שהיה ניטרלי בהתחלה, ולאחר <b>זיווג חוזר</b> עם הגירוי הלא-מותנה (UCS) — הוא מעורר תגובה מותנית (CR) בפני עצמו."},
{id:47,topic:7,difficulty:"קשה",text:"מה הראה ניסוי ג'ונסון וסקוט (Johnson & Scott, 1976)?",options:["שרגשות לא משפיעים על זיכרון","שנוכחות נשק מצמצמת את הקשב ופוגעת בזיהוי פנים","שקורטיזול משפר זיכרון","ששינון חוזר מסביר זיכרון רגשי"],correct:1,explanation:"<b>ג'ונסון וסקוט</b>: נבדקים שנכנס אליהם חדר אדם עם <b>סכין מגואלת בדם</b> — זיהו את האיש פחות טוב מאלו שנכנס אדם עם <b>ידיים שמנות</b>. זהו <b>אפקט פוקוס הנשק</b> — הקשב מתמקד באובייקט המאיים."},
{id:48,topic:9,difficulty:"בינונית",text:"הביטואציה בהתמכרות לסמים: אלכוהול מדגים הביטואציה, ואילו:",options:["קוקאין מדגים גם הביטואציה","קוקאין מדגים סנסיטיזציה — האפקט מתגבר","קוקאין לא משפיע","כל הסמים מדגימים הביטואציה"],correct:1,explanation:"<b>אלכוהול</b> → הביטואציה (סבילות — צריך יותר לאותו אפקט). <b>קוקאין</b> → <b>סנסיטיזציה</b> — האפקט דווקא <b>מתגבר</b> עם שימוש חוזר. זהו הבדל חשוב בין סוגי סמים."},
{id:49,topic:10,difficulty:"קשה",text:"מהן שתי ההשערות המרכזיות למה לבני אדם יש יתרון בפיתוח אינטליגנציה?",options:["גנטיקה ותזונה","שימוש בכלים ובשפה; אינטליגנציה תרבותית ייחודית","גודל המוח בלבד","יכולת ריצה"],correct:1,explanation:"שתי ההשערות: 1) <b>השערת שימוש בשפה ובכלים</b> — הניעו התקדמות קוגניטיבית. 2) <b>השערת האינטליגנציה התרבותית הייחודית</b> — בני אדם פיתחו יכולות קוגניטיביות ייחודיות מחיים בסביבה שיש בה תרבות שעוברת מדור לדור."},
{id:50,topic:6,difficulty:"קלה",text:"חוק האפקט של ת'ורנדייק קובע:",options:["למידה דורשת תובנה","התנהגויות שאחריהן תוצאה נעימה יתחזקו, ואחריהן תוצאה לא נעימה יחלשו","כל התנהגות נלמדת","הכחדה מוחקת למידה"],correct:1,explanation:"<b>חוק האפקט</b> של ת'ורנדייק: התנהגויות שאחריהן <b>תוצאה נעימה (satisfying)</b> יתחזקו, התנהגויות שאחריהן <b>תוצאה לא נעימה (annoying)</b> יחלשו. זהו הבסיס להתניה אופרנטית."},
// ===== שאלות נוספות מורחבות =====
{id:51,topic:1,difficulty:"קלה",text:"מהי אפיסטמולוגיה?",options:["חקר הרגשות","תיאוריה של הידע — כיצד אנו רוכשים ידע","חקר ההתנהגות","חקר המוח"],correct:1,explanation:"<b>אפיסטמולוגיה</b> היא תיאוריה של הידע — ענף בפילוסופיה שעוסק בשאלה <b>כיצד אנו יודעים דברים וכיצד אנו רוכשים ידע</b>. הפילוסופים הראשונים עסקו בכך."},
{id:52,topic:1,difficulty:"בינונית",text:"מה חקר אריק קנדל באפליזיה (שבלול ים)?",options:["התנהגות חברתית","רפלקס והתניה ברמה מולקולרית — כיצד מתבטאים זיכרון קצר וארוך טווח","למידת שפה","אינסטינקטים"],correct:1,explanation:"קנדל חקר את <b>הרפלקס של שבלול הים (אפליזיה)</b> ותיאר ברמה המולקולרית כיצד מתבטאים <b>זיכרון בטווח קצר וארוך</b>. כל ידע נרכש חייב להיות מקודד ומיוצג במוח."},
{id:53,topic:1,difficulty:"קשה",text:"H.M. נפגע בהיפוקמפוס. מה ניתן ללמוד מהמקרה שלו?",options:["שהזיכרון מאוחסן במקום אחד","שסוגים שונים של זיכרון מיוצגים באזורים שונים במוח","שהזיכרון לא קשור למוח","שהכחדה מוחקת זיכרון"],correct:1,explanation:"המקרה של H.M. מלמד שישנם <b>סוגים שונים של זיכרון</b> המיוצגים ב<b>אזורים שונים במוח</b>. הפרדה בין זיכרון דקלרטיבי (שנפגע) לפרוצדורלי (שנשמר)."},
{id:54,topic:2,difficulty:"קלה",text:"כמה מאפיינים יש לתבנית פעולה קבועה (FAP)?",options:["3","5","7","2"],correct:1,explanation:"ל-FAP יש <b>5 מאפיינים</b>: 1) ספציפית למין 2) מורכבת ורבת-שלבים 3) דפוס נוקשה ואחיד 4) לא נלמדת 5) התנהגות אוטומטית."},
{id:55,topic:2,difficulty:"קשה",text:"מה מדגימה ההביטואציה של צרעות לריח סחלבים?",options:["שהתניה קלאסית עובדת בחרקים","שאינסטינקט (משיכה לריח נקבה) יכול להשתנות על ידי למידה (הביטואציה)","שצרעות חכמות","שסחלבים מפחידים"],correct:1,explanation:"צרעות זכרים נמשכים לסחלבים שמחקים ריח (פרומון) של נקבה. עם הזמן הם <b>מתרגלים (הביטואציה)</b> — דוגמה ל<b>אינסטינקט שמשתנה על ידי למידה</b>."},
{id:56,topic:2,difficulty:"בינונית",text:"מה מיוחד בחלון הזמן הקריטי של חותמה?",options:["אין חלון זמן","אם פספסו את החלון — החיה לא תתקשר עם האם","החלון נמשך שנה","החלון קיים רק אצל בני אדם"],correct:1,explanation:"החותמה ספציפית לזמן — אם של עיזים וכבשים <b>קולטת את הריח של צאצאיה עם לידתם</b>. אם לא תקלוט בחלון הזמן הקריטי — <b>היא תדחה אותם</b>."},
{id:57,topic:3,difficulty:"בינונית",text:"מהו עקום הלמידה של ת'ורנדייק?",options:["קו ישר עולה","עקום יורד בהדרגה — הזמן לפתרון קצר יותר עם כל ניסיון","עקום U הפוך","אין שינוי"],correct:1,explanation:"עקום הלמידה של ת'ורנדייק <b>יורד בהדרגה</b> — החתול מצליח לפתוח את הדלת <b>מהר יותר</b> עם כל ניסיון חוזר. למידה הדרגתית (incremental) מבוססת ניסוי ושגיאה."},
{id:58,topic:3,difficulty:"קשה",text:"מה עשתה השימפנזה סולטן במחקר של קוהלר?",options:["פתחה דלת","חיברה שני מקלות כדי להגיע לבננה — תובנה פתאומית","למדה שפת סימנים","בנתה קן"],correct:1,explanation:"סולטן <b>חיבר שני מקלות</b> כדי להגיע לבננה — דוגמה ל<b>למידה מתוך תובנה (Insight)</b>. פתרון פתאומי ללא ניסוי ושגיאה הדרגתי."},
{id:59,topic:4,difficulty:"קשה",text:"מדוע CTA (שנאת טעם מותנית) שוברת את הכללים של התניה קלאסית רגילה?",options:["היא לא עובדת","ISI ארוך מאוד (שעות), למידה בחשיפה אחת, ומוכנות ביולוגית ספציפית","היא דורשת יותר חזרות","היא עובדת רק אצל בני אדם"],correct:1,explanation:"CTA שוברת כללים: 1) <b>ISI ארוך מאוד</b> (עד שעות, לא שניות) 2) <b>למידה בחשיפה אחת</b> 3) <b>מוכנות ביולוגית</b> — קל יותר לקשר טעם+בחילה מאשר טעם+כאב."},
{id:60,topic:4,difficulty:"בינונית",text:"מהו הגירוי הניטרלי (NS) לפני ההתניה בניסוי פבלוב?",options:["הבשר","הפעמון/מטרונום — שלא מעורר ריור לפני הזיווג","הריור","הכלב"],correct:1,explanation:"<b>הגירוי הניטרלי (NS)</b> הוא הפעמון/מטרונום — <b>לפני ההתניה</b> הוא לא מעורר ריור. רק <b>לאחר זיווג חוזר</b> עם UCS (בשר) הוא הופך לגירוי מותנה (CS) שמעורר ריור."},
{id:61,topic:5,difficulty:"קשה",text:"מהן ארבע ההוכחות שהכחדה אינה מחיקה?",options:["שכחה, עייפות, התרגלות, הסחת דעת","החלמה ספונטנית, Renewal, Reinstatement, Re-acquisition","חיזוק, עונש, הביטואציה, סנסיטיזציה","למידה, זיכרון, שכחה, מוטיבציה"],correct:1,explanation:"4 הוכחות שהכחדה ≠ מחיקה: 1) <b>החלמה ספונטנית</b> (חזרה אחרי מנוחה) 2) <b>Renewal</b> (חזרה בקונטקסט שונה) 3) <b>Reinstatement</b> (חשיפה ל-UCS) 4) <b>Re-acquisition</b> (למידה מחדש מואצת)."},
{id:62,topic:5,difficulty:"בינונית",text:"מהי דסנסיטיזציה שיטתית?",options:["עונש על התנהגות","שיטת טיפול מבוססת הכחדה — חשיפה הדרגתית לגירוי מפחיד תוך הרפיה","חיזוק חיובי","למידה מתוך תובנה"],correct:1,explanation:"<b>דסנסיטיזציה שיטתית</b> היא שיטת טיפול מבוססת על עקרונות <b>הכחדה</b> — חשיפה הדרגתית לגירוי המפחיד תוך שמירה על <b>הרפיה</b>, כדי לבטל את התגובה המותנית של פחד."},
{id:63,topic:5,difficulty:"קלה",text:"מה קרה לאלברט הקטן לאחר הניסוי?",options:["הפוביה הוסרה","לא בוצע דה-בריפינג ולא הוסרה הפוביה — הוא מת בגיל 6 ממחלה","הוא המשיך להשתתף בניסויים","הוא התגבר לבד"],correct:1,explanation:"הניסוי מעורר שאלות אתיות קשות — <b>לא בוצע דה-בריפינג</b> ולא הוסרה הפוביה. אלברט <b>מת בגיל 6 ממחלה</b>. זהו אחד הניסויים השנויים ביותר במחלוקת אתית."},
{id:64,topic:6,difficulty:"קשה",text:"מה ההבדל העיקרי בין התניה קלאסית לאופרנטית?",options:["אין הבדל","קלאסית = למידה על רפלקסים קיימים; אופרנטית = למידה על התנהגויות חדשות","קלאסית עובדת רק בחיות","אופרנטית לא דורשת חיזוק"],correct:1,explanation:"<b>התניה קלאסית</b> = הלבשת למידה על <b>רפלקס קיים</b> (אסוציאציה בין גירויים). <b>התניה אופרנטית</b> = למידה על <b>התנהגויות חדשות לגמרי</b> (תוצאות ההתנהגות קובעות אם תחזור)."},
{id:65,topic:6,difficulty:"בינונית",text:"מהו לוח מרווח קבוע (FI) ומה התבנית שהוא מייצר?",options:["חיזוק אחרי כל תגובה — קצב קבוע","חיזוק לאחר זמן קבוע — תבנית Scalloping (קצב נמוך אחרי חיזוק שעולה לקראת הבא)","חיזוק משתנה — קצב גבוה","ללא חיזוק"],correct:1,explanation:"<b>לוח מרווח קבוע (FI)</b> = חיזוק לאחר <b>זמן קבוע</b>. מייצר תבנית <b>Scalloping</b> — קצב נמוך מיד אחרי חיזוק, שעולה בהדרגה לקראת מועד החיזוק הבא."},
{id:66,topic:6,difficulty:"קלה",text:"דוגמה ללוח יחס משתנה (VR) בחיי היומיום:",options:["משכורת חודשית","מכונת מזל (הימורים) — לא יודעים מתי יגיע החיזוק","בדיקת מייל כל שעה","בונוס על כל 10 יחידות"],correct:1,explanation:"<b>מכונת מזל (הימורים)</b> היא דוגמה ללוח VR — לא יודעים מתי יגיע החיזוק הבא. לכן <b>הימורים ממכרים</b> — VR מייצר קצב תגובה גבוה ועמידות גבוהה בפני הכחדה."},
{id:67,topic:7,difficulty:"קלה",text:"מה קורה לביצועים כשרמת העוררות הרגשית נמוכה מדי?",options:["הביצועים מיטביים","הביצועים נפגעים — כמו כשהעוררות גבוהה מדי","הביצועים עולים","אין השפעה"],correct:1,explanation:"לפי <b>חוק ירקס-דודסון</b>: גם <b>מעט מדי עוררות</b> (אדישות) וגם <b>יותר מדי</b> (סטרס) פוגעים בביצוע. נדרשת רמת עוררות <b>אופטימלית</b> — עקומת U הפוך."},
{id:68,topic:7,difficulty:"קשה",text:"מה הראו שלוש השקופיות בניסוי כריסטיאנסון ולופטוס (1991)?",options:["שכולם זכרו אותו דבר","שהנבדקים שראו שקופית רגשית (אישה עם סכין מגואלת) זכרו את העיקר טוב יותר אך פרטים פריפריאליים פחות","שרגשות לא משפיעים","ששינון חוזר הוא המפתח"],correct:1,explanation:"3 שקופיות: רגשי (אישה עם סכין), ניטרלי, ויוצא דופן. הנבדקים עם השקופית <b>הרגשית</b> זכרו <b>טוב יותר את העיקר (gist)</b> אך <b>פחות את הפרטים הפריפריאליים</b>."},
{id:69,topic:8,difficulty:"קלה",text:"כמה סימנים למדה קוקו הגורילה?",options:["50","350","1000","10"],correct:2,explanation:"<b>קוקו</b> למדה כ-<b>1000 סימנים</b> בשפת הסימנים (Paterson, 1978). פטרסון טענה שקוקו הביעה חלומות, רכילות, שקרים ורגשות."},
{id:70,topic:8,difficulty:"קשה",text:"מה ההבדל בין למידת השפה של קנזי לבין המחקרים הקודמים?",options:["קנזי למד פחות","קנזי למד מצפייה מקרית (ספונטנית) ולא מחיזוק ישיר","קנזי למד עברית","אין הבדל"],correct:1,explanation:"<b>קנזי</b> (בונובו) למד <b>מצפייה מקרית</b> באמו ומסרטים — הפגין <b>תקשורת ספונטנית</b>. בניגוד למחקרים קודמים שהתבססו על <b>חיזוק ישיר ואילוף</b>."},
{id:71,topic:9,difficulty:"קלה",text:"מה קורה בהחלמה ספונטנית של הביטואציה?",options:["התגובה נעלמת לצמיתות","לאחר תקופת הפסקה, התגובה חוזרת — מוכיח שהביטואציה זמנית","התגובה מתחזקת","שום דבר"],correct:1,explanation:"<b>החלמה ספונטנית</b>: לאחר <b>תקופת הפסקה</b> מחשיפה לגירוי, <b>התגובה חוזרת</b>. מוכיח שההביטואציה היא <b>זמנית</b> — למידה ולא מחיקה."},
{id:72,topic:9,difficulty:"קשה",text:"מדוע סנסיטיזציה שונה מהביטואציה מבחינת הספציפיות לגירוי?",options:["שתיהן ספציפיות","הביטואציה ספציפית לגירוי מסוים, סנסיטיזציה לא — מצב עוררות כללי שגורם לתגובה למגוון רמזים","שתיהן לא ספציפיות","רק הביטואציה לא ספציפית"],correct:1,explanation:"<b>הביטואציה ספציפית</b> לגירוי — ירידה רק בתגובה לאותו גירוי. <b>סנסיטיזציה לא ספציפית</b> — מצב <b>עוררות כללי</b> שגורם לתגובה חזקה ל<b>מגוון רמזים</b> (מזכיר דריכות של PTSD)."},
{id:73,topic:10,difficulty:"בינונית",text:"שימפנזים באזורים שונים משתמשים בכלים שונים. מה זה מרמז?",options:["שאין להם אינטליגנציה","שיש להם 'תרבות' — ידע שעובר בין דורות ומשתנה בין אוכלוסיות","שהם לא יודעים להשתמש בכלים","שהכל גנטי"],correct:1,explanation:"הבדלים בשימוש בכלים בין אוכלוסיות שימפנזים מרמזים על <b>'תרבות'</b> — ידע ש<b>עובר בין דורות</b> ומשתנה <b>בין אוכלוסיות</b>. השאלה: האם זו הוראה מכוונת או חיקוי?"},
{id:74,topic:10,difficulty:"קשה",text:"מהן שתי ההשערות למה בני אדם פיתחו אינטליגנציה ייחודית?",options:["גודל ומשקל","שימוש בשפה וכלים; אינטליגנציה תרבותית ייחודית מחיים בסביבה עם תרבות","תזונה ואקלים","מזל ומוטציות"],correct:1,explanation:"1) <b>השערת שימוש בשפה ובכלים</b> — הניעו התקדמות קוגניטיבית. 2) <b>אינטליגנציה תרבותית ייחודית</b> — יכולות שהתפתחו מחיים בסביבה עם תרבות שעוברת מדור לדור."},
{id:75,topic:1,difficulty:"בינונית",text:"מה ההבדל בין זיכרון דקלרטיבי לזיכרון לא-דקלרטיבי?",options:["אין הבדל","דקלרטיבי = מודע, ניתן לדווח; לא-דקלרטיבי = השפעה על התנהגות ללא מודעות","דקלרטיבי = מוטורי; לא-דקלרטיבי = מילולי","דקלרטיבי קצר-טווח; לא-דקלרטיבי ארוך-טווח"],correct:1,explanation:"<b>זיכרון דקלרטיבי (אקספליציטי)</b> = מודע, ניתן לדווח עליו — כולל אפיזודי וסמנטי. <b>זיכרון לא-דקלרטיבי (אימפליציטי)</b> = השפעה על ההתנהגות <b>ללא מודעות</b> — כולל פרוצדורלי, פריימינג, התניה, הביטואציה."},
{id:76,topic:4,difficulty:"בינונית",text:"מהי הכללת גירוי (Stimulus Generalization) בהתניה קלאסית?",options:["תגובה רק לגירוי המקורי","תגובה מותנית שמתרחשת גם לגירויים דומים ל-CS המקורי","שכחה של הגירוי","חיזוק חיובי"],correct:1,explanation:"<b>הכללת גירוי</b>: התגובה המותנית מתרחשת גם <b>לגירויים דומים</b> ל-CS המקורי. דוגמה: אלברט פחד לא רק מהעכבר אלא גם מארנב וכלב פרוותי. ככל שהגירוי דומה יותר — התגובה חזקה יותר."},
{id:77,topic:6,difficulty:"בינונית",text:"למה שימפנזים מוכנים לעבוד בשביל אסימונים?",options:["כי הם אוהבים אסימונים באופן מולד","כי האסימונים הם חיזוק משני שזווג עם חיזוק ראשוני (אוכל)","כי הם לא מבינים","כי הם רוצים לשחק"],correct:1,explanation:"שימפנזים למדו לעבוד בשביל אסימונים כי הם <b>חיזוק משני</b> — <b>זווגו עם חיזוק ראשוני</b> (אוכל). כלכלת האסימונים מבוססת על עיקרון זה גם אצל בני אדם."},
{id:78,topic:5,difficulty:"בינונית",text:"מהו flooding (הצפה) כשיטת טיפול?",options:["חיזוק מוגבר","חשיפה מאסיבית ובבת אחת לגירוי המפחיד — מבוססת על עקרון ההכחדה","עונש","התניה חדשה"],correct:1,explanation:"<b>Flooding (הצפה)</b> היא שיטת טיפול מבוססת הכחדה — <b>חשיפה מאסיבית ובבת אחת</b> לגירוי המפחיד (בניגוד לחשיפה הדרגתית). המטרה: הכחדת התגובה הרגשית המותנית."},
{id:79,topic:9,difficulty:"בינונית",text:"מה ההבדל בין סבילות (tolerance) לאלכוהול לבין סנסיטיזציה לקוקאין?",options:["אין הבדל","אלכוהול: צריך יותר לאותו אפקט (הביטואציה); קוקאין: האפקט מתגבר (סנסיטיזציה)","שניהם הביטואציה","שניהם סנסיטיזציה"],correct:1,explanation:"<b>אלכוהול</b> = <b>הביטואציה</b> (סבילות — צריך כמות גדולה יותר לאותו אפקט). <b>קוקאין</b> = <b>סנסיטיזציה</b> — האפקט דווקא <b>מתגבר</b> עם שימוש חוזר. הבדל חשוב בין סוגי סמים."},
{id:80,topic:7,difficulty:"בינונית",text:"מה הראה ניסוי ג'ונסון וסקוט (1976) לגבי אפקט פוקוס הנשק?",options:["שנשק לא משפיע","נבדקים שנכנס אליהם אדם עם סכין מגואלת — זיהו אותו פחות טוב מאלו שנכנס אדם עם ידיים שמנות","שכולם זיהו אותו דבר","שרגשות משפרים זיהוי"],correct:1,explanation:"<b>ג'ונסון וסקוט</b>: נבדקים עם <b>סכין מגואלת בדם</b> — זיהו את האיש <b>פחות טוב</b>. נבדקים עם <b>ידיים שמנות</b> — זיהו טוב יותר. הקשב התמקד ב<b>אובייקט המאיים</b> (סכין) על חשבון זיהוי פנים."},
{id:81,topic:1,difficulty:"קלה",text:"מהי אפיסטמולוגיה?",options:["חקר הרגשות","תיאוריה של הידע","שיטת מחקר סטטיסטית","ענף ברפואה"],correct:1,explanation:"<b>אפיסטמולוגיה</b> = <b>תיאוריה של הידע</b>. עוסקת בשאלות: מהו ידע? כיצד אנו רוכשים אותו? מהם גבולותיו?"},
{id:82,topic:1,difficulty:"קלה",text:"על חקר איזה יצור קיבל אריק קנדל פרס נובל?",options:["חתול","שימפנזה","אפליזיה (שבלול ים)","חולדה"],correct:2,explanation:"<b>אריק קנדל</b> קיבל פרס <b>נובל בשנת 2000</b> על חקר <b>אפליזיה (שבלול ים)</b>, שבו תיאר את הבסיס המולקולרי של זיכרון קצר וארוך טווח."},
{id:83,topic:1,difficulty:"בינונית",text:"מה ייחודי באמנזיה של קלייב וירינג?",options:["הוא סבל רק מאמנזיה אנטרוגרדית","הוא סבל רק מאמנזיה רטרוגרדית","הוא סבל גם מאמנזיה אנטרוגרדית וגם מרטרוגרדית-הדרגתית","הוא לא סבל מאמנזיה כלל"],correct:2,explanation:"<b>קלייב וירינג</b> סבל גם מ<b>אמנזיה אנטרוגרדית</b> (לא יצר זיכרונות חדשים) וגם מ<b>אמנזיה רטרוגרדית הדרגתית</b> (איבד זיכרונות מהעבר). למרות זאת, זכר את אשתו וניגן פסנתר."},
{id:84,topic:1,difficulty:"קשה",text:"קלייב וירינג זכר את אשתו אך לא את ילדיו. מה זה ממחיש לגבי אמנזיה רטרוגרדית?",options:["שהיא מוחקת הכל","שהיא הדרגתית — זיכרונות ישנים יותר (אשתו) נשמרים יותר מחדשים (ילדיו)","שרק זיכרונות רגשיים נשמרים","שהיא משפיעה רק על זיכרון סמנטי"],correct:1,explanation:"<b>אמנזיה רטרוגרדית הדרגתית</b> (Temporarily Graded): זיכרונות <b>ישנים יותר</b> (אשתו) <b>נשמרים טוב יותר</b> מזיכרונות <b>חדשים יותר</b> (ילדיו). פגיעה גדולה יותר לזיכרונות קרובים לרגע הפגיעה."},
{id:85,topic:1,difficulty:"בינונית",text:"היכולת של קלייב וירינג לנגן פסנתר למרות האמנזיה ממחישה את קיומו של:",options:["זיכרון אפיזודי","זיכרון סמנטי","זיכרון פרוצדורלי","זיכרון קצר-טווח"],correct:2,explanation:"ניגון פסנתר הוא <b>זיכרון פרוצדורלי</b> — מיומנות מוטורית שנשמרת ב<b>גרעיני הבסיס והצרבלום</b>, ולא בהיפוקמפוס שנפגע אצל קלייב."},
{id:86,topic:1,difficulty:"קשה",text:"מה לומדים מהמקרה של H.M. לגבי ארגון הזיכרון במוח?",options:["שכל הזיכרון נמצא בהיפוקמפוס","שסוגי זיכרון שונים מאוחסנים באזורים שונים במוח","שלא ניתן ללמוד ללא היפוקמפוס","שזיכרון קצר-טווח וארוך-טווח זהים"],correct:1,explanation:"<b>H.M.</b> נפגע ב<b>היפוקמפוס</b> ואיבד יכולת ליצור זיכרונות דקלרטיביים חדשים, אך שמר על זיכרון פרוצדורלי. זה מלמד ש<b>סוגי זיכרון שונים מעובדים באזורים שונים</b> במוח."},
{id:87,topic:1,difficulty:"קלה",text:"כמה פריטים יכול להכיל זיכרון קצר-טווח?",options:["1-2 פריטים","4-5 פריטים","15-20 פריטים","ללא הגבלה"],correct:1,explanation:"<b>זיכרון קצר-טווח</b> מכיל כ-<b>4-5 פריטים</b> ונמשך <b>שניות עד דקות</b> בלבד."},
{id:88,topic:1,difficulty:"בינונית",text:"מהו פריימינג (Priming)?",options:["שינון חוזר של חומר","חשיפה מוקדמת לגירוי שמשפיעה על עיבוד מאוחר יותר","סוג של זיכרון אפיזודי","שיטת למידה מודעת"],correct:1,explanation:"<b>פריימינג</b>: <b>חשיפה מוקדמת</b> לגירוי <b>משפיעה על עיבוד</b> מאוחר יותר, בדרך כלל ללא מודעות. זהו סוג של זיכרון <b>אימפליציטי (לא-דקלרטיבי)</b>."},
{id:89,topic:1,difficulty:"קשה",text:"מי מהבאים אינו סוג של זיכרון לא-דקלרטיבי (אימפליציטי)?",options:["פרוצדורלי","פריימינג","אפיזודי","הביטואציה"],correct:2,explanation:"<b>זיכרון אפיזודי</b> הוא סוג של זיכרון <b>דקלרטיבי (אקספליציטי)</b> — זיכרון מודע לאירועים ספציפיים. פרוצדורלי, פריימינג והביטואציה הם <b>לא-דקלרטיביים</b>."},
{id:90,topic:1,difficulty:"בינונית",text:"מה ההבדל בין זיכרון אפיזודי לזיכרון סמנטי?",options:["אפיזודי = עובדות, סמנטי = אירועים","אפיזודי = אירועים ספציפיים עם קונטקסט, סמנטי = עובדות כלליות ללא קונטקסט","אין הבדל ביניהם","אפיזודי שמור בצרבלום, סמנטי בהיפוקמפוס"],correct:1,explanation:"<b>זיכרון אפיזודי</b> = זיכרון ל<b>אירועים ספציפיים</b> עם <b>קונטקסט</b> (זמן, מקום), תלוי ב<b>היפוקמפוס</b>. <b>זיכרון סמנטי</b> = <b>עובדות כלליות</b> ללא קונטקסט ספציפי."},
{id:91,topic:2,difficulty:"קלה",text:"מהי תבנית פעולה קבועה (FAP)?",options:["התנהגות נלמדת","רצף התנהגותי מולד, ספציפי למין, מורכב ונוקשה","רפלקס פשוט","תגובה רגשית"],correct:1,explanation:"<b>FAP (תבנית פעולה קבועה)</b>: רצף התנהגותי <b>מולד</b> עם 5 מאפיינים — <b>ספציפי למין, מורכב, נוקשה, לא נלמד, אוטומטי</b>."},
{id:92,topic:2,difficulty:"קלה",text:"מה גרם לגוזלי שחפים לבקש מזון?",options:["קול האם","נקודה אדומה על מקור ההורה","ריח המזון","תנועת הכנפיים"],correct:1,explanation:"<b>נקודה אדומה</b> על מקור ההורה היא <b>גירוי מסמן (Sign Stimulus)</b> שמפעיל את ה-<b>FAP</b> של בקשת מזון אצל גוזלי שחפים."},
{id:93,topic:2,difficulty:"בינונית",text:"טינברגן גילה שדגי סטיקלבק תוקפים כל אובייקט עם בטן אדומה. מה מונח זה נקרא?",options:["חותמה","דחף","גירוי מסמן (Sign Stimulus)","הביטואציה"],correct:2,explanation:"<b>בטן אדומה</b> היא <b>גירוי מסמן (Sign Stimulus)</b> שמפעיל את ה-FAP של <b>תוקפנות</b> אצל דגי סטיקלבק. הם תקפו כל אובייקט עם בטן אדומה, גם אם לא היה דג אמיתי."},
{id:94,topic:2,difficulty:"בינונית",text:"מהי חותמה (Imprinting)?",options:["למידה הדרגתית לאורך החיים","למידה מתוכנתת שמתרחשת בחלון זמן קריטי","סוג של התניה קלאסית","שכחה של התנהגות מולדת"],correct:1,explanation:"<b>חותמה (Imprinting)</b> היא <b>למידה מתוכנתת</b> שמתרחשת ב<b>חלון זמן קריטי</b>. <b>לורנץ</b> הדגים זאת עם ברווזים שהחתימו עליו כ'אם'."},
{id:95,topic:2,difficulty:"קשה",text:"מדוע עיזים/כבשים שלא נחשפו לצאצאיהם מיד אחרי הלידה עלולות לדחות אותם?",options:["כי הן עייפות מהלידה","כי קיים חלון קריטי לקליטת ריח הצאצאים — חותמה","כי הצאצאים השתנו","כי הן לא מזהות את הצאצאים חזותית"],correct:1,explanation:"אצל עיזים וכבשים קיים <b>חלון קריטי לקליטת ריח</b> הצאצאים. אם האם לא נחשפה לריח בתקופה הקריטית, היא עלולה <b>לדחות</b> את הגדי/כבש. זוהי דוגמה ל<b>חותמה (Imprinting)</b>."},
{id:96,topic:2,difficulty:"קשה",text:"צרעות מפסיקות להגיב לריח סחלב שמחקה פרומון נקבה. תופעה זו היא דוגמה ל:",options:["סנסיטיזציה","למידה מתוך תובנה","הביטואציה — ירידה בתגובה לגירוי חוזר","התניה קלאסית"],correct:2,explanation:"הצרעות מפגינות <b>הביטואציה</b> — <b>ירידה בתגובה</b> לריח הסחלב לאחר חשיפה חוזרת. הן למדו שהגירוי אינו מוביל לפרומון אמיתי."},
{id:97,topic:2,difficulty:"בינונית",text:"מה המשמעות של 'למידה מוטית' (Biased/Programmed Learning)?",options:["למידה ללא שגיאות","אינסטינקט מושפע מלמידה ולמידה מושפעת מאינסטינקט","למידה רק מטעויות","למידה גנטית בלבד"],correct:1,explanation:"<b>למידה מוטית (Biased/Programmed Learning)</b>: קיים אינטראקציה בין <b>אינסטינקט ללמידה</b> — האינסטינקט מכוון את הלמידה, והלמידה יכולה לשנות ביטויי אינסטינקט."},
{id:98,topic:2,difficulty:"קלה",text:"מהו דחף (Drive)?",options:["תגובה מותנית","צורך פנימי מתמשך כמו אכילה, שינה והגנה","גירוי חיצוני","התנהגות נלמדת"],correct:1,explanation:"<b>דחף (Drive)</b> הוא <b>צורך פנימי מתמשך</b> שמניע התנהגות — כמו <b>אכילה, שינה, הגנה</b>. בניגוד ל-FAP שהוא רצף התנהגותי ספציפי."},
{id:99,topic:2,difficulty:"קשה",text:"ככל שמין מסוים גבוה יותר בטקסונומיה (סולם האבולוציה), מה קורה להתנהגותו?",options:["היא מונעת יותר ע\"י אינסטינקטים","היא מונעת פחות ע\"י אינסטינקטים ויותר ע\"י למידה","היא נעשית פשוטה יותר","אין שינוי"],correct:1,explanation:"ככל שהמין <b>גבוה יותר בטקסונומיה</b>, התנהגותו <b>פחות מונעת ע\"י אינסטינקטים</b> ויותר ע\"י <b>למידה וגמישות</b>. בני אדם הם הדוגמה הקיצונית לכך."},
{id:100,topic:2,difficulty:"בינונית",text:"איזה מהבאים אינו מאפיין של FAP?",options:["ספציפית למין","מורכבת","גמישה ומשתנה","אוטומטית"],correct:2,explanation:"FAP היא <b>נוקשה</b> ולא גמישה. חמשת המאפיינים: <b>ספציפית למין, מורכבת, נוקשה, לא נלמדת, אוטומטית</b>."},
{id:101,topic:3,difficulty:"קלה",text:"מי ערך את ניסוי תיבת הפאזל עם חתולים?",options:["קוהלר","פבלוב","ת'ורנדייק","סקינר"],correct:2,explanation:"<b>ת'ורנדייק (1898)</b> ערך את ניסוי <b>תיבת הפאזל</b> עם חתולים וגילה שהם לומדים בדרך של <b>ניסוי ושגיאה</b> — למידה הדרגתית."},
{id:102,topic:3,difficulty:"בינונית",text:"מה מראה עקום הלמידה בניסוי ת'ורנדייק?",options:["עלייה חדה","ירידה הדרגתית בזמן הבריחה — למידה הדרגתית","קו ישר","עלייה ואז ירידה"],correct:1,explanation:"עקום הלמידה של ת'ורנדייק מראה <b>ירידה הדרגתית</b> בזמן הבריחה מתיבת הפאזל. זה מעיד על <b>למידה הדרגתית (incremental)</b> ע\"י ניסוי ושגיאה."},
{id:103,topic:3,difficulty:"בינונית",text:"כיצד הדגים קוהלר למידה מתוך תובנה?",options:["חתולים בתיבת פאזל","שימפנזים שחיברו מקלות או ערמו ארגזים להגיע לבננה","תולעים במבוך","כלבים שלמדו רפלקסים"],correct:1,explanation:"<b>קוהלר (1925)</b> הראה שהשימפנזה <b>סולטן</b> <b>חיבר מקלות</b> ו<b>ערם ארגזים</b> כדי להגיע לבננה — פתרון <b>פתאומי</b> שמעיד על <b>למידה מתוך תובנה (Insight)</b>."},
{id:104,topic:3,difficulty:"קשה",text:"מה המסקנה מהמחלוקת בין ת'ורנדייק לקוהלר לגבי אופן הלמידה?",options:["רק ת'ורנדייק צודק","רק קוהלר צודק","שניהם צודקים — סוג הלמידה תלוי במשימה ובמין","שניהם טועים"],correct:2,explanation:"<b>שניהם צודקים</b> — סוג הלמידה תלוי ב<b>משימה</b> וב<b>מין</b>. חתולים לומדים <b>הדרגתית</b> (ניסוי ושגיאה), שימפנזים מסוגלים ללמידה <b>פתאומית</b> (תובנה) במשימות מתאימות."},
{id:105,topic:3,difficulty:"קלה",text:"מי חקר למידה בסיסית אצל תולעים במבוך T?",options:["ת'ורנדייק","קוהלר","ירקס (1912)","פבלוב"],correct:2,explanation:"<b>ירקס (1912)</b> חקר <b>תולעים במבוך T</b> והראה שגם אורגניזמים פשוטים מסוגלים ללמידה בסיסית."},
{id:106,topic:3,difficulty:"בינונית",text:"מהי הגדרת אינטליגנציה בהקשר הקורס?",options:["יכולת לפתור בעיות מתמטיות","יכולת ללמוד מניסיון ולהסתגל","ציון גבוה במבחן IQ","כמות הידע שנצבר"],correct:1,explanation:"<b>אינטליגנציה</b> מוגדרת כ<b>יכולת ללמוד מניסיון ולהסתגל</b> לסביבה. זוהי הגדרה רחבה שחלה גם על בעלי חיים."},
{id:107,topic:3,difficulty:"קשה",text:"מהו אחוז הדמיון הגנטי בין שימפנזים לאדם?",options:["75%","85%","99%","50%"],correct:2,explanation:"קיים <b>99% דמיון גנטי</b> בין שימפנזים לאדם. למרות זאת, ההבדל הקטן מתבטא בפערים משמעותיים ביכולות קוגניטיביות, שפה ותרבות."},
{id:108,topic:3,difficulty:"בינונית",text:"איזו השערה מנסה להסביר את הייחוד של האינטליגנציה האנושית?",options:["השערת הגודל הפיזי","השערת שימוש בכלים ושפה","השערת האקלים","השערת התזונה"],correct:1,explanation:"<b>השערת שימוש בכלים ושפה</b> מציעה שפיתוח כלים ושפה הניעו את ההתפתחות הקוגניטיבית הייחודית של בני אדם."},
{id:109,topic:3,difficulty:"קלה",text:"מה הצליח סולטן (השימפנזה של קוהלר) לעשות?",options:["לברוח מתיבת פאזל","לחבר מקלות ולערום ארגזים כדי להגיע לבננה","לפתור מבוך T","לנגן פסנתר"],correct:1,explanation:"<b>סולטן</b> הצליח <b>לחבר מקלות</b> ו<b>לערום ארגזים</b> כדי להגיע לבננה. זו הייתה דוגמה קלאסית ל<b>למידה מתוך תובנה (Insight)</b>."},
{id:110,topic:3,difficulty:"קשה",text:"מדוע ירקס בחר לחקור תולעים ולא יונקים?",options:["כי תולעים חכמות יותר","כדי להראות שלמידה בסיסית קיימת גם באורגניזמים פשוטים","כי יונקים לא לומדים","כי תולעים זולות"],correct:1,explanation:"ירקס חקר <b>תולעים במבוך T</b> כדי להראות ש<b>למידה בסיסית קיימת גם באורגניזמים פשוטים מאוד</b>. זה מלמד שלמידה היא יכולת אבולוציונית בסיסית."},
{id:111,topic:4,difficulty:"קלה",text:"באיזו שנה קיבל פבלוב פרס נובל?",options:["1890","1904","1920","1935"],correct:1,explanation:"<b>פבלוב</b> קיבל פרס <b>נובל ב-1904</b> על מחקריו בעיכול, ובמהלכם גילה את עקרונות <b>ההתניה הקלאסית</b>."},
{id:112,topic:4,difficulty:"קלה",text:"בניסוי פבלוב, מהו הגירוי הבלתי מותנה (UCS)?",options:["הפעמון","הריור","הבשר","האור"],correct:2,explanation:"ה-<b>UCS (גירוי בלתי מותנה)</b> הוא <b>הבשר</b> — גירוי שמעורר תגובה טבעית (ריור) ללא למידה מוקדמת."},
{id:113,topic:4,difficulty:"בינונית",text:"מהי התניה קלאסית בתמצית?",options:["למידה ע\"י חיזוק ועונש","הלבשת למידה על רפלקס קיים ע\"י זיווג גירויים","למידה מתוך תובנה","חיקוי התנהגות"],correct:1,explanation:"<b>התניה קלאסית</b> = <b>הלבשת למידה על רפלקס קיים</b>: גירוי ניטרלי (פעמון) מזווג עם UCS (בשר) עד שהגירוי הניטרלי לבדו מעורר את התגובה."},
{id:114,topic:4,difficulty:"בינונית",text:"מהי התניה מדרגה שנייה?",options:["התניה חזקה יותר","זיווג CS קיים עם גירוי ניטרלי חדש כדי ליצור CS שני","התניה עם שני UCS","ביטול ההתניה"],correct:1,explanation:"<b>התניה מדרגה שנייה</b>: לאחר שנוצר CS, מזווגים אותו עם <b>גירוי ניטרלי חדש</b> (למשל הבזק אור). כך הגירוי החדש גם הוא מעורר CR. דוגמה: לוגו מקדונלדס."},
{id:115,topic:4,difficulty:"קשה",text:"מהי CER ואיך היא קשורה ל-PTSD?",options:["תגובה חיובית מותנית","תגובה רגשית מותנית — דיכוי פעילות נעימה עקב גירוי מאיים, דומה לתגובות PTSD","תגובה פיזיולוגית לא מותנית","סוג של הכחדה"],correct:1,explanation:"<b>CER (Conditioned Emotional Response)</b>: <b>תגובה רגשית מותנית</b> — דיכוי פעילות נעימה בעקבות גירוי שזווג עם אירוע מאיים. קשורה ל-<b>PTSD</b>, כמו אזעקות בלונדון שעוררו פחד גם אחרי המלחמה."},
{id:116,topic:4,difficulty:"קשה",text:"מה ייחודי ב-CTA (Conditioned Taste Aversion) לעומת התניה קלאסית רגילה?",options:["היא דורשת חיזוק חיובי","היא מתרחשת בחשיפה אחת עם ISI ארוך של שעות, בגלל מוכנות ביולוגית","היא דורשת עשרות זיווגים","היא לא קשורה להתניה"],correct:1,explanation:"<b>CTA</b> (גרסיה) ייחודית: <b>חשיפה אחת</b> מספיקה, ו-<b>ISI ארוך</b> (שעות בין טעם לבחילה). זה מתאפשר בגלל <b>מוכנות ביולוגית</b> — הישרדותית לקשר טעם עם מחלה."},
{id:117,topic:4,difficulty:"בינונית",text:"בניסוי גרסיה, חולדות שקיבלו קרינה וסבלו מבחילות — מה למדו?",options:["לפחד מרעש","לסרב לאכול את המזון שאכלו לפני הבחילות","לפחד מאור","לברוח מהכלוב"],correct:1,explanation:"חולדות שקיבלו <b>קרינה</b> וסבלו מ<b>בחילות</b> למדו <b>לסרב לאכול</b> את המזון שאכלו לפני כן — <b>CTA</b>. טעם נקשר עם בחילה, לא עם רמזים אודיו-ויזואליים."},
{id:118,topic:4,difficulty:"קשה",text:"בניסוי גרסיה נמצא שרמזים אודיו-ויזואליים נקשרים עם שוק, ואילו טעם נקשר עם בחילה. מה זה ממחיש?",options:["שכל הגירויים שווים","מוכנות ביולוגית — לא כל צירוף גירויים נלמד באותה קלות","שהתניה קלאסית לא עובדת","שחולדות לא מבחינות בין גירויים"],correct:1,explanation:"ניסוי גרסיה ממחיש <b>מוכנות ביולוגית</b>: <b>טעם</b> נקשר בקלות עם <b>בחילה</b>, ו<b>רמזים אודיו-ויזואליים</b> נקשרים בקלות עם <b>שוק</b>. לא כל צירוף גירויים נלמד באותה מידה."},
{id:119,topic:4,difficulty:"קלה",text:"בניסוי אלברט, מהו הגירוי הבלתי מותנה (UCS)?",options:["עכבר לבן","ארנב","רעש חזק","כלב"],correct:2,explanation:"בניסוי <b>אלברט</b>, ה-<b>UCS</b> היה <b>רעש חזק</b> (חבטה על מתכת) שגרם לפחד טבעי. העכבר היה ה-CS (גירוי מותנה)."},
{id:120,topic:4,difficulty:"בינונית",text:"מה קרה לאלברט לאחר ההתניה — הוא פחד רק מעכבר?",options:["כן, רק מעכבר","לא — הוא הפגין הכללת גירוי ופחד גם מאובייקטים פרוותיים דומים","הוא שכח את הפחד","הוא פחד רק מרעש"],correct:1,explanation:"אלברט הפגין <b>הכללת גירוי (Stimulus Generalization)</b>: הוא פחד לא רק מהעכבר אלא גם מ<b>אובייקטים פרוותיים דומים</b> כמו ארנב וכלב."},
{id:121,topic:5,difficulty:"קלה",text:"מהי הכחדה (Extinction) בהתניה?",options:["מחיקת הזיכרון","הפחתה בהתנהגות מותנית כשמסירים את החיזוק","חיזוק מוגבר","שכחה טבעית"],correct:1,explanation:"<b>הכחדה</b> = <b>הפחתה בהתנהגות מותנית</b> לאור <b>הסרת חיזוק</b>. היא אינה שכחה אלא <b>למידה חדשה</b>."},
{id:122,topic:5,difficulty:"בינונית",text:"מהו Extinction Burst?",options:["הכחדה מיידית","עלייה זמנית בהתנהגות בתחילת תהליך ההכחדה","חיזוק חלקי","למידה חדשה"],correct:1,explanation:"<b>Extinction Burst</b>: <b>עלייה זמנית</b> בהתנהגות <b>בתחילת ההכחדה</b>. לפני שההתנהגות יורדת, היא עולה — כמו ילד שמגביר בכי כשמפסיקים לתת תשומת לב."},
{id:123,topic:5,difficulty:"קשה",text:"איזה מהבאים אינו הוכחה שהכחדה אינה מחיקה?",options:["החלמה ספונטנית","Renewal","הביטואציה","Reinstatement"],correct:2,explanation:"<b>הביטואציה</b> אינה הוכחה שהכחדה ≠ מחיקה. 4 ההוכחות הן: <b>החלמה ספונטנית, Renewal, Reinstatement, Re-acquisition</b>. כולן מראות שהקשר המקורי לא נמחק."},
{id:124,topic:5,difficulty:"בינונית",text:"מהו Renewal בהקשר של הכחדה?",options:["חיזוק מחדש","חזרת התגובה המותנית כשמחזירים את הנבדק לסביבה המקורית בה התרחשה ההתניה","שכחה","הכחדה חוזרת"],correct:1,explanation:"<b>Renewal</b>: חזרת התגובה המותנית כש<b>מחזירים את הנבדק לסביבה המקורית</b> בה בוצעה ההתניה (לאחר שההכחדה בוצעה בסביבה אחרת). מוכיח שההכחדה לא מחקה את הקשר."},
{id:125,topic:5,difficulty:"קשה",text:"מהו Reinstatement ומה הוא מוכיח?",options:["למידה חדשה לגמרי","חשיפה ל-UCS לבד (ללא CS) מחזירה את התגובה המותנית — מוכיח שההכחדה לא מחקה","סוג של חיזוק חיובי","שיטת טיפול"],correct:1,explanation:"<b>Reinstatement</b>: חשיפה ל-<b>UCS לבד</b> (ללא CS) <b>מחזירה את התגובה המותנית</b>. מוכיח ש<b>ההכחדה אינה מחיקה</b> — הקשר בין CS ל-UCS עדיין קיים."},
{id:126,topic:5,difficulty:"קלה",text:"מי ערך את ניסוי אלברט הקטן?",options:["פבלוב","ווטסון ורוזלי (1920)","סקינר","גרסיה"],correct:1,explanation:"<b>ווטסון ורוזלי (1920)</b> ערכו את ניסוי <b>אלברט הקטן</b> — התנו פחד מעכבר לבן ע\"י זיווג עם רעש חזק."},
{id:127,topic:5,difficulty:"בינונית",text:"מדוע חיזוק חלקי גורם לעמידות גבוהה יותר בפני הכחדה?",options:["כי החיזוק חזק יותר","כי הנבדק לא מזהה מיד שהחיזוק הופסק — הוא רגיל שלפעמים אין חיזוק","כי יש יותר זיווגים","כי ההתניה חזקה יותר"],correct:1,explanation:"<b>חיזוק חלקי</b> = קשה יותר להכחדה כי הנבדק <b>רגיל שלפעמים אין חיזוק</b>. לכן הוא לא מזהה מיד שהחיזוק הופסק לגמרי וממשיך בהתנהגות."},
{id:128,topic:5,difficulty:"בינונית",text:"מהי דסנסיטיזציה שיטתית?",options:["חשיפה מאסיבית","הפחתת פחד ע\"י חשיפה הדרגתית לגירוי המפחיד תוך שילוב הרפיה","עונש על פחד","חיזוק חיובי"],correct:1,explanation:"<b>דסנסיטיזציה שיטתית</b>: <b>חשיפה הדרגתית</b> לגירוי המפחיד תוך שילוב <b>הרפיה</b>. בונים היררכיית חרדה ומתקדמים בהדרגה. מבוססת על עקרון ההכחדה."},
{id:129,topic:5,difficulty:"קשה",text:"מה ההבדל בין flooding לבין דסנסיטיזציה שיטתית?",options:["אין הבדל","Flooding = חשיפה מאסיבית בבת אחת; דסנסיטיזציה = חשיפה הדרגתית עם הרפיה","דסנסיטיזציה יותר מהירה","Flooding יותר עדין"],correct:1,explanation:"<b>Flooding</b> = חשיפה <b>מאסיבית ובבת אחת</b> לגירוי המפחיד. <b>דסנסיטיזציה שיטתית</b> = חשיפה <b>הדרגתית</b> עם <b>הרפיה</b>. שתיהן מבוססות על הכחדה אך שונות בגישה."},
{id:130,topic:5,difficulty:"קלה",text:"מה קרה לאלברט הקטן בסוף הניסוי?",options:["הוא ריפא את עצמו","בוצע דה-בריפינג מוצלח","לא בוצע דה-בריפינג — אלברט מת בגיל 6","הפחד נעלם מעצמו"],correct:2,explanation:"<b>אלברט מת בגיל 6</b> ו<b>לא בוצע דה-בריפינג</b>. זהו אחד ההיבטים האתיים הבעייתיים ביותר של הניסוי."},
{id:131,topic:6,difficulty:"קלה",text:"מהו חוק האפקט של ת'ורנדייק?",options:["כל התנהגות נלמדת","תוצאה נעימה מחזקת התנהגות, תוצאה לא נעימה מחלישה","רק עונש עובד","ניסוי ושגיאה לא עובד"],correct:1,explanation:"<b>חוק האפקט</b> (ת'ורנדייק): התנהגות שמובילה ל<b>תוצאה נעימה</b> — <b>מתחזקת</b>. התנהגות שמובילה ל<b>תוצאה לא נעימה</b> — <b>נחלשת</b>. זהו הבסיס להתניה אופרנטית."},
{id:132,topic:6,difficulty:"קלה",text:"מהו חיזוק שלילי?",options:["עונש","הסרת גירוי לא נעים שמחזקת התנהגות","הוספת גירוי לא נעים","ביטול התנהגות"],correct:1,explanation:"<b>חיזוק שלילי</b> = <b>הסרת גירוי לא נעים</b> שמחזקת התנהגות. למשל: לקיחת משכך כאבים מסירה כאב ומחזקת את נטילת התרופה. <b>≠ עונש</b>."},
{id:133,topic:6,difficulty:"בינונית",text:"מהו חיזוק ראשוני לעומת חיזוק משני?",options:["ראשוני = ראשון בזמן; משני = שני בזמן","ראשוני = צורך בסיסי (אוכל, מים); משני = זווג עם ראשוני (כסף, אסימונים)","ראשוני = חזק; משני = חלש","אין הבדל"],correct:1,explanation:"<b>חיזוק ראשוני</b> = מספק <b>צורך בסיסי</b> (אוכל, מים, שינה). <b>חיזוק משני</b> = רכש ערך ע\"י <b>זיווג עם חיזוק ראשוני</b> (כסף, אסימונים, ציונים)."},
{id:134,topic:6,difficulty:"בינונית",text:"מהו ההבדל בין עונש חיובי לעונש שלילי?",options:["חיובי = טוב; שלילי = רע","חיובי = הוספת גירוי אוורסיבי; שלילי = הסרת גירוי חיובי","חיובי = חזק; שלילי = חלש","אין הבדל"],correct:1,explanation:"<b>עונש חיובי</b> = <b>הוספת גירוי אוורסיבי</b> (נזיפה, סטירה). <b>עונש שלילי</b> = <b>הסרת גירוי חיובי</b> (חרמה מטלוויזיה). שניהם מפחיתים התנהגות."},
{id:135,topic:6,difficulty:"קשה",text:"מהו עיקרון פרימאק וכיצד הוא פועל?",options:["שימוש בעונש בלבד","פעילות מועדפת יכולה לשמש כחיזוק לפעילות פחות מועדפת","חיזוק ראשוני בלבד","שינון חוזר"],correct:1,explanation:"<b>עיקרון פרימאק</b>: <b>פעילות מועדפת</b> יכולה לחזק <b>פעילות פחות מועדפת</b>. דוגמה: 'אם תעשה שיעורי בית (פחות מועדף) — תוכל לשחק (מועדף)'."},
{id:136,topic:6,difficulty:"קשה",text:"איזה לוח חיזוק מייצר את קצב התגובה הגבוה ביותר ואת העמידות הגבוהה ביותר בפני הכחדה?",options:["FR — יחס קבוע","VR — יחס משתנה","FI — מרווח קבוע","VI — מרווח משתנה"],correct:1,explanation:"<b>VR (יחס משתנה)</b> מייצר את <b>קצב התגובה הגבוה ביותר</b> ו<b>עמידות גבוהה בפני הכחדה</b>. דוגמה: <b>הימורים</b> — לא יודעים מתי יגיע החיזוק הבא."},
{id:137,topic:6,difficulty:"בינונית",text:"מהו post-reinforcement pause ובאיזה לוח חיזוק הוא מופיע?",options:["הפסקה לפני חיזוק ב-VI","הפסקה אחרי חיזוק ב-FR — יחס קבוע","הפסקה ב-VR","אין תופעה כזו"],correct:1,explanation:"<b>Post-reinforcement pause</b>: הפסקה בתגובה <b>מיד אחרי קבלת חיזוק</b>, אופיינית ללוח <b>FR (יחס קבוע)</b>. הנבדק יודע שצריך מספר קבוע של תגובות ולכן 'נח' אחרי חיזוק."},
{id:138,topic:6,difficulty:"קשה",text:"מהו scalloping ובאיזה לוח חיזוק הוא מופיע?",options:["עלייה הדרגתית ב-VR","דפוס תגובה בצורת גל ב-FI — קצב נמוך אחרי חיזוק שעולה לקראת סוף המרווח","ירידה חדה ב-FR","קצב קבוע ב-VI"],correct:1,explanation:"<b>Scalloping</b>: דפוס ב<b>FI (מרווח קבוע)</b> — <b>קצב נמוך</b> מיד אחרי חיזוק ש<b>עולה בהדרגה</b> לקראת סוף המרווח. הנבדק 'יודע' שלא יהיה חיזוק מיד ולכן ממתין."},
{id:139,topic:6,difficulty:"קלה",text:"דוגמה להתניה אופרנטית בחיי יום-יום: ילד מקבל ממתק כשמסדר חדר. זהו:",options:["עונש חיובי","חיזוק שלילי","חיזוק חיובי","עונש שלילי"],correct:2,explanation:"מתן ממתק = <b>חיזוק חיובי</b> — <b>הוספת גירוי נעים</b> (ממתק) שמחזק את ההתנהגות (סידור חדר)."},
{id:140,topic:6,difficulty:"בינונית",text:"הימורים הם דוגמה לאיזה לוח חיזוק?",options:["FR — יחס קבוע","FI — מרווח קבוע","VR — יחס משתנה","VI — מרווח משתנה"],correct:2,explanation:"<b>הימורים</b> = <b>VR (יחס משתנה)</b>. החיזוק (זכייה) מגיע אחרי <b>מספר משתנה</b> של תגובות (הימורים). זה יוצר <b>קצב גבוה</b> ו<b>התמכרות</b>."},
{id:141,topic:7,difficulty:"קלה",text:"מהי עקומת ירקס-דודסון?",options:["עקומה ליניארית","עקומת U הפוך — ביצועים אופטימליים ברמת עוררות בינונית","עקומת U — ביצועים גרועים ברמה בינונית","קו ישר אופקי"],correct:1,explanation:"<b>עקומת ירקס-דודסון</b> = <b>U הפוך</b>: ביצועים אופטימליים ברמת <b>עוררות בינונית</b>. עוררות נמוכה מדי או גבוהה מדי — פוגעות בביצועים."},
{id:142,topic:7,difficulty:"בינונית",text:"מהו אפקט פוקוס הנשק?",options:["שיפור בזיהוי פנים","הקשב מצטמצם לגירוי מאיים (כמו נשק) על חשבון פרטים אחרים","פחד מנשק","שיפור בזיכרון כללי"],correct:1,explanation:"<b>אפקט פוקוס הנשק</b>: ב<b>סיטואציה מאיימת</b>, הקשב <b>מצטמצם</b> לגירוי המאיים (נשק, סכין) <b>על חשבון פרטים אחרים</b> כמו זיהוי פנים."},
{id:143,topic:7,difficulty:"בינונית",text:"מה מצא בוקאנאן ולובאלו (2001) לגבי קורטיזול וזיכרון?",options:["קורטיזול תמיד משפר זיכרון","קורטיזול משפר קידוד זיכרון רגשי אך פוגע בקידוד זיכרון ניטרלי","קורטיזול לא משפיע","קורטיזול תמיד פוגע"],correct:1,explanation:"<b>בוקאנאן ולובאלו (2001)</b>: <b>קורטיזול</b> (הורמון סטרס) <b>משפר</b> קידוד <b>זיכרון רגשי</b> אך <b>פוגע</b> בקידוד <b>זיכרון ניטרלי</b>. השפעה דיפרנציאלית."},
{id:144,topic:7,difficulty:"קשה",text:"גאי וצ'ליל (1999) טענו שזיכרון רגשי לא מוסבר ע\"י שינון חוזר. מה הם הציעו במקום?",options:["שרגשות לא משפיעים","שזיכרון רגשי חזק יותר בגלל עיבוד מוחי ייחודי, לא בגלל חזרה — flashbulb memories","ששינון חוזר הוא הגורם היחיד","שזיכרון רגשי חלש יותר"],correct:1,explanation:"<b>גאי וצ'ליל (1999)</b>: זיכרון רגשי לא מוסבר ע\"י שינון חוזר. הוא חזק יותר בגלל <b>עיבוד מוחי ייחודי</b>. דוגמה: <b>flashbulb memories</b> — זיכרונות חיים לאירועים רגשיים."},
{id:145,topic:7,difficulty:"קשה",text:"לפי אייסטרברוק, מה קורה לטווח הרמזים (Cue Utilization) ברמת עוררות גבוהה?",options:["הוא מתרחב","הוא מצטמצם — Narrowing of Attention","הוא נשאר זהה","הוא נעלם לגמרי"],correct:1,explanation:"<b>אייסטרברוק — Narrowing of Attention</b>: ברמת <b>עוררות גבוהה</b>, <b>טווח הרמזים מצטמצם</b>. הקשב מתמקד ברמזים מרכזיים על חשבון פריפריאליים."},
{id:146,topic:7,difficulty:"בינונית",text:"בניסוי כריסטיאנסון ולופטוס, מה נמצא לגבי זיכרון רגשי?",options:["רגש פוגע בכל סוגי הזיכרון","רגש משפר זיכרון ל-gist (עיקר) אך פוגע בזיכרון לפרטים פריפריאליים","רגש משפר הכל","רגש לא משפיע"],correct:1,explanation:"<b>כריסטיאנסון ולופטוס (1991)</b>: רגש <b>משפר</b> זיכרון ל<b>gist (העיקר)</b> אך <b>פוגע</b> בזיכרון ל<b>פרטים פריפריאליים</b>. נבדקים שראו שקופית רגשית זכרו את הסיפור המרכזי אך לא פרטי רקע."},
{id:147,topic:7,difficulty:"קלה",text:"מהי רמת העוררות האופטימלית לביצועים לפי ירקס-דודסון?",options:["נמוכה מאוד","גבוהה מאוד","בינונית","אין רמה אופטימלית"],correct:2,explanation:"לפי <b>ירקס-דודסון</b>, רמת העוררות <b>האופטימלית</b> לביצועים היא <b>בינונית</b>. רמה נמוכה מדי = חוסר מוטיבציה, גבוהה מדי = חרדה ופגיעה בביצועים."},
{id:148,topic:7,difficulty:"קשה",text:"כיצד הממצאים של בוקאנאן ולובאלו קשורים לאפקט פוקוס הנשק?",options:["אינם קשורים","קורטיזול בסטרס משפר זיכרון לגירוי המרכזי (רגשי/מאיים) ופוגע בפריפריאלי — בדומה לפוקוס הנשק","קורטיזול מונע פוקוס הנשק","קורטיזול משפר זיהוי פנים"],correct:1,explanation:"<b>קורטיזול</b> (סטרס) <b>משפר</b> קידוד <b>גירוי רגשי/מאיים</b> ו<b>פוגע</b> בקידוד ניטרלי — בדיוק כמו <b>אפקט פוקוס הנשק</b> שבו הקשב מתמקד באיום על חשבון פרטים אחרים."},
{id:149,topic:8,difficulty:"קלה",text:"כמה סימנים למדה וואשו השימפנזה?",options:["50","350","1000","10"],correct:1,explanation:"<b>וואשו</b> (Gardner, 1966) למדה כ-<b>350 סימנים</b> בשפת הסימנים האמריקאית (ASL). היא אף <b>לימדה שימפנזים אחרים</b>."},
{id:150,topic:8,difficulty:"בינונית",text:"מה ייחודי בקוקו הגורילה לעומת שימפנזים אחרים שלמדו שפה?",options:["היא למדה פחות סימנים","היא למדה 1000 סימנים והביעה חלומות, רכילות, שקרים ורגשות","היא דיברה אנגלית","היא לא למדה שפה"],correct:1,explanation:"<b>קוקו</b> (Paterson, 1978) למדה כ-<b>1000 סימנים</b> והביעה <b>חלומות, רכילות, שקרים ורגשות</b> — רמת מורכבות גבוהה יותר ממה שנצפה קודם."},
{id:151,topic:8,difficulty:"קשה",text:"מהן 4 הביקורות של טראס (1979) על מחקרי שפה בשימפנזים?",options:["שהם לא חכמים","אין משפטים מורכבים, חיקוי בלבד, סדר מילים אקראי, לא ספונטני","שהם לומדים רק מילים בודדות","שהם עדיפים על בני אדם"],correct:1,explanation:"<b>טראס (1979)</b> — 4 ביקורות על השימפנזה <b>נים</b>: 1) <b>אין משפטים מורכבים</b>, 2) <b>חיקוי</b> של המאלף, 3) <b>סדר מילים אקראי</b>, 4) <b>לא ספונטני</b> — תמיד בתגובה למאלף."},
{id:152,topic:8,difficulty:"בינונית",text:"מה ייחודי בלמידת השפה של קנזי הבונובו?",options:["הוא למד מאילוף ישיר","הוא למד מצפייה מקרית באמו, הפגין תקשורת ספונטנית, והשתמש בלקסיגרמה","הוא לא למד שפה","הוא למד רק 10 מילים"],correct:1,explanation:"<b>קנזי</b> (Savage-Rumbaugh) למד <b>מצפייה מקרית באמו</b> — לא מאילוף ישיר. הפגין <b>תקשורת ספונטנית</b> והשתמש ב<b>לקסיגרמה</b> (סמלים על לוח)."},
{id:153,topic:8,difficulty:"קשה",text:"מה עמדתם של פינקר וצ'ומסקי לגבי שפה בבעלי חיים?",options:["שבעלי חיים מדברים כמו בני אדם","ששפה היא מיומנות אנושית ייחודית, עם מבנים מוחיים מולדים ו-grammar universals","שאין הבדל בין שפת אדם לשפת קוף","ששפה נלמדת בלבד"],correct:1,explanation:"<b>פינקר וצ'ומסקי</b>: <b>שפה = מיומנות אנושית ייחודית</b>, מבוססת על <b>מבנים מוחיים מולדים</b> ו-<b>grammar universals</b>. לטענתם, מה שבעלי חיים עושים אינו שפה אמיתית."},
{id:154,topic:8,difficulty:"קלה",text:"באיזו שיטה תקשר קנזי הבונובו?",options:["שפת סימנים","דיבור","לקסיגרמה (סמלים על לוח)","כתיבה"],correct:2,explanation:"<b>קנזי</b> השתמש ב<b>לקסיגרמה</b> — <b>סמלים על לוח</b> שמייצגים מילים ומושגים. זו שיטה שונה משפת הסימנים שבה השתמשו וואשו וקוקו."},
{id:155,topic:8,difficulty:"בינונית",text:"מלבד שימפנזים וגורילות, אילו בעלי חיים נוספים הראו יכולות שפתיות?",options:["רק חתולים","אריות ים, תוכים ודולפינים","רק כלבים","אף אחד נוסף"],correct:1,explanation:"בנוסף לקופי אדם, גם <b>אריות ים, תוכים ודולפינים</b> הראו יכולות שפתיות ותקשורתיות מסוימות."},
{id:156,topic:8,difficulty:"קשה",text:"וואשו לימדה שימפנזים אחרים סימנים. מה זה עשוי להצביע עליו?",options:["שהיא חיקתה בלבד","שיש העברה תרבותית בסיסית — העברת ידע בין פרטים","שהמאלף לימד את כולם","שזה מקרי"],correct:1,explanation:"העובדה שוואשו <b>לימדה שימפנזים אחרים</b> סימנים מצביעה על <b>העברה תרבותית בסיסית</b> — <b>העברת ידע בין פרטים</b>, לא רק למידה מאדם."},
{id:157,topic:9,difficulty:"קלה",text:"מהי הביטואציה?",options:["עלייה בתגובה","ירידה בתגובה לגירוי חוזר ולא משמעותי","שכחה","עייפות"],correct:1,explanation:"<b>הביטואציה</b> = <b>ירידה בתגובה</b> ל<b>גירוי חוזר</b> ולא משמעותי. היא <b>זמנית, ספציפית לגירוי</b>, ושונה מעייפות ומאדפטציה חושית."},
{id:158,topic:9,difficulty:"בינונית",text:"מהי דיס-הביטואציה ומדוע היא חשובה?",options:["עלייה בעייפות","חידוש תגובה ע\"י הצגת גירוי חדש — מוכיחה שהביטואציה היא למידה ולא עייפות","ירידה נוספת בתגובה","סוג של סנסיטיזציה"],correct:1,explanation:"<b>דיס-הביטואציה</b>: <b>חידוש התגובה</b> ע\"י הצגת <b>גירוי חדש</b> (ללא מנוחה). מוכיחה ש<b>הביטואציה היא למידה</b> — אם הייתה עייפות, גירוי חדש לא היה מחדש את התגובה."},
{id:159,topic:9,difficulty:"בינונית",text:"בניסוי תומפסון, חולדות שמעו טון חוזר ואז הוצג אור חדש. מה קרה?",options:["לא קרה כלום","התגובה לטון חזרה — דיס-הביטואציה","החולדות נרדמו","התגובה לטון נעלמה לחלוטין"],correct:1,explanation:"בניסוי <b>תומפסון</b>: חולדות <b>עברו הביטואציה</b> לטון חוזר. כשהוצג <b>אור חדש</b>, <b>התגובה לטון חזרה</b> — <b>דיס-הביטואציה</b>. מוכיח שזו למידה, לא עייפות."},
{id:160,topic:9,difficulty:"קשה",text:"כיצד עוצמת הגירוי משפיעה על קצב ההביטואציה?",options:["גירוי חזק = הביטואציה מהירה","גירוי חזק = הביטואציה איטית; גירוי חלש = הביטואציה מהירה","אין השפעה","גירוי חלש = הביטואציה איטית"],correct:1,explanation:"<b>עוצמת גירוי</b>: גירוי <b>חזק</b> = הביטואציה <b>איטית</b> (קשה להתעלם). גירוי <b>חלש</b> = הביטואציה <b>מהירה</b>. ככל שהגירוי פחות בולט, קל יותר להתרגל אליו."},
{id:161,topic:9,difficulty:"קלה",text:"מהו אפקט קולידג'?",options:["עלייה בתגובה לאותו פרטנר","הביטואציה לפרטנר מוכר ודיס-הביטואציה (חידוש עניין) לפרטנר חדש","ירידה בכל תגובה מינית","סנסיטיזציה לפרטנרים"],correct:1,explanation:"<b>אפקט קולידג'</b>: <b>הביטואציה</b> (ירידת עניין) ל<b>פרטנר מוכר</b>, ו<b>דיס-הביטואציה</b> (חידוש עניין) ל<b>פרטנר חדש</b>."},
{id:162,topic:9,difficulty:"קשה",text:"מהו מודל התהליך הכפול (Dual Process) ומה הוא מנבא?",options:["רק הביטואציה פועלת","הביטואציה וסנסיטיזציה פועלות במקביל; גירוי חלש → הביטואציה דומיננטית, חזק → סנסיטיזציה דומיננטית","רק סנסיטיזציה פועלת","שני תהליכים שלא קשורים"],correct:1,explanation:"<b>מודל תהליך כפול</b>: <b>הביטואציה וסנסיטיזציה פועלות במקביל</b>. התוצאה = שקלול. גירוי <b>חלש</b> → הביטואציה דומיננטית. גירוי <b>חזק</b> → סנסיטיזציה דומיננטית."},
{id:163,topic:9,difficulty:"בינונית",text:"כיצד תדירות הגירוי משפיעה על הביטואציה?",options:["תדירות גבוהה = הביטואציה איטית","תדירות גבוהה = הביטואציה מהירה","אין השפעה","תדירות נמוכה = הביטואציה מהירה"],correct:1,explanation:"<b>תדירות גבוהה</b> = הביטואציה <b>מהירה</b>. ככל שהגירוי <b>תכוף יותר</b>, ההביטואציה <b>מהירה יותר</b> — החשיפה הרבה מאפשרת ללמוד מהר שהגירוי לא משמעותי."},
{id:164,topic:9,difficulty:"קשה",text:"מדוע סנסיטיזציה דומה ל-PTSD?",options:["שתיהן ירידה בתגובה","סנסיטיזציה = מצב עוררות כללי שגורם תגובה למגוון רמזים, דומה לדריכות מתמדת ב-PTSD","אין קשר","שתיהן הביטואציה"],correct:1,explanation:"<b>סנסיטיזציה</b> = <b>מצב עוררות כללי</b> שגורם <b>תגובה למגוון רמזים</b> (לא ספציפי). דומה ל-<b>PTSD</b>: דריכות מתמדת, תגובה מוגברת לגירויים שונים שמזכירים את הטראומה."},
{id:165,topic:9,difficulty:"בינונית",text:"מה ההבדל בין הביטואציה לאדפטציה חושית?",options:["אין הבדל","הביטואציה = למידה (מוחית); אדפטציה = שינוי באיבר החישה עצמו","שתיהן למידה","שתיהן פיזיולוגיות"],correct:1,explanation:"<b>הביטואציה</b> = <b>למידה</b> ברמת <b>המוח</b>. <b>אדפטציה חושית</b> = שינוי <b>באיבר החישה עצמו</b> (למשל, העין מתרגלת לאור). הביטואציה היא תהליך מורכב יותר."},
{id:166,topic:10,difficulty:"קלה",text:"מי הם קופי האדם (Great Apes)?",options:["רק שימפנזים","שימפנזים, בונובוס, גורילות ואורנגאוטנים","כל הקופים","רק גורילות"],correct:1,explanation:"<b>קופי אדם (Great Apes)</b>: <b>שימפנזים, בונובוס, גורילות ואורנגאוטנים</b>. הם הקרובים האבולוציוניים ביותר לאדם."},
{id:167,topic:10,difficulty:"בינונית",text:"מהו מבחן Red Mark (גאלופ, הייס) ומה הוא בודק?",options:["יכולת ראייה","מודעות עצמית — האם בעל החיים מזהה את עצמו במראה ונוגע בסימן אדום על פניו","יכולת למידה","יכולת שימוש בכלים"],correct:1,explanation:"<b>מבחן Red Mark</b> (גאלופ, הייס): מניחים <b>סימן אדום</b> על פני בעל החיים. אם הוא <b>נוגע בסימן במראה</b> — יש <b>מודעות עצמית</b>. שימפנזים עוברים את המבחן."},
{id:168,topic:10,difficulty:"קשה",text:"מהי הגדרת תרבות לפי טיילור?",options:["שימוש בכלים","שלמות מורכבת של ידע, אמונה, אומנויות, מוסר, חוק ומנהגים","שפה בלבד","חינוך פורמלי"],correct:1,explanation:"<b>הגדרת תרבות (טיילור)</b>: <b>שלמות מורכבת</b> של <b>ידע, אמונה, אומנויות, מוסר, חוק ומנהגים</b> שאדם רוכש כחבר בחברה."},
{id:169,topic:10,difficulty:"בינונית",text:"האם שימפנזים מלמדים דורות הבאים? מה השאלה המרכזית?",options:["כן, בוודאות","השאלה היא האם מדובר בהוראה מכוונת או בחיקוי בלבד","לא, הם לא מעבירים ידע","הם לומדים רק מאדם"],correct:1,explanation:"השאלה המרכזית: האם שימפנזים <b>מלמדים בהוראה מכוונת</b> או שהצעירים <b>מחקים</b> בלבד? ההבדל קריטי להגדרת 'תרבות' במובן האנושי."},
{id:170,topic:10,difficulty:"קשה",text:"מה ההבדל בין שתי ההשערות לגבי ייחוד האינטליגנציה האנושית?",options:["אין הבדל","השערת כלים/שפה מתמקדת ביכולות ספציפיות; השערת האינטליגנציה התרבותית מתמקדת ביכולת לחיות בסביבה תרבותית","אחת מדברת על גנטיקה והשנייה על סביבה","שתיהן זהות"],correct:1,explanation:"1) <b>השערת כלים/שפה</b>: יכולות <b>ספציפיות</b> (כלים, שפה) הניעו התפתחות. 2) <b>אינטליגנציה תרבותית</b>: יכולות שהתפתחו מ<b>חיים בסביבה עם תרבות</b> — העברה בין-דורית של ידע."},
{id:171,topic:1,difficulty:"קשה",text:"איזה סוג זיכרון תלוי בגרעיני הבסיס ובצרבלום?",options:["אפיזודי","סמנטי","פרוצדורלי","קצר-טווח"],correct:2,explanation:"<b>זיכרון פרוצדורלי</b> (מיומנויות מוטוריות) תלוי ב<b>גרעיני הבסיס (Basal Ganglia)</b> וב<b>צרבלום (Cerebellum)</b>. לכן הוא נשמר גם כשההיפוקמפוס נפגע (כמו אצל H.M. וקלייב)."},
{id:172,topic:1,difficulty:"בינונית",text:"מדוע הציטוט 'אנחנו מה שאנחנו בגלל מה שאנחנו לומדים ומה שאנחנו זוכרים' חשוב?",options:["כי הוא של פבלוב","כי הוא ממחיש שזהותנו נבנית מהלמידה והזיכרון שלנו","כי הוא מדבר על גנטיקה","כי הוא לא חשוב"],correct:1,explanation:"הציטוט (של <b>קנדל</b>) ממחיש שה<b>זהות האישית</b> נבנית מ<b>הלמידה והזיכרון</b>. ללא זיכרון (כמו אצל קלייב), חלק מהזהות נאבד."},
{id:173,topic:2,difficulty:"קלה",text:"מי הדגים את תופעת החותמה עם ברווזים?",options:["פבלוב","ת'ורנדייק","לורנץ","סקינר"],correct:2,explanation:"<b>לורנץ</b> הדגים את <b>החותמה (Imprinting)</b> כאשר <b>ברווזים</b> הלכו אחריו כאילו הוא 'האם' — כי הוא היה הגירוי הראשון שראו בחלון הזמן הקריטי."},
{id:174,topic:2,difficulty:"קשה",text:"כיצד הדוגמה של צרעות וסחלבים ממחישה את האינטראקציה בין אינסטינקט ללמידה?",options:["הסחלב מלמד את הצרעה","הצרעה מגיבה באינסטינקט לריח הפרומון (מהסחלב), אך לומדת (הביטואציה) שהגירוי לא אמיתי","הצרעה לא לומדת כלום","הסחלב משנה את הגנטיקה"],correct:1,explanation:"הצרעה מגיבה <b>אינסטינקטיבית</b> לריח סחלב שמחקה פרומון, אך עם הזמן עוברת <b>הביטואציה</b> (למידה). זו דוגמה ל<b>אינטראקציה בין אינסטינקט ללמידה</b> — Biased Learning."},
{id:175,topic:3,difficulty:"קשה",text:"מה ההבדל העיקרי בין למידה הדרגתית ללמידה מתוך תובנה?",options:["אין הבדל","הדרגתית = ניסוי ושגיאה, שיפור הדרגתי; תובנה = פתרון פתאומי ללא ניסוי ושגיאה","הדרגתית = מהירה; תובנה = איטית","שתיהן ניסוי ושגיאה"],correct:1,explanation:"<b>למידה הדרגתית</b> (ת'ורנדייק) = <b>ניסוי ושגיאה</b>, שיפור <b>הדרגתי</b>. <b>למידה מתוך תובנה</b> (קוהלר) = <b>פתרון פתאומי</b>, 'הברקה', ללא ניסוי ושגיאה מוקדם."},
{id:176,topic:4,difficulty:"קלה",text:"מהו CS (גירוי מותנה) בניסוי פבלוב?",options:["הבשר","הריור","הפעמון/מטרונום","האור"],correct:2,explanation:"ה-<b>CS (גירוי מותנה)</b> בניסוי פבלוב הוא <b>הפעמון/מטרונום</b> — גירוי שהיה ניטרלי בהתחלה ולאחר זיווג עם UCS (בשר) הפך למעורר תגובה."},
{id:177,topic:4,difficulty:"בינונית",text:"לוגו מקדונלדס מעורר תיאבון. זו דוגמה ל:",options:["התניה אופרנטית","התניה קלאסית מדרגה שנייה","הביטואציה","עונש"],correct:1,explanation:"הלוגו של מקדונלדס הוא <b>CS מדרגה שנייה</b>: הוא זווג עם <b>החוויה</b> (CS מדרגה ראשונה) שזווגה עם <b>האוכל</b> (UCS). לכן הלוגו לבד מעורר תיאבון — <b>התניה מדרגה שנייה</b>."},
{id:178,topic:5,difficulty:"קשה",text:"מדוע Re-acquisition (רכישה מחדש) מהירה יותר מהרכישה המקורית?",options:["כי הנבדק מנוסה יותר","כי הקשר המקורי לא נמחק בהכחדה — ולכן הלמידה מחדש מהירה","כי ה-UCS חזק יותר","כי ה-CS השתנה"],correct:1,explanation:"<b>Re-acquisition מהירה</b> כי <b>הקשר המקורי לא נמחק</b> בהכחדה. ההכחדה היא <b>למידה חדשה</b> שמדכאת את הקשר, אך הקשר עדיין קיים — ולכן למידה מחדש מהירה."},
{id:179,topic:5,difficulty:"בינונית",text:"מהי התניית נגד (Counter-conditioning)?",options:["חיזוק ההתניה המקורית","זיווג ה-CS עם תגובה הפוכה (למשל, הרפיה במקום פחד)","מחיקת הזיכרון","הוספת CS חדש"],correct:1,explanation:"<b>התניית נגד</b>: <b>זיווג ה-CS</b> עם <b>תגובה הפוכה</b> מהתגובה המותנית. למשל: CS שמעורר פחד מזווג עם <b>הרפיה</b> — כך נוצרת אסוציאציה חדשה שמחליפה את הפחד."},
{id:180,topic:6,difficulty:"קלה",text:"חרמה מטלוויזיה כשילד לא מסדר חדר היא דוגמה ל:",options:["חיזוק חיובי","חיזוק שלילי","עונש חיובי","עונש שלילי — הסרת גירוי חיובי"],correct:3,explanation:"חרמה מטלוויזיה = <b>עונש שלילי</b>: <b>הסרת גירוי חיובי</b> (טלוויזיה) כדי <b>להפחית</b> התנהגות (אי-סידור חדר)."},
{id:181,topic:7,difficulty:"קלה",text:"מה קורה לביצועים כשרמת העוררות נמוכה מדי?",options:["ביצועים אופטימליים","ביצועים נמוכים — חוסר מוטיבציה ואדישות","ביצועים גבוהים","אין השפעה"],correct:1,explanation:"לפי <b>ירקס-דודסון</b>, עוררות <b>נמוכה מדי</b> = <b>ביצועים נמוכים</b> בגלל חוסר מוטיבציה ואדישות. צריך רמת עוררות <b>בינונית</b> לביצועים אופטימליים."},
{id:182,topic:7,difficulty:"בינונית",text:"מהם flashbulb memories?",options:["זיכרונות שנמחקים מהר","זיכרונות חיים ומפורטים לאירועים רגשיים משמעותיים","זיכרונות מילדות בלבד","זיכרונות פרוצדורליים"],correct:1,explanation:"<b>Flashbulb memories</b> = זיכרונות <b>חיים ומפורטים</b> לאירועים <b>רגשיים משמעותיים</b>. גאי וצ'ליל (1999) טענו שהם לא מוסברים ע\"י שינון חוזר אלא ע\"י עיבוד מוחי ייחודי."},
{id:183,topic:7,difficulty:"קשה",text:"כריסטיאנסון ולופטוס מצאו שרגש משפר gist אך פוגע בפרטים פריפריאליים. כיצד זה מתיישב עם תיאוריית אייסטרברוק?",options:["לא מתיישב","עוררות גבוהה מצמצמת טווח רמזים — הקשב מתמקד בגירוי המרכזי (gist) על חשבון הפריפריה","אייסטרברוק חלק על כריסטיאנסון","אין קשר בין השניים"],correct:1,explanation:"<b>אייסטרברוק</b>: עוררות גבוהה <b>מצמצמת טווח רמזים</b>. <b>כריסטיאנסון ולופטוס</b>: רגש משפר <b>gist</b> (מרכזי) ופוגע ב<b>פריפריאלי</b>. שני הממצאים מתיישבים — <b>Narrowing of Attention</b>."},
{id:184,topic:8,difficulty:"קלה",text:"באיזו שנה החלו גרדנר וגרדנר ללמד את וואשו שפת סימנים?",options:["1950","1966","1979","1990"],correct:1,explanation:"<b>גרדנר וגרדנר</b> החלו ללמד את <b>וואשו</b> שפת סימנים אמריקאית (ASL) ב-<b>1966</b>."},
{id:185,topic:8,difficulty:"בינונית",text:"מה השם של השימפנזה שטראס (1979) חקר?",options:["וואשו","קנזי","נים","סולטן"],correct:2,explanation:"<b>טראס (1979)</b> חקר את השימפנזה <b>נים (Nim Chimpsky)</b> והגיע למסקנות ביקורתיות על יכולות השפה של שימפנזים."},
{id:186,topic:8,difficulty:"קשה",text:"מהו ההבדל המהותי בין עמדת טראס לעמדת גרדנר לגבי שפה בשימפנזים?",options:["אין הבדל","גרדנר ראו שפה אמיתית; טראס טען שזה חיקוי ותגובה מותנית ולא שפה ספונטנית","שניהם חשבו שזו שפה","שניהם חשבו שזה לא שפה"],correct:1,explanation:"<b>גרדנר</b>: שימפנזים מסוגלים ל<b>שפה אמיתית</b>. <b>טראס</b>: מה שנראה כשפה הוא <b>חיקוי</b>, <b>לא ספונטני</b>, ב<b>סדר אקראי</b>, ללא <b>משפטים מורכבים</b> — לא שפה אמיתית."},
{id:187,topic:9,difficulty:"קלה",text:"מהי סנסיטיזציה?",options:["ירידה בתגובה","עלייה בתגובה לגירוי, מצב עוררות כללי","שכחה","אדפטציה"],correct:1,explanation:"<b>סנסיטיזציה</b> = <b>עלייה בתגובה</b> לגירוי. בניגוד להביטואציה, היא <b>לא ספציפית לגירוי</b> — מדובר ב<b>מצב עוררות כללי</b> שגורם תגובה מוגברת למגוון רמזים."},
{id:188,topic:9,difficulty:"בינונית",text:"כיצד מורכבות הגירוי משפיעה על קצב ההביטואציה?",options:["גירוי מורכב = הביטואציה מהירה","גירוי מורכב = הביטואציה איטית","אין השפעה","גירוי פשוט = הביטואציה איטית"],correct:1,explanation:"גירוי <b>מורכב</b> = הביטואציה <b>איטית</b>. ככל שהגירוי <b>מורכב יותר</b>, קשה יותר ל'להתרגל' אליו כי יש יותר מרכיבים לעבד."},
{id:189,topic:9,difficulty:"קשה",text:"מדוע החלמה ספונטנית מוכיחה שהביטואציה היא למידה זמנית?",options:["כי התגובה נעלמת לצמיתות","כי לאחר הפסקה התגובה חוזרת — מה שמראה שההביטואציה לא מחקה אלא מדכאת זמנית","כי אין החלמה","כי ההביטואציה קבועה"],correct:1,explanation:"<b>החלמה ספונטנית</b>: לאחר <b>תקופת הפסקה</b>, <b>התגובה חוזרת</b>. זה מוכיח שההביטואציה <b>לא מחקה</b> את התגובה אלא <b>מדכאת אותה זמנית</b>. לכן היא למידה <b>זמנית</b>."},
{id:190,topic:10,difficulty:"קלה",text:"מהו אחוז הדמיון הגנטי בין שימפנזים לבני אדם?",options:["50%","75%","99%","100%"],correct:2,explanation:"קיים <b>99% דמיון גנטי</b> בין שימפנזים לבני אדם. ה-1% הנותר מתבטא בהבדלים משמעותיים ביכולות קוגניטיביות."},
{id:191,topic:10,difficulty:"בינונית",text:"שימפנזים משתמשים בענפים, אבנים ועלים ככלים. מה ניתן ללמוד מכך?",options:["שהם לא חכמים","שיש להם יכולת קוגניטיבית מתקדמת ושימוש בכלים","שהם מחקים בני אדם בלבד","שזה אינסטינקט בלבד"],correct:1,explanation:"שימוש ב<b>ענפים, אבנים ועלים</b> ככלים מעיד על <b>יכולת קוגניטיבית מתקדמת</b>. ההבדלים בין אוכלוסיות שונות מרמזים על <b>'תרבות'</b> — העברת ידע בין דורות."},
{id:192,topic:10,difficulty:"קשה",text:"מדוע ההבדלים בשימוש בכלים בין אוכלוסיות שימפנזים מרמזים על 'תרבות'?",options:["כי כולם משתמשים באותם כלים","כי אוכלוסיות שונות פיתחו שיטות שונות — מה שמרמז על העברת ידע בין-דורית ולא רק גנטיקה","כי אין הבדלים","כי הם למדו מבני אדם"],correct:1,explanation:"אוכלוסיות שימפנזים שונות משתמשות ב<b>כלים שונים</b>. זה לא מוסבר ע\"י <b>גנטיקה</b> (אותו מין) אלא ע\"י <b>העברת ידע בין-דורית</b> — הגדרה בסיסית של <b>'תרבות'</b>."},
{id:193,topic:1,difficulty:"קלה",text:"מהו זיכרון סמנטי?",options:["זיכרון לאירועים אישיים","זיכרון לעובדות כלליות ללא קונטקסט ספציפי","זיכרון מוטורי","זיכרון קצר-טווח"],correct:1,explanation:"<b>זיכרון סמנטי</b> = זיכרון ל<b>עובדות כלליות</b> ללא קונטקסט ספציפי. למשל: 'פריז היא בירת צרפת' — ידע כללי ללא זיכרון מתי למדנו אותו."},
{id:194,topic:1,difficulty:"בינונית",text:"מדוע הזיכרון הפרוצדורלי של קלייב נשמר אך הוא לא הצליח ללמוד הרגלים חדשים?",options:["כי הרגלים וזיכרון פרוצדורלי זהים","כי הרגלים חדשים דורשים היפוקמפוס, בעוד מיומנויות ישנות (כמו פסנתר) כבר מאוחסנות בגרעיני הבסיס","כי הוא לא רצה","כי הרגלים לא קשורים לזיכרון"],correct:1,explanation:"<b>מיומנויות ישנות</b> (פסנתר) כבר <b>מאוחסנות בגרעיני הבסיס</b> ונשמרו. אך <b>הרגלים חדשים</b> דורשים יצירת קשרים חדשים, תהליך שנפגע עם פגיעה ב<b>היפוקמפוס</b>."},
{id:195,topic:2,difficulty:"בינונית",text:"מהו Sign Stimulus (גירוי מסמן)?",options:["כל גירוי בסביבה","גירוי ספציפי שמפעיל תבנית פעולה קבועה (FAP)","גירוי מותנה","גירוי עונשי"],correct:1,explanation:"<b>Sign Stimulus (גירוי מסמן)</b>: גירוי <b>ספציפי</b> בסביבה ש<b>מפעיל FAP</b>. דוגמאות: נקודה אדומה על מקור (שחפים), בטן אדומה (סטיקלבק)."},
{id:196,topic:2,difficulty:"קשה",text:"מדוע דגי סטיקלבק תקפו גם אובייקטים שאינם דגים אם הייתה להם בטן אדומה?",options:["כי הם אגרסיביים","כי ה-FAP מופעל ע\"י Sign Stimulus ספציפי (בטן אדומה) ולא ע\"י זיהוי מלא של האובייקט","כי הם עיוורים","כי הם למדו לתקוף"],correct:1,explanation:"ה-<b>FAP מופעל ע\"י Sign Stimulus ספציפי</b> — <b>בטן אדומה</b>. הדגים לא 'מזהים' אם זה דג אמיתי; הם <b>מגיבים אוטומטית</b> לגירוי המסמן. זו <b>נוקשות</b> אופיינית ל-FAP."},
{id:197,topic:3,difficulty:"בינונית",text:"מדוע בחר ת'ורנדייק חתולים לניסוי תיבת הפאזל?",options:["כי הם חכמים במיוחד","כי הם מייצגים למידה בסיסית ע\"י ניסוי ושגיאה — ללא תובנה","כי הם זולים","כי פבלוב המליץ"],correct:1,explanation:"ת'ורנדייק בחר חתולים כי הם מדגימים <b>למידה הדרגתית ע\"י ניסוי ושגיאה</b>. בניגוד לשימפנזים, חתולים לא מפגינים <b>תובנה</b> — הם משפרים בהדרגה."},
{id:198,topic:4,difficulty:"קשה",text:"מדוע אזעקות בלונדון המשיכו לעורר פחד גם אחרי המלחמה?",options:["כי האנשים אהבו אזעקות","כי זו CER — תגובה רגשית מותנית: הצפירה (CS) זווגה עם הפצצות (UCS) ועוררה פחד גם ללא סכנה","כי זו הביטואציה","כי זה אינסטינקט"],correct:1,explanation:"<b>CER (Conditioned Emotional Response)</b>: <b>צפירת אזעקה</b> (CS) <b>זווגה</b> עם <b>הפצצות</b> (UCS). גם אחרי המלחמה, הצפירה <b>עוררה פחד</b> — תגובה רגשית מותנית, קשורה ל<b>PTSD</b>."},
{id:199,topic:4,difficulty:"בינונית",text:"מהו ISI (Inter-Stimulus Interval)?",options:["זמן בין שני חיזוקים","הזמן בין הצגת ה-CS לבין הצגת ה-UCS","זמן בין שני ניסויים","זמן בין שתי תגובות"],correct:1,explanation:"<b>ISI (Inter-Stimulus Interval)</b> = הזמן בין הצגת ה-<b>CS</b> לבין הצגת ה-<b>UCS</b>. בדרך כלל ISI קצר עדיף, אך ב-<b>CTA</b> ייחודי ש-ISI יכול להיות <b>שעות</b>."},
{id:200,topic:5,difficulty:"קלה",text:"מהו CBT?",options:["סוג של תרופה","טיפול קוגניטיבי-התנהגותי — שיטת טיפול מבוססת הכחדה","סוג של חיזוק","מבחן אינטליגנציה"],correct:1,explanation:"<b>CBT (Cognitive Behavioral Therapy)</b> = <b>טיפול קוגניטיבי-התנהגותי</b>. שיטת טיפול שמשלבת עקרונות של <b>הכחדה</b> וחשיפה עם שינוי דפוסי חשיבה."},
{id:201,topic:5,difficulty:"בינונית",text:"מהו היתרון של חשיפה ב-VR (מציאות מדומה) לטיפול בפוביות?",options:["היא זולה יותר","היא מאפשרת חשיפה מבוקרת לגירויים שקשה לשחזר במציאות","היא לא עובדת","היא מהירה יותר מכל שיטה"],correct:1,explanation:"חשיפה ב-<b>VR</b> מאפשרת <b>חשיפה מבוקרת</b> לגירויים ש<b>קשה לשחזר</b> במציאות (טיסה, גובה). מבוססת על עקרון <b>ההכחדה</b> — חשיפה ל-CS ללא UCS."},
{id:202,topic:5,difficulty:"קשה",text:"מה ההבדל בין חשיפה חיה (in vivo) לבין חשיפה בדמיון?",options:["אין הבדל","חשיפה חיה = מפגש אמיתי עם הגירוי; חשיפה בדמיון = דמיון מודרך של הגירוי","חשיפה חיה = VR; חשיפה בדמיון = סרט","שתיהן זהות"],correct:1,explanation:"<b>חשיפה חיה (in vivo)</b> = <b>מפגש ממשי</b> עם הגירוי המפחיד. <b>חשיפה בדמיון</b> = <b>דמיון מודרך</b> של הסיטואציה. שתיהן מבוססות על <b>הכחדה</b> אך שונות בעוצמה."},
{id:203,topic:6,difficulty:"בינונית",text:"מה ההבדל בין חיזוק חיובי לעונש חיובי?",options:["אין הבדל — שניהם חיוביים","חיזוק חיובי = הוספת גירוי נעים שמחזקת התנהגות; עונש חיובי = הוספת גירוי אוורסיבי שמחלישה","שניהם מחזקים","שניהם מחלישים"],correct:1,explanation:"<b>חיזוק חיובי</b> = <b>הוספת גירוי נעים</b> → <b>מחזק</b> התנהגות. <b>עונש חיובי</b> = <b>הוספת גירוי אוורסיבי</b> → <b>מחליש</b> התנהגות. 'חיובי' = הוספה, ההבדל בסוג הגירוי."},
{id:204,topic:6,difficulty:"קשה",text:"מדוע לוח חיזוק VI (מרווח משתנה) מייצר קצב תגובה יציב?",options:["כי החיזוק קבוע","כי הנבדק לא יכול לחזות מתי יגיע החיזוק ולכן מגיב בקצב יציב ועקבי","כי יש הפסקות ארוכות","כי הנבדק מתעייף"],correct:1,explanation:"ב-<b>VI (מרווח משתנה)</b>, החיזוק מגיע אחרי <b>זמן משתנה</b>. הנבדק <b>לא יכול לחזות</b> מתי יגיע ולכן <b>מגיב בקצב יציב ועקבי</b> — בניגוד ל-FI שם יש scalloping."},
{id:205,topic:6,difficulty:"קלה",text:"נזיפה בילד שמכה היא דוגמה ל:",options:["חיזוק חיובי","חיזוק שלילי","עונש חיובי — הוספת גירוי אוורסיבי","עונש שלילי"],correct:2,explanation:"נזיפה = <b>עונש חיובי</b>: <b>הוספת גירוי אוורסיבי</b> (הנזיפה) כדי <b>להפחית</b> את ההתנהגות (הכאה)."},
{id:206,topic:6,difficulty:"בינונית",text:"לקיחת אספירין שמסירה כאב ראש מחזקת את לקיחת האספירין. זהו:",options:["חיזוק חיובי","חיזוק שלילי — הסרת גירוי לא נעים","עונש חיובי","עונש שלילי"],correct:1,explanation:"<b>חיזוק שלילי</b>: <b>הסרת גירוי לא נעים</b> (כאב ראש) <b>מחזקת</b> את ההתנהגות (לקיחת אספירין). הכאב נעלם = חיזוק."},
{id:207,topic:7,difficulty:"בינונית",text:"מדוע עדי ראייה לפשע עם נשק נוטים לזהות פחות טוב את הפושע?",options:["כי הם לא רוצים לזהות","כי אפקט פוקוס הנשק גורם לקשב להתמקד בנשק על חשבון זיהוי הפנים","כי הם בהלם","כי הם שוכחים"],correct:1,explanation:"<b>אפקט פוקוס הנשק</b>: <b>הקשב מצטמצם</b> ומתמקד ב<b>אובייקט המאיים</b> (נשק) <b>על חשבון</b> זיהוי פרטים אחרים כמו <b>פנים הפושע</b>."},
{id:208,topic:7,difficulty:"קשה",text:"סטודנט שלומד למבחן — עוררות בינונית משפרת ביצועים, אך חרדה גבוהה פוגעת. איזה עיקרון מתואר?",options:["חוק האפקט","עקומת ירקס-דודסון — עוררות בינונית אופטימלית, קיצונית פוגעת","אפקט פוקוס הנשק","הביטואציה"],correct:1,explanation:"<b>ירקס-דודסון</b>: <b>עוררות בינונית</b> = ביצועים <b>אופטימליים</b>. <b>חרדה גבוהה</b> (עוררות קיצונית) = <b>פגיעה</b> בביצועים. <b>U הפוך</b>."},
{id:209,topic:8,difficulty:"בינונית",text:"מה הראה קנזי שהיה שונה מכל השימפנזים שלפניו?",options:["הוא למד יותר מילים","הוא למד ספונטנית מצפייה ולא מאילוף ישיר","הוא דיבר באנגלית","הוא כתב"],correct:1,explanation:"<b>קנזי</b> היה ייחודי כי <b>למד ספונטנית מצפייה</b> באמו ומסרטים — <b>לא מאילוף ישיר</b>. זה הפריך את הטענה שכל למידת שפה בקופים היא רק תגובה לחיזוק."},
{id:210,topic:9,difficulty:"קלה",text:"מה ההבדל המרכזי בין הביטואציה לסנסיטיזציה?",options:["אין הבדל","הביטואציה = ירידה בתגובה, ספציפית; סנסיטיזציה = עלייה בתגובה, לא ספציפית","שתיהן עלייה","שתיהן ירידה"],correct:1,explanation:"<b>הביטואציה</b> = <b>ירידה</b> בתגובה, <b>ספציפית</b> לגירוי. <b>סנסיטיזציה</b> = <b>עלייה</b> בתגובה, <b>לא ספציפית</b> — מצב עוררות כללי."},
{id:211,topic:10,difficulty:"בינונית",text:"אילו קופי אדם עוברים את מבחן Red Mark?",options:["רק שימפנזים","שימפנזים, בונובוס, גורילות ואורנגאוטנים","אף אחד","רק בני אדם"],correct:1,explanation:"<b>קופי אדם</b> — <b>שימפנזים, בונובוס, גורילות ואורנגאוטנים</b> — עוברים את <b>מבחן Red Mark</b> ומפגינים <b>מודעות עצמית</b>."},
{id:212,topic:10,difficulty:"קשה",text:"פינקר וצ'ומסקי טענו ששפה היא ייחודית לאדם. כיצד ממצאי קנזי מאתגרים טענה זו?",options:["הם לא מאתגרים","קנזי הפגין תקשורת ספונטנית ולא רק חיקוי — מה שמאתגר את הטענה שרק בני אדם מסוגלים לשפה","קנזי הוכיח שפינקר צודק","קנזי לא למד שפה"],correct:1,explanation:"<b>קנזי</b> הפגין <b>תקשורת ספונטנית</b>, למד <b>מצפייה</b> (לא מאילוף), והבין משפטים מורכבים. זה <b>מאתגר</b> את טענת <b>פינקר וצ'ומסקי</b> ששפה ייחודית לאדם — אם כי עדיין לא ברמה אנושית."},
{id:213,topic:1,difficulty:"קשה",text:"H.M. לא יכול היה ליצור זיכרונות דקלרטיביים חדשים אך שמר על זיכרון פרוצדורלי. מה המסקנה?",options:["שכל הזיכרון בהיפוקמפוס","שהיפוקמפוס קריטי לזיכרון דקלרטיבי אך זיכרון פרוצדורלי מעובד באזורים אחרים","שאין סוגי זיכרון שונים","שזיכרון פרוצדורלי חשוב יותר"],correct:1,explanation:"<b>H.M.</b> מלמד ש<b>היפוקמפוס קריטי</b> ל<b>זיכרון דקלרטיבי</b> (אפיזודי + סמנטי), אך <b>זיכרון פרוצדורלי</b> מעובד ב<b>אזורים אחרים</b> (גרעיני הבסיס, צרבלום)."},
{id:214,topic:1,difficulty:"בינונית",text:"מה תיאר אריק קנדל ברמה המולקולרית?",options:["את מבנה ה-DNA","את הבסיס המולקולרי של זיכרון קצר-טווח וארוך-טווח","את מבנה העין","את מערכת העיכול"],correct:1,explanation:"<b>אריק קנדל</b> תיאר את <b>הבסיס המולקולרי</b> של <b>זיכרון קצר-טווח וארוך-טווח</b> בחקר אפליזיה (שבלול ים), ועל כך קיבל <b>נובל 2000</b>."},
{id:215,topic:2,difficulty:"קלה",text:"איזה חוקר קשור לתופעת החותמה אצל ברווזים?",options:["פבלוב","לורנץ","טינברגן","ת'ורנדייק"],correct:1,explanation:"<b>לורנץ</b> הוא החוקר הקשור ל<b>חותמה (Imprinting)</b>. הוא הדגים שברווזים 'מחתימים' על האובייקט הראשון שרואים ב<b>חלון הזמן הקריטי</b>."},
{id:216,topic:3,difficulty:"קלה",text:"מהי למידה מתוך תובנה (Insight)?",options:["למידה הדרגתית","פתרון פתאומי של בעיה ללא ניסוי ושגיאה מוקדם","למידה ע\"י חיקוי","למידה ע\"י חיזוק"],correct:1,explanation:"<b>למידה מתוך תובנה (Insight)</b> = <b>פתרון פתאומי</b> של בעיה — 'הברקה'. <b>קוהלר</b> הדגים זאת עם שימפנזים שפתרו בעיות ללא ניסוי ושגיאה הדרגתי."},
{id:217,topic:4,difficulty:"קלה",text:"מהי התגובה המותנית (CR) בניסוי פבלוב?",options:["ריור בתגובה לבשר","ריור בתגובה לפעמון","פחד מרעש","בריחה"],correct:1,explanation:"ה-<b>CR (תגובה מותנית)</b> בניסוי פבלוב = <b>ריור בתגובה לפעמון</b>. לפני ההתניה הפעמון לא עורר ריור; אחרי ההתניה — הפעמון לבדו מעורר ריור."},
{id:218,topic:4,difficulty:"בינונית",text:"מה מוכיח שב-CTA יש מוכנות ביולוגית?",options:["שצריך הרבה זיווגים","שחשיפה אחת מספיקה עם ISI של שעות — מנוגד לכללי ההתניה הרגילים","שאי אפשר ליצור CTA","שזה עובד רק על בני אדם"],correct:1,explanation:"<b>מוכנות ביולוגית</b> ב-CTA: <b>חשיפה אחת</b> מספיקה ו-<b>ISI של שעות</b> (בניגוד לשניות בהתניה רגילה). האורגניזם <b>מוכן ביולוגית</b> לקשר טעם עם מחלה — ערך הישרדותי."},
{id:219,topic:5,difficulty:"בינונית",text:"מהו ההבדל בין הכחדה לשכחה?",options:["אין הבדל","הכחדה = למידה חדשה פעילה שמדכאת תגובה; שכחה = דעיכה פסיבית","הכחדה = מהירה; שכחה = איטית","שתיהן אותו דבר"],correct:1,explanation:"<b>הכחדה ≠ שכחה</b>. הכחדה = <b>למידה חדשה פעילה</b> שמדכאת את התגובה המותנית. שכחה = <b>דעיכה פסיבית</b>. ההוכחה: החלמה ספונטנית, Renewal, Reinstatement."},
{id:220,topic:6,difficulty:"קשה",text:"מדוע הימורים ממכרים כל כך מנקודת מבט של לוחות חיזוק?",options:["כי הזכייה גדולה","כי הם מבוססים על VR — יחס משתנה שמייצר קצב תגובה גבוה ועמידות גבוהה בפני הכחדה","כי יש חיזוק בכל פעם","כי יש עונש"],correct:1,explanation:"הימורים = <b>VR (יחס משתנה)</b>: החיזוק (זכייה) מגיע אחרי <b>מספר בלתי צפוי</b> של תגובות. זה מייצר <b>קצב גבוה</b> ו<b>עמידות גבוהה בפני הכחדה</b> — לכן <b>ממכרים</b>."},
{id:221,topic:6,difficulty:"בינונית",text:"עובד מקבל משכורת בסוף כל חודש. איזה לוח חיזוק זה?",options:["FR","VR","FI — מרווח קבוע","VI"],correct:2,explanation:"משכורת חודשית = <b>FI (מרווח קבוע)</b>: החיזוק (משכורת) מגיע אחרי <b>פרק זמן קבוע</b> (חודש), ללא קשר לכמות העבודה. אופייני דפוס <b>scalloping</b>."},
{id:222,topic:7,difficulty:"קלה",text:"מי חקרו את ההשפעה של קורטיזול על זיכרון?",options:["פבלוב","בוקאנאן ולובאלו (2001)","ת'ורנדייק","קוהלר"],correct:1,explanation:"<b>בוקאנאן ולובאלו (2001)</b> חקרו את השפעת <b>קורטיזול</b> על זיכרון ומצאו שהוא משפר קידוד רגשי ופוגע בקידוד ניטרלי."},
{id:223,topic:8,difficulty:"קלה",text:"מהו grammar universals שפינקר וצ'ומסקי מדברים עליו?",options:["כללי דקדוק ספציפיים לאנגלית","מבנים דקדוקיים אוניברסליים המשותפים לכל השפות האנושיות — מולדים","כללים שבעלי חיים מבינים","שפת סימנים"],correct:1,explanation:"<b>Grammar universals</b> (צ'ומסקי): <b>מבנים דקדוקיים אוניברסליים</b> המשותפים ל<b>כל השפות האנושיות</b>. לטענתם, אלו <b>מולדים</b> — חלק מהמבנה המוחי הייחודי לאדם."},
{id:224,topic:9,difficulty:"קלה",text:"מהי דוגמה לסנסיטיזציה בחיי יום-יום?",options:["התרגלות לרעש","חייל שחזר ממלחמה וקופץ מכל רעש פתאומי","שכחת מספר טלפון","הביטואציה לריח"],correct:1,explanation:"חייל שקופץ מכל רעש = <b>סנסיטיזציה</b>: <b>מצב עוררות כללי</b> שגורם <b>תגובה מוגברת למגוון רמזים</b>. דומה ל-<b>PTSD</b>."},
{id:225,topic:10,difficulty:"קלה",text:"מבחן Red Mark נערך מול:",options:["חלון","מראה","מסך","מים"],correct:1,explanation:"<b>מבחן Red Mark</b> נערך מול <b>מראה</b>. מניחים סימן אדום על פני בעל החיים ובודקים אם הוא <b>נוגע בסימן</b> כשהוא רואה את עצמו במראה — <b>מודעות עצמית</b>."},
{id:226,topic:1,difficulty:"קלה",text:"מה מאפיין זיכרון ארוך-טווח?",options:["מוגבל ל-5 פריטים","מחולק לדקלרטיבי ולא-דקלרטיבי, נמשך דקות עד שנים","נמשך שניות בלבד","לא קיים"],correct:1,explanation:"<b>זיכרון ארוך-טווח</b> מחולק ל<b>דקלרטיבי (אקספליציטי)</b> ול<b>לא-דקלרטיבי (אימפליציטי)</b>. הוא יכול להימשך <b>דקות עד שנים</b> ולהכיל כמות עצומה של מידע."},
