{id:227,topic:2,difficulty:"בינונית",text:"איזה מהבאים הוא דוגמה לדחף (Drive)?",options:["נקודה אדומה על מקור","רעב שגורם לחיפוש מזון","פעמון שמעורר ריור","סימן אדום על הפנים"],correct:1,explanation:"<b>רעב</b> הוא דוגמה ל<b>דחף (Drive)</b> — <b>צורך פנימי מתמשך</b> שמניע התנהגות (חיפוש מזון). דחפים כוללים גם שינה והגנה."},
{id:228,topic:3,difficulty:"קשה",text:"האם חתול יכול ללמוד מתוך תובנה? מה אומרים הממצאים?",options:["כן, תמיד","לא — חתולים לומדים בדרך כלל הדרגתית, ע\"י ניסוי ושגיאה; תובנה אופיינית יותר לפרימאטים","חתולים לא לומדים כלל","חתולים חכמים יותר מקופים"],correct:1,explanation:"ממצאי ת'ורנדייק מראים שחתולים לומדים <b>הדרגתית ע\"י ניסוי ושגיאה</b>. <b>למידה מתוך תובנה</b> נמצאה בעיקר ב<b>פרימאטים</b> (קוהלר). סוג הלמידה תלוי במין ובמשימה."},
{id:229,topic:4,difficulty:"קשה",text:"כיצד ניתן ליצור התניה מדרגה שנייה בהקשר של פרסום?",options:["ע\"י פרסום ישיר של מוצר","זיווג מותג (CS1) עם חוויה נעימה, ואז זיווג לוגו חדש (CS2) עם המותג — הלוגו לבד מעורר תגובה","ע\"י הנחות","ע\"י איומים"],correct:1,explanation:"<b>התניה מדרגה שנייה</b> בפרסום: 1) <b>מותג (CS1)</b> מזווג עם <b>חוויה נעימה</b>. 2) <b>לוגו חדש (CS2)</b> מזווג עם <b>המותג (CS1)</b>. כך הלוגו לבד מעורר תגובה חיובית — כמו <b>מקדונלדס</b>."},
{id:230,topic:5,difficulty:"קלה",text:"מהי חשיפה הדרגתית כשיטת טיפול?",options:["חשיפה מאסיבית בבת אחת","חשיפה מדורגת לגירוי המפחיד, מהפחות מאיים לכי מאיים","הימנעות מהגירוי","חיזוק הפחד"],correct:1,explanation:"<b>חשיפה הדרגתית</b>: חשיפה <b>מדורגת</b> לגירוי המפחיד — מתחילים מגירוי <b>פחות מאיים</b> ומתקדמים בהדרגה. מבוססת על <b>הכחדה</b>."},
{id:231,topic:6,difficulty:"קלה",text:"מהם שלושת סוגי החיזוק החיובי?",options:["אוכל, מים, שינה","חברתי, חומרי, טבעי","ראשוני, משני, שלישוני","חיובי, שלילי, ניטרלי"],correct:1,explanation:"שלושת סוגי <b>החיזוק החיובי</b>: <b>חברתי</b> (שבח, חיוך), <b>חומרי</b> (צעצוע, כסף), <b>טבעי</b> (הנאה מהפעילות עצמה)."},
{id:232,topic:7,difficulty:"קשה",text:"מדוע קורטיזול משפר זיכרון רגשי אך פוגע בניטרלי? מה ההסבר?",options:["אין הסבר","קורטיזול מגביר עיבוד באמיגדלה (רגש) ומפחית עיבוד בהיפוקמפוס (ניטרלי)","קורטיזול משפר הכל","קורטיזול פוגע בהכל"],correct:1,explanation:"<b>קורטיזול</b> <b>מגביר</b> עיבוד ב<b>אמיגדלה</b> (מעורבת ברגש) ו<b>מפחית</b> עיבוד ב<b>היפוקמפוס</b>. לכן זיכרון <b>רגשי</b> (אמיגדלה) משופר, ו<b>ניטרלי</b> (היפוקמפוס) נפגע."},
{id:233,topic:8,difficulty:"קשה",text:"טראס טען שנים חיקתה את המאלף. מדוע זו בעיה לטענה שקופים לומדים שפה?",options:["זו לא בעיה","אם זה חיקוי ולא שפה ספונטנית — הקופים לא באמת 'מבינים' שפה אלא מגיבים לרמזים","חיקוי זו שפה","טראס טעה"],correct:1,explanation:"אם נים <b>חיקתה</b> את המאלף, היא לא <b>ייצרה שפה ספונטנית</b> אלא <b>הגיבה לרמזים</b>. זה מערער את הטענה שקופים <b>מבינים ומשתמשים בשפה</b> באופן עצמאי."},
{id:234,topic:9,difficulty:"בינונית",text:"מדוע הביטואציה שונה מעייפות?",options:["אין הבדל","דיס-הביטואציה מוכיחה שזו למידה — גירוי חדש מחדש את התגובה, מה שלא יקרה בעייפות","שתיהן עייפות","שתיהן למידה"],correct:1,explanation:"<b>דיס-הביטואציה</b> מוכיחה שהביטואציה <b>≠ עייפות</b>: אם הגוף היה <b>עייף</b>, גירוי חדש <b>לא היה מחדש</b> את התגובה. העובדה שגירוי חדש <b>כן מחדש</b> — מוכיחה שזו <b>למידה</b>."},
{id:235,topic:10,difficulty:"בינונית",text:"מה ההגדרה של תרבות לפי טיילור וכיצד היא קשורה לשימפנזים?",options:["תרבות = שפה בלבד","תרבות = שלמות מורכבת של ידע, אמונה, אומנויות, מוסר, חוק ומנהגים; השאלה אם לשימפנזים יש תרבות פשוטה","תרבות = כלים בלבד","אין קשר לשימפנזים"],correct:1,explanation:"<b>טיילור</b>: תרבות = <b>שלמות מורכבת</b> של ידע, אמונה, אומנויות, מוסר, חוק ומנהגים. שימפנזים מפגינים <b>העברת ידע בין-דורית</b>, מה שמעלה שאלה אם יש להם <b>תרבות פשוטה</b>."},
{id:236,topic:1,difficulty:"קשה",text:"מדוע קלייב וירינג הצליח לנגן פסנתר אך לא זכר שהוא מנגן?",options:["כי הוא שיקר","כי ניגון = זיכרון פרוצדורלי (אימפליציטי), ידיעה שהוא מנגן = זיכרון דקלרטיבי (אקספליציטי) שנפגע","כי הוא לא באמת ניגן","כי פסנתר קל"],correct:1,explanation:"<b>ניגון פסנתר</b> = <b>זיכרון פרוצדורלי</b> (גרעיני בסיס, צרבלום) — <b>נשמר</b>. <b>ידיעה שהוא מנגן</b> = <b>זיכרון דקלרטיבי</b> (היפוקמפוס) — <b>נפגע</b>. ניתוק בין 'לדעת איך' ל'לדעת ש-'."},
{id:237,topic:2,difficulty:"קשה",text:"מה קורה אם מחמיצים את חלון הזמן הקריטי בחותמה?",options:["אפשר ללמוד מאוחר יותר","החותמה לא תתרחש — לא ניתן לפצות על החמצת החלון","החלון נפתח שוב","אין חלון קריטי"],correct:1,explanation:"ב<b>חותמה</b>, <b>חלון הזמן הקריטי</b> הוא מוחלט. אם <b>מחמיצים</b> אותו — <b>לא ניתן לפצות</b>. דוגמה: עיזים שלא נחשפו לריח גדי בחלון הקריטי עלולות <b>לדחות</b> אותו."},
{id:238,topic:3,difficulty:"בינונית",text:"מהו עקום למידה (Learning Curve)?",options:["גרף של אינטליגנציה","גרף המתאר שינוי בביצועים לאורך ניסיונות למידה","קו ישר","גרף של זיכרון"],correct:1,explanation:"<b>עקום למידה</b> = גרף המתאר <b>שינוי בביצועים</b> לאורך ניסיונות למידה. אצל ת'ורנדייק: <b>עקום יורד</b> — ירידה הדרגתית בזמן הבריחה מתיבת הפאזל."},
{id:239,topic:4,difficulty:"בינונית",text:"מה הקשר בין התניה קלאסית לרפלקס?",options:["אין קשר","התניה קלאסית מלבישה למידה על רפלקס קיים — גירוי ניטרלי מעורר תגובה רפלקסיבית","התניה מבטלת רפלקס","רפלקס מבטל התניה"],correct:1,explanation:"<b>התניה קלאסית = הלבשת למידה על רפלקס קיים</b>. ה-UCS מעורר <b>תגובה רפלקסיבית</b> (UCR). לאחר זיווג, ה-CS מעורר תגובה דומה (CR) — הרפלקס 'הורחב' לגירוי חדש."},
{id:240,topic:5,difficulty:"קשה",text:"מדוע טיפול בחשיפה עשוי להיכשל אם נעשה בסביבה אחת בלבד?",options:["כי חשיפה לא עובדת","בגלל Renewal — ההכחדה ספציפית לסביבה, ובסביבה חדשה/ישנה התגובה עלולה לחזור","כי הפחד עובר מעצמו","כי צריך תרופות"],correct:1,explanation:"<b>Renewal</b>: הכחדה ספציפית ל<b>סביבה</b>. אם הטיפול נעשה <b>בסביבה אחת בלבד</b>, החזרה ל<b>סביבה אחרת</b> עלולה <b>להחזיר את הפחד</b>. לכן מומלץ טיפול ב<b>סביבות מגוונות</b>."},
{id:241,topic:6,difficulty:"קשה",text:"מה ההבדל בין לוח FR ל-VR מבחינת דפוס התגובה?",options:["אין הבדל","FR = הפסקה אחרי חיזוק (post-reinforcement pause); VR = קצב גבוה ועקבי ללא הפסקות","שניהם עם הפסקות","שניהם ללא הפסקות"],correct:1,explanation:"<b>FR</b>: <b>post-reinforcement pause</b> — הפסקה אחרי כל חיזוק, ואז תגובה מהירה. <b>VR</b>: <b>קצב גבוה ועקבי</b> ללא הפסקות — כי הנבדק לא יודע מתי יגיע החיזוק הבא."},
{id:242,topic:7,difficulty:"בינונית",text:"מהי משמעות 'Narrowing of Attention' של אייסטרברוק?",options:["הרחבת הקשב","צמצום טווח הרמזים שהאדם מעבד ברמת עוררות גבוהה","הקשב נעלם","הקשב מתפזר"],correct:1,explanation:"<b>Narrowing of Attention</b> (אייסטרברוק): ברמת <b>עוררות גבוהה</b>, <b>טווח הרמזים מצטמצם</b>. האדם מעבד <b>פחות רמזים</b> מהסביבה ומתמקד רק ברמזים המרכזיים/המאיימים."},
{id:243,topic:9,difficulty:"קשה",text:"לפי מודל התהליך הכפול, מה קורה כשגירוי חזק חוזר שוב ושוב?",options:["רק הביטואציה","רק סנסיטיזציה","שני התהליכים מתרחשים במקביל, אך סנסיטיזציה דומיננטית — העלייה בתגובה מנצחת","שום דבר"],correct:2,explanation:"לפי <b>מודל תהליך כפול</b>: <b>שניהם במקביל</b>, אך לגירוי <b>חזק</b> — <b>סנסיטיזציה דומיננטית</b>. התוצאה הנטו: <b>עלייה בתגובה</b>. לגירוי <b>חלש</b> — הביטואציה דומיננטית."},
{id:244,topic:10,difficulty:"בינונית",text:"מדוע מודעות עצמית חשובה להבנת אינטליגנציה בבעלי חיים?",options:["היא לא חשובה","מודעות עצמית מעידה על ייצוג פנימי — שלב חשוב ביכולת חשיבה מופשטת","היא מעידה רק על ראייה","היא מעידה על שפה"],correct:1,explanation:"<b>מודעות עצמית</b> (מבחן Red Mark) מעידה על <b>ייצוג פנימי</b> — היכולת לייצג את העצמי כאובייקט. זהו <b>שלב חשוב</b> ביכולת <b>חשיבה מופשטת ואינטליגנציה</b>."},
{id:245,topic:1,difficulty:"בינונית",text:"מהו ההבדל בין אמנזיה אנטרוגרדית לרטרוגרדית?",options:["אין הבדל","אנטרוגרדית = אי יכולת ליצור זיכרונות חדשים; רטרוגרדית = אי יכולת לזכור אירועים מהעבר","אנטרוגרדית = שכחת העבר; רטרוגרדית = שכחת העתיד","שתיהן זהות"],correct:1,explanation:"<b>אמנזיה אנטרוגרדית</b> = אי יכולת ליצור <b>זיכרונות חדשים</b> (קדימה). <b>אמנזיה רטרוגרדית</b> = אי יכולת לזכור <b>אירועים מהעבר</b> (אחורה)."},
{id:246,topic:2,difficulty:"בינונית",text:"מהם 5 מאפייני FAP?",options:["מהירה, איטית, גמישה, נלמדת, רצונית","ספציפית למין, מורכבת, נוקשה, לא נלמדת, אוטומטית","פשוטה, גמישה, נלמדת, רצונית, מודעת","חזקה, חלשה, ממושכת, קצרה, יציבה"],correct:1,explanation:"5 מאפייני <b>FAP</b>: 1) <b>ספציפית למין</b>, 2) <b>מורכבת</b> (לא רפלקס פשוט), 3) <b>נוקשה</b> (לא גמישה), 4) <b>לא נלמדת</b> (מולדת), 5) <b>אוטומטית</b>."},
{id:247,topic:3,difficulty:"בינונית",text:"מה מוכיח ניסוי ירקס עם תולעים?",options:["שתולעים חכמות","שלמידה בסיסית קיימת גם באורגניזמים פשוטים מאוד","שתולעים לא לומדות","שרק יונקים לומדים"],correct:1,explanation:"ניסוי ירקס עם <b>תולעים במבוך T</b> מוכיח ש<b>למידה בסיסית</b> קיימת גם ב<b>אורגניזמים פשוטים מאוד</b>. למידה היא יכולת אבולוציונית רחבה."},
{id:248,topic:4,difficulty:"קלה",text:"מהו גירוי ניטרלי (NS) בהתניה קלאסית?",options:["גירוי שמעורר תגובה חזקה","גירוי שלא מעורר תגובה משמעותית לפני ההתניה","גירוי אוורסיבי","גירוי בלתי מותנה"],correct:1,explanation:"<b>גירוי ניטרלי (NS)</b> = גירוי ש<b>לא מעורר תגובה משמעותית</b> לפני ההתניה. לאחר זיווג עם UCS, הוא הופך ל-<b>CS (גירוי מותנה)</b>."},
{id:249,topic:5,difficulty:"בינונית",text:"מהי החלמה ספונטנית (Spontaneous Recovery) בהקשר של הכחדה?",options:["החלמה מפציעה","חזרת התגובה המותנית לאחר תקופת הפסקה מתהליך ההכחדה","חיזוק מחדש","למידה חדשה"],correct:1,explanation:"<b>החלמה ספונטנית</b>: <b>חזרת התגובה המותנית</b> לאחר <b>תקופת הפסקה</b> מתהליך ההכחדה. מוכיחה ש<b>ההכחדה אינה מחיקה</b> אלא דיכוי זמני."},
{id:250,topic:6,difficulty:"בינונית",text:"ילד שמפסיק לבכות כי ההורים מפסיקים לתת תשומת לב — מהו התהליך?",options:["חיזוק","עונש","הכחדה — הסרת החיזוק (תשומת לב) גורמת להפחתת ההתנהגות (בכי)","סנסיטיזציה"],correct:2,explanation:"<b>הכחדה</b>: הבכי <b>חוזק</b> ע\"י תשומת לב. כש<b>מסירים את החיזוק</b> (מפסיקים לתת תשומת לב), ההתנהגות <b>נחלשת</b>. ייתכן <b>Extinction Burst</b> בהתחלה."},
{id:251,topic:7,difficulty:"קלה",text:"מהו הורמון הסטרס שנחקר בהקשר של זיכרון רגשי?",options:["אינסולין","קורטיזול","אדרנלין","מלטונין"],correct:1,explanation:"<b>קורטיזול</b> הוא הורמון הסטרס שנחקר בהקשר של זיכרון רגשי. <b>בוקאנאן ולובאלו (2001)</b> מצאו שהוא משפר קידוד רגשי ופוגע בניטרלי."},
{id:252,topic:8,difficulty:"בינונית",text:"מהי לקסיגרמה?",options:["סוג של שפת סימנים","סמלים גרפיים על לוח שמייצגים מילים — השיטה שבה תקשר קנזי","שפה מדוברת","כתב יתדות"],correct:1,explanation:"<b>לקסיגרמה</b> = <b>סמלים גרפיים על לוח</b> שמייצגים מילים ומושגים. <b>קנזי</b> הבונובו השתמש בשיטה זו לתקשורת."},
{id:253,topic:9,difficulty:"בינונית",text:"מדוע קוקאין גורם לסנסיטיזציה ולא להביטואציה?",options:["כי הוא חלש","כי עם שימוש חוזר האפקט מתגבר (סנסיטיזציה) במקום לרדת","כי הוא גורם שינה","כי הוא לא משפיע"],correct:1,explanation:"<b>קוקאין</b> = <b>סנסיטיזציה</b>: עם שימוש חוזר, <b>האפקט מתגבר</b> (בניגוד לאלכוהול שגורם <b>הביטואציה/סבילות</b>). הבדל חשוב בין סוגי סמים."},
{id:254,topic:10,difficulty:"קלה",text:"מהי השערת האינטליגנציה התרבותית?",options:["שכולם שווים","שבני אדם פיתחו אינטליגנציה ייחודית מחיים בסביבה עם תרבות שעוברת מדור לדור","שתרבות לא חשובה","שרק גנטיקה קובעת"],correct:1,explanation:"<b>השערת האינטליגנציה התרבותית</b>: בני אדם פיתחו יכולות קוגניטיביות ייחודיות מ<b>חיים בסביבה עם תרבות</b> ש<b>עוברת מדור לדור</b>. התרבות עצמה מניעה התפתחות אינטליגנציה."},
{id:255,topic:1,difficulty:"קשה",text:"מדוע המקרה של קלייב וירינג תומך בהפרדה בין סוגי זיכרון?",options:["כי הוא שכח הכל","כי הוא שמר על זיכרון פרוצדורלי (פסנתר) ורגשי (אשתו) אך איבד דקלרטיבי — סוגים שונים באזורים שונים","כי הוא זכר הכל","כי אין הפרדה"],correct:1,explanation:"קלייב <b>שמר</b> על <b>פרוצדורלי</b> (ניגון) ו<b>רגשי</b> (זיכרון אשתו) אך <b>איבד דקלרטיבי</b>. זה תומך בכך ש<b>סוגי זיכרון שונים</b> מעובדים ב<b>אזורים שונים</b> במוח."},
{id:256,topic:2,difficulty:"קלה",text:"מהי התנהגות מולדת?",options:["התנהגות נלמדת","התנהגות שקיימת מלידה ולא דורשת למידה","התנהגות מותנית","התנהגות שנרכשת בבגרות"],correct:1,explanation:"<b>התנהגות מולדת</b> = התנהגות ש<b>קיימת מלידה</b> ו<b>לא דורשת למידה</b>. דוגמאות: FAP, רפלקסים, דחפים בסיסיים."},
{id:257,topic:3,difficulty:"קשה",text:"מדוע סולטן של קוהלר הצליח לפתור בעיות בתובנה? מה ייחודי בשימפנזים?",options:["כי הם גדולים","כי לשימפנזים יכולות קוגניטיביות מתקדמות — יכולת ייצוג מנטלי ותכנון","כי הם חזקים","כי הם רואים טוב"],correct:1,explanation:"שימפנזים כמו <b>סולטן</b> הצליחו בתובנה בזכות <b>יכולות קוגניטיביות מתקדמות</b> — <b>ייצוג מנטלי</b> של הבעיה ו<b>תכנון</b> פתרון. יכולות אלו חסרות בבעלי חיים פשוטים יותר."},
{id:258,topic:4,difficulty:"בינונית",text:"מהו UCR (תגובה בלתי מותנית)?",options:["תגובה נלמדת","תגובה טבעית ואוטומטית לגירוי בלתי מותנה — ריור לבשר, פחד מרעש","תגובה מותנית","תגובה רצונית"],correct:1,explanation:"<b>UCR (תגובה בלתי מותנית)</b> = תגובה <b>טבעית ואוטומטית</b> ל-UCS. דוגמאות: <b>ריור לבשר</b> (פבלוב), <b>פחד מרעש חזק</b> (אלברט). לא דורשת למידה."},
{id:259,topic:5,difficulty:"קשה",text:"מהן ארבע ההוכחות שהכחדה אינה מחיקה?",options:["שכחה, עייפות, אדפטציה, בלבול","החלמה ספונטנית, Renewal, Reinstatement, Re-acquisition","חיזוק, עונש, הביטואציה, סנסיטיזציה","פחד, חרדה, דיכאון, כעס"],correct:1,explanation:"4 הוכחות שהכחדה ≠ מחיקה: 1) <b>החלמה ספונטנית</b> — חזרת תגובה אחרי הפסקה. 2) <b>Renewal</b> — חזרה בסביבה מקורית. 3) <b>Reinstatement</b> — חשיפה ל-UCS לבד. 4) <b>Re-acquisition</b> — רכישה מחדש מהירה."},
{id:260,topic:6,difficulty:"קלה",text:"מהו חיזוק חיובי?",options:["הסרת גירוי נעים","הוספת גירוי נעים שמחזקת התנהגות","הוספת גירוי אוורסיבי","הסרת גירוי לא נעים"],correct:1,explanation:"<b>חיזוק חיובי</b> = <b>הוספת גירוי נעים</b> שמחזקת התנהגות. דוגמאות: שבח, ממתק, ציון טוב. 'חיובי' = הוספה, 'חיזוק' = מחזק התנהגות."},
{id:261,topic:7,difficulty:"בינונית",text:"מה הקשר בין PTSD לתגובה רגשית מותנית (CER)?",options:["אין קשר","PTSD כולל CER — גירויים שזווגו עם טראומה (CS) מעוררים תגובות פחד גם ללא סכנה","PTSD זה הפוך מ-CER","CER גורם ל-PTSD תמיד"],correct:1,explanation:"<b>PTSD</b> כולל <b>CER</b>: גירויים שזווגו עם <b>טראומה</b> (כמו רעשים, ריחות) הופכים ל-<b>CS</b> שמעורר <b>תגובות פחד</b> גם כש<b>אין סכנה אמיתית</b>."},
{id:262,topic:8,difficulty:"קלה",text:"וואשו לימדה שימפנזים אחרים שפת סימנים. נכון או לא?",options:["לא נכון","נכון — וואשו לימדה שימפנזים אחרים סימנים","היא ניסתה ולא הצליחה","רק בני אדם לימדו"],correct:1,explanation:"<b>נכון</b> — <b>וואשו לימדה שימפנזים אחרים</b> סימנים בשפת ASL. זו עדות להעברת ידע בין פרטים, מה שמרמז על יכולת תרבותית בסיסית."},
{id:263,topic:9,difficulty:"קלה",text:"מהי החלמה ספונטנית בהקשר של הביטואציה?",options:["החלמה מפציעה","חזרת התגובה לאחר תקופת הפסקה מחשיפה לגירוי","חיזוק מחדש","למידה חדשה"],correct:1,explanation:"<b>החלמה ספונטנית</b> בהביטואציה: לאחר <b>תקופת הפסקה</b>, <b>התגובה חוזרת</b>. מוכיח שההביטואציה <b>זמנית</b> — דיכוי ולא מחיקה."},
{id:264,topic:10,difficulty:"קשה",text:"מדוע פינקר וצ'ומסקי חולקים על הטענה שקופי אדם משתמשים בשפה אמיתית?",options:["כי קופים לא חכמים","כי שפה אמיתית דורשת מבנים מוחיים מולדים וgrammar universals שייחודיים לאדם","כי קופים לא תקשרו כלל","כי הם לא ראו את הניסויים"],correct:1,explanation:"<b>פינקר וצ'ומסקי</b>: שפה אמיתית דורשת <b>מבנים מוחיים מולדים</b> ו-<b>grammar universals</b> <b>ייחודיים לאדם</b>. מה שקופים עושים הוא תקשורת בסיסית, לא שפה במובן האנושי."},
{id:265,topic:1,difficulty:"קלה",text:"היפוקמפוס קשור בעיקר לאיזה סוג זיכרון?",options:["פרוצדורלי","אפיזודי ודקלרטיבי","מוטורי","קצר-טווח בלבד"],correct:1,explanation:"<b>היפוקמפוס</b> קשור בעיקר ל<b>זיכרון אפיזודי ודקלרטיבי</b>. פגיעה בו (כמו אצל H.M. וקלייב) פוגעת ביצירת זיכרונות מודעים חדשים."},
{id:266,topic:2,difficulty:"קלה",text:"מהו ההבדל בין FAP לרפלקס פשוט?",options:["אין הבדל","FAP = רצף מורכב; רפלקס = תגובה פשוטה ומיידית","רפלקס מורכב יותר","FAP פשוט יותר"],correct:1,explanation:"<b>FAP</b> = רצף התנהגותי <b>מורכב</b> (5 מאפיינים). <b>רפלקס</b> = תגובה <b>פשוטה ומיידית</b> (למשל, נסיגה מכאב). FAP כולל שלבים רבים; רפלקס הוא חד-שלבי."},
{id:267,topic:4,difficulty:"קשה",text:"מהו הרצף הנכון של התניה קלאסית?",options:["CS → UCS → CR","NS+UCS → UCR, ולאחר זיווגים: CS → CR","UCS → CS → CR","CR → CS → UCS"],correct:1,explanation:"הרצף: 1) <b>NS + UCS → UCR</b> (גירוי ניטרלי מוצג עם גירוי בלתי מותנה). 2) לאחר זיווגים חוזרים: <b>CS → CR</b> (הגירוי הניטרלי הפך למותנה ומעורר תגובה מותנית)."},
{id:268,topic:5,difficulty:"קלה",text:"מהי חשיפה חיה (in vivo)?",options:["צפייה בסרט","מפגש ממשי עם הגירוי המפחיד בחיים האמיתיים","חשיפה בדמיון","חשיפה ב-VR"],correct:1,explanation:"<b>חשיפה חיה (in vivo)</b> = <b>מפגש ממשי</b> עם הגירוי המפחיד <b>בחיים האמיתיים</b>. למשל: אדם עם פוביה מעכבישים נחשף לעכביש אמיתי. מבוססת על <b>הכחדה</b>."},
{id:269,topic:6,difficulty:"בינונית",text:"מהו ההבדל בין לוח FI ל-FR?",options:["אין הבדל","FI = חיזוק אחרי זמן קבוע; FR = חיזוק אחרי מספר קבוע של תגובות","שניהם מבוססי זמן","שניהם מבוססי תגובות"],correct:1,explanation:"<b>FI (מרווח קבוע)</b> = חיזוק אחרי <b>פרק זמן קבוע</b>. <b>FR (יחס קבוע)</b> = חיזוק אחרי <b>מספר קבוע של תגובות</b>. FI מבוסס <b>זמן</b>, FR מבוסס <b>כמות</b>."},
{id:270,topic:7,difficulty:"קשה",text:"כיצד ניתן ליישם את עקומת ירקס-דודסון בהקשר חינוכי?",options:["ליצור לחץ מקסימלי","לשמור על רמת עוררות בינונית — מספיק מוטיבציה ללא חרדה משתקת","לבטל כל לחץ","אין יישום"],correct:1,explanation:"יישום <b>ירקס-דודסון</b> בחינוך: לשמור על <b>עוררות בינונית</b> — <b>מספיק מוטיבציה</b> (עניין, אתגר) <b>ללא חרדה משתקת</b>. עוררות נמוכה = שעמום; גבוהה = חרדה."},
{id:271,topic:8,difficulty:"בינונית",text:"מה ההבדל בין שפת סימנים ללקסיגרמה?",options:["אין הבדל","שפת סימנים = תנועות ידיים (וואשו, קוקו); לקסיגרמה = סמלים גרפיים על לוח (קנזי)","שפת סימנים = כתיבה; לקסיגרמה = דיבור","שתיהן זהות"],correct:1,explanation:"<b>שפת סימנים</b> (ASL) = <b>תנועות ידיים</b> — בה השתמשו <b>וואשו וקוקו</b>. <b>לקסיגרמה</b> = <b>סמלים גרפיים על לוח</b> — בה השתמש <b>קנזי</b>. שיטות תקשורת שונות."},
{id:272,topic:9,difficulty:"קשה",text:"כיצד ניתן להבדיל בין הביטואציה לאדפטציה חושית בניסוי?",options:["לא ניתן","ע\"י דיס-הביטואציה — אם גירוי חדש מחדש את התגובה, זו הביטואציה (למידה); אם לא — זו אדפטציה חושית","ע\"י מנוחה","ע\"י חיזוק"],correct:1,explanation:"<b>דיס-הביטואציה</b> היא המפתח: אם <b>גירוי חדש מחדש</b> את התגובה — זו <b>הביטואציה (למידה)</b>. אם <b>לא מחדש</b> — ייתכן שזו <b>אדפטציה חושית</b> (שינוי באיבר החישה)."},
{id:273,topic:10,difficulty:"בינונית",text:"מהו ההבדל בין הוראה מכוונת לחיקוי?",options:["אין הבדל","הוראה מכוונת = פעולה מודעת להעביר ידע; חיקוי = למידה מצפייה ללא כוונה ללמד","שתיהן הוראה","שתיהן חיקוי"],correct:1,explanation:"<b>הוראה מכוונת</b> = <b>פעולה מודעת</b> להעביר ידע לאחר. <b>חיקוי</b> = למידה <b>מצפייה</b> ללא כוונה ללמד. שאלה מרכזית: האם שימפנזים <b>מלמדים</b> או שהצעירים רק <b>מחקים</b>?"},
{id:274,topic:1,difficulty:"בינונית",text:"מהו הרגל (Habit) ולמה קלייב לא הצליח ללמוד הרגלים חדשים?",options:["הרגל = אינסטינקט; קלייב לא ניסה","הרגלים חדשים דורשים יצירת קשרים חדשים שנפגעה עם הפגיעה המוחית","הרגלים לא קיימים","קלייב למד הרגלים חדשים"],correct:1,explanation:"<b>הרגלים (Habits)</b> חדשים דורשים <b>יצירת קשרים חדשים</b> במוח. אצל קלייב, הפגיעה המוחית מנעה <b>למידה חדשה</b>, אך הרגלים/מיומנויות <b>ישנים</b> (כמו פסנתר) נשמרו."},
{id:275,topic:3,difficulty:"קלה",text:"מה סוג הלמידה שת'ורנדייק מצא אצל חתולים?",options:["תובנה","למידה הדרגתית ע\"י ניסוי ושגיאה","חיקוי","חותמה"],correct:1,explanation:"ת'ורנדייק מצא <b>למידה הדרגתית ע\"י ניסוי ושגיאה</b> (incremental) אצל חתולים בתיבת הפאזל. זמן הבריחה ירד <b>בהדרגה</b>."},
{id:276,topic:4,difficulty:"בינונית",text:"מדוע ניסוי אלברט נחשב בעייתי מבחינה אתית?",options:["כי הוא לא עבד","כי התנו פחד בתינוק בן 9 חודשים ולא ביצעו דה-בריפינג; אלברט מת בגיל 6","כי השתמשו בבעלי חיים","כי ההורים הסכימו"],correct:1,explanation:"ניסוי אלברט <b>בעייתי אתית</b>: <b>התנו פחד</b> בתינוק בן 9 חודשים, <b>לא ביצעו דה-בריפינג</b> (הסרת הפחד), ו<b>אלברט מת בגיל 6</b> כשעדיין עם הפחד המותנה."},
{id:277,topic:6,difficulty:"קשה",text:"כיצד ניתן להשתמש בעיקרון פרימאק בכיתה?",options:["ע\"י ענישה בלבד","לאפשר פעילות מועדפת (הפסקה, משחק) רק אחרי פעילות פחות מועדפת (שיעורי בית)","ע\"י ביטול כל הפעילויות","ע\"י חיזוק שלילי בלבד"],correct:1,explanation:"<b>עיקרון פרימאק</b> בכיתה: <b>פעילות מועדפת</b> (הפסקה, משחק) <b>מחזקת</b> פעילות <b>פחות מועדפת</b> (לימודים). 'אם תסיים שיעורי בית — תוכל לשחק'."},
{id:278,topic:7,difficulty:"בינונית",text:"מה הראו ג'ונסון וסקוט (1976)?",options:["שרגשות לא משפיעים","שנבדקים שנכנס אליהם אדם עם סכין זיהו אותו פחות טוב מנבדקים עם אדם עם ידיים שמנות","שכולם זיהו אותו דבר","שנשק משפר זיכרון"],correct:1,explanation:"<b>ג'ונסון וסקוט (1976)</b>: נבדקים עם <b>סכין מגואלת</b> — זיהו <b>פחות טוב</b>. נבדקים עם <b>ידיים שמנות</b> — זיהו <b>טוב יותר</b>. הדגמה קלאסית של <b>אפקט פוקוס הנשק</b>."},
{id:279,topic:9,difficulty:"בינונית",text:"מדוע אלכוהול גורם לסבילות (tolerance)?",options:["כי הוא חזק","כי זו הביטואציה — הגוף מתרגל ודורש כמות גדולה יותר לאותו אפקט","כי הוא גורם סנסיטיזציה","כי הוא לא משפיע"],correct:1,explanation:"<b>סבילות לאלכוהול</b> = <b>הביטואציה</b>: הגוף <b>מתרגל</b> לאפקט ודורש <b>כמות גדולה יותר</b> לאותה תחושה. בניגוד לקוקאין שגורם <b>סנסיטיזציה</b>."},

  {id:45,category:"אינסטינקטים ודחפים",front:"מהי Biased/Programmed Learning?",back:"אינסטינקט יכול להיות מושפע מהתנסויות בסביבה, וגם התנהגות נלמדת יכולה להיות מושפעת מאינסטינקטים. לבע\"ח שונים יש מוכנות ביולוגית שונה לקליטת גירויים."},
  {id:46,category:"אינסטינקטים ודחפים",front:"דוגמה להביטואציה של אינסטינקט?",back:"צרעות זכרים נמשכים לסחלבים שמחקים ריח (פרומון) של נקבה. עם הזמן הם מתרגלים (הביטואציה) ומפסיקים להגיב — מספר הזכרים שבאים יורד."},
  {id:47,category:"למידה ואינטליגנציה",front:"מה חקר ירקס (1912)?",back:"ירקס חקר תולעים במבוך T — התולעים למדו לפנות לצד הנכון בניסיונות חוזרים. מדגים שגם ליצורים פשוטים יש יכולת למידה בסיסית."},
  {id:48,category:"למידה ואינטליגנציה",front:"האם למידה = אינטליגנציה?",back:"לא בהכרח. יש סוגי למידה שונים ומורכבויות שונות. אינטליגנציה היא המידה שבה חיה לומדת להסתגל — היכולת ללמוד מניסיון ולהשתמש בידע כדי להסתגל לסביבות חדשות."},
  {id:49,category:"התניה קלאסית",front:"מהו ISI (Inter-Stimulus Interval)?",back:"המרווח בין הגירוי המותנה (CS) לגירוי הלא-מותנה (UCS). בהתניה קלאסית רגילה צריך להיות קצר. ב-CTA (שנאת טעם מותנית) יכול להיות ארוך — עד שעות."},
  {id:50,category:"התניה קלאסית",front:"מהי מוכנות ביולוגית בהתניה?",back:"לבע\"ח שונים יש נטייה מולדת לקשר סוגי גירויים מסוימים. ב-CTA קל יותר ליצור קישור בין טעם לבחילה מאשר בין טעם לכאב. רמזים אודיו-ויזואליים נקשרים בקלות עם שוק."},
  {id:51,category:"הכחדה ויישום",front:"מהו Reinstatement?",back:"חזרת התגובה המותנית לאחר חשיפה חוזרת לגירוי הבלתי מותנה (UCS) בלבד. הוכחה נוספת שההכחדה לא מוחקת את האסוציאציה המקורית."},
  {id:52,category:"הכחדה ויישום",front:"מהו Re-acquisition?",back:"למידה מחדש מואצת — אחרי הכחדה, הלמידה מחדש מהירה יותר מהלמידה המקורית. מוכיח שהאסוציאציה המקורית לא נמחקה לחלוטין."},
  {id:53,category:"הכחדה ויישום",front:"אילו שיטות טיפול מבוססות על הכחדה?",back:"חשיפה הדרגתית לפוביה, CBT, חשיפה חיה, VR (מציאות מדומה), flooding (הצפה), דסנסיטיזציה שיטתית, והתניית נגד."},
  {id:54,category:"הכחדה ויישום",front:"מדוע התנהגויות שחוזקו חלקית קשות להכחדה?",back:"כי הנבדק לא יכול להבחין מתי החיזוק הופסק — ממילא לא היה עקבי. בחיים רוב החיזוקים חלקיים, ולכן הילד יתמיד בהתנהגות זמן ממושך."},
  {id:55,category:"התניה אופרנטית",front:"מהו חיזוק ראשוני?",back:"גירויים שעונים על צורך בסיסי — אוכל, מים, שינה. מחזקים באופן מולד ללא צורך בלמידה מוקדמת."},
  {id:56,category:"התניה אופרנטית",front:"מהו עונש חיובי?",back:"הוספת גירוי לא נעים (אוורסיבי) כתוצאה מהתנהגות → מפחית את ההתנהגות. דוגמה: נזיפה, מכה."},
  {id:57,category:"התניה אופרנטית",front:"מהו עונש שלילי?",back:"הסרת גירוי חיובי כתוצאה מהתנהגות → מפחית את ההתנהגות. דוגמה: חרמה מהטלוויזיה, ביטול הרשאה לפעילות."},
  {id:58,category:"התניה אופרנטית",front:"מהו Post-Reinforcement Pause?",back:"הפסקה בתגובה שמופיעה מיד אחרי קבלת חיזוק בלוח יחס קבוע (FR). התגובה מאיצה שוב לקראת החיזוק הבא."},
  {id:59,category:"התניה אופרנטית",front:"מהו Scalloping בלוח FI?",back:"תבנית תגובה בלוח מרווח קבוע (FI): קצב תגובה נמוך מיד אחרי חיזוק, שעולה בהדרגה לקראת מועד החיזוק הבא."},
  {id:60,category:"למידה רגשית",front:"מהם זיכרונות פלאשבולב (Flashbulb Memories)?",back:"זיכרונות חיים ומפורטים של אירועים רגשיים משמעותיים. ניסוי גאי וצ'ליל (1999) הראה שזיכרון רגשי אינו תוצאה של שינון חוזר בלבד."},
  {id:61,category:"למידה רגשית",front:"מהי השפעת קורטיזול על הזיכרון?",back:"קורטיזול (הורמון סטרס) משפר קידוד זיכרון רגשי אך גירוי רגשי מעורר אמנזיה רטרוגרדית למידע סובב — כלומר, פוגע בקידוד של מידע שאינו רגשי."},
  {id:62,category:"למידה רגשית",front:"מהי היפותזת Narrowing of Attention?",back:"ברמת עוררות גבוהה, טווח הרמזים הנקלטים מהגירוי קטן. הקשב מתמקד ברמזים בעלי משמעות רגשית (כמו נשק) על חשבון פרטים פריפריאליים (כמו פנים)."},
  {id:63,category:"למידת שפה בבע\"ח",front:"מי היא קוקו הגורילה?",back:"גורילה שלמדה ~1000 סימנים בשפת סימנים (Paterson, 1978). פטרסון טענה שקוקו ביטאה חלומות, רכילות, שקרים ורגשות. כשנודע לה שהשחקן האהוב עליה נפטר — סימנה עצב."},
  {id:64,category:"למידת שפה בבע\"ח",front:"מהי לקסיגרמה?",back:"סמלים על מסך מחשב ששימשו ללימוד שפה אצל קנזי הבונובו. קנזי למד מצפייה מקרית באמו ולא מהוראה ישירה — תקשורת ספונטנית."},
  {id:65,category:"הביטואציה וסנסיטיזציה",front:"מהם הגורמים המשפיעים על קצב ההביטואציה?",back:"עוצמת הגירוי (חזק = הביטואציה איטית), תדירות ההצגה (תכופה = מהירה), מורכבות הגירוי (מורכב = איטית יותר)."},
  {id:66,category:"הביטואציה וסנסיטיזציה",front:"מהו ניסוי תומפסון עם חולדות?",back:"חולדות ששמעו טון חוזר — הביטואציה. הצגת אור חדש (ללא מנוחה) → דיס-הביטואציה → חזרה לתגובה. מוכיח שהביטואציה היא למידה ולא עייפות."},
  {id:67,category:"אינטליגנציה בפרימאטים",front:"מהי השערת האינטליגנציה התרבותית?",back:"בני אדם פיתחו יכולות קוגניטיביות ייחודיות מחיים בסביבה שיש בה תרבות שעוברת מדור לדור. השימוש בשפה ובכלים הניע התקדמות קוגניטיבית."},
  {id:68,category:"אינטליגנציה בפרימאטים",front:"באילו כלים משתמשים שימפנזים?",back:"ענפים לדוג נמלים, אבנים לפצח אגוזים, עלים לספוג מים. יש הבדלים בין אוכלוסיות — מה שמרמז על 'תרבות'. הם גם מלמדים את הדורות הבאים."}
];

// --- Quiz Question ---
function QuizQuestion({ q, onAnswer, answered, bookmarked, onBookmark }) {
  const [selected, setSelected] = useState(answered?.selected ?? null);
  const [showExpl, setShowExpl] = useState(answered?.selected != null);
  const letters = ["א","ב","ג","ד","ה"];
  const isCorrect = selected === q.correct;
  const handleSelect = (i) => { if (selected !== null) return; setSelected(i); setShowExpl(true); onAnswer(q.id, i, i === q.correct); };
  useEffect(() => { if (answered?.selected == null) { setSelected(null); setShowExpl(false); } }, [answered]);

  return React.createElement("div", { style:{ background:THEME.bgCard, border:`1px solid ${selected !== null ? (isCorrect ? THEME.correctBorder : THEME.wrongBorder) : THEME.border}`, borderRadius:16, padding:"20px 18px", marginBottom:16, animation:"fadeSlideIn 0.3s ease" } },
    React.createElement("div", { style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,gap:8} },
      React.createElement("div", { style:{display:"flex",gap:6,flexWrap:"wrap"} }, React.createElement(TopicBadge, {topic:q.topic}), React.createElement(DiffBadge, {difficulty:q.difficulty})),
      React.createElement("button", { onClick:(e)=>{e.stopPropagation();onBookmark(q.id)}, style:{background:"none",border:"none",fontSize:18,cursor:"pointer",color:bookmarked?THEME.gold:THEME.textMuted,padding:0} }, bookmarked?"⭐":"☆")
    ),
    React.createElement("div", { style:{fontSize:14.5,fontWeight:600,color:THEME.text,lineHeight:1.7,marginBottom:16}, dangerouslySetInnerHTML:{__html:q.text} }),
    React.createElement("div", { style:{display:"flex",flexDirection:"column",gap:8} },
      q.options.map((opt, i) => {
        let bg = "rgba(255,255,255,0.02)", border = THEME.border, col = THEME.textDim;
        if (selected !== null) {
          if (i === q.correct) { bg = THEME.correctBg; border = THEME.correctBorder; col = THEME.correct; }
          else if (i === selected) { bg = THEME.wrongBg; border = THEME.wrongBorder; col = THEME.wrong; }
        }
        return React.createElement("button", { key:i, onClick:()=>handleSelect(i), style:{ display:"flex",alignItems:"flex-start",gap:10,padding:"12px 14px",borderRadius:12,border:`1px solid ${border}`,background:bg,color:col,fontSize:13.5,fontWeight:500,cursor:selected!==null?"default":"pointer",textAlign:"right",fontFamily:"inherit",lineHeight:1.6,transition:"all 0.2s" } },
          React.createElement("span", { style:{fontWeight:700,minWidth:20,color:selected!==null && i===q.correct?THEME.correct:selected!==null && i===selected?THEME.wrong:THEME.accent} }, letters[i]+"."),
          React.createElement("span", null, opt)
        );
      })
    ),

      React.createElement("div", { style:{fontSize:13,color:"#bfc9d9",lineHeight:1.85}, dangerouslySetInnerHTML:{__html:q.explanation} })
    )
  );
}

// --- Flash Card ---
function FlashCardsTab() {
  const [selectedCategories, setSelectedCategories] = useState(new Set(ALL_FC_CATEGORIES));
  const [currentIndex, setCurrentIndex] = useState(0);
  const [isFlipped, setIsFlipped] = useState(false);
  const filteredCards = useMemo(() => CARDS_DATA.filter(c => selectedCategories.has(c.category)), [selectedCategories]);
  const card = filteredCards[currentIndex] || null;
  const catColors = FC_CATEGORY_COLORS;
  
  const goNext = () => { if (currentIndex < filteredCards.length - 1) { setCurrentIndex(currentIndex+1); setIsFlipped(false); } };
  const goPrev = () => { if (currentIndex > 0) { setCurrentIndex(currentIndex-1); setIsFlipped(false); } };
  
  useEffect(() => { const h = (e) => { if(e.key==="ArrowRight") goPrev(); if(e.key==="ArrowLeft") goNext(); if(e.key===" ") { e.preventDefault(); setIsFlipped(f=>!f); } }; window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h); });

  if (!card) return React.createElement("div",{style:{textAlign:"center",padding:40,color:THEME.textMuted}},"אין כרטיסיות בקטגוריות שנבחרו");
  const cc = catColors[card.category] || {bg:"#f0f0f0",accent:"#888",text:"#333"};

  return React.createElement("div",{style:{animation:"fadeSlideIn 0.4s ease"}},
    React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}},
      ALL_FC_CATEGORIES.map(cat => {
        const sel = selectedCategories.has(cat);
        const ccc = catColors[cat] || {accent:"#888"};
        return React.createElement("button",{key:cat,onClick:()=>{const n=new Set(selectedCategories);if(n.has(cat))n.delete(cat);else n.add(cat);setSelectedCategories(n);setCurrentIndex(0);setIsFlipped(false);},style:{padding:"6px 12px",borderRadius:10,border:`1px solid ${sel?ccc.accent+"50":THEME.border}`,background:sel?ccc.accent+"15":"transparent",color:sel?ccc.accent:THEME.textMuted,fontSize:11.5,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}},cat);
      })
    ),

  const [currentQ, setCurrentQ] = useState(0);
  const [genAnswers, setGenAnswers] = useState({});
  const [showResults, setShowResults] = useState(false);
  const [timerEnabled, setTimerEnabled] = useState(false);
  const [timeLeft, setTimeLeft] = useState(0);
  const timerRef = useRef(null);

  const availableQuestions = useMemo(() => {
    let qs = QUESTIONS.filter(q => selectedTopics.has(q.topic));
    if (selectedDiff !== "all") qs = qs.filter(q => q.difficulty === selectedDiff);
    return qs;
  }, [selectedTopics, selectedDiff]);

  const generateQuiz = () => {
    const shuffled = [...availableQuestions].sort(() => Math.random() - 0.5);
    const selected = shuffled.slice(0, Math.min(numQuestions, shuffled.length));
    // Shuffle options for each question
    const withShuffledOptions = selected.map(q => {
      const indices = q.options.map((_, i) => i);
      const shuffledIndices = indices.sort(() => Math.random() - 0.5);
      return {
        ...q,
        _originalCorrect: q.correct,
        options: shuffledIndices.map(i => q.options[i]),
        correct: shuffledIndices.indexOf(q.correct),
        _shuffleMap: shuffledIndices
      };
    });
    setGeneratedQuiz(withShuffledOptions);
    setCurrentQ(0);
    setGenAnswers({});
    setShowResults(false);
    if (timerEnabled) {
      const totalTime = selected.length * 30;
      setTimeLeft(totalTime);
      if (timerRef.current) clearInterval(timerRef.current);
      timerRef.current = setInterval(() => {
        setTimeLeft(prev => {
          if (prev <= 1) { clearInterval(timerRef.current); return 0; }
          return prev - 1;
        });
      }, 1000);
    }
  };

  useEffect(() => { return () => { if (timerRef.current) clearInterval(timerRef.current); }; }, []);

  useEffect(() => {
    if (timerEnabled && timeLeft === 0 && generatedQuiz && !showResults) {

      if (timerRef.current) clearInterval(timerRef.current);

  }, [timeLeft]);

  const handleGenAnswer = (qId, selected, correct) => {
    setGenAnswers(prev => ({...prev, [qId]: {selected, correct}}));

    if (!generatedQuiz) return null;
    const answered = Object.keys(genAnswers).length;
    const correct = Object.values(genAnswers).filter(a=>a.correct).length;
    return { answered, correct, total: generatedQuiz.length, pct: answered > 0 ? Math.round(correct/answered*100) : 0 };
  }, [genAnswers, generatedQuiz]);

      React.createElement("h2",{style:{fontSize:16,fontWeight:700,color:THEME.textDim,marginBottom:16}},"בחרו נושא ללמידה:"),
      React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:10}},
        TOPICS.map((t,i) => {
          const ts = topicStats[t.id];
          return React.createElement("button",{key:t.id,onClick:()=>{setActiveTopic(t.id);setActiveSection(0);},style:{display:"flex",alignItems:"center",gap:isMobile?10:14,padding:isMobile?"16px 14px":"20px 18px",background:`linear-gradient(135deg, ${t.colorLight}, rgba(255,255,255,0.01))`,border:`1px solid ${t.color}20`,borderRadius:16,cursor:"pointer",textAlign:"right",fontFamily:"inherit",animation:`slideFromRight 0.4s ease ${i*0.07}s both`}},
            React.createElement("span",{style:{fontSize:isMobile?22:28,width:isMobile?42:52,height:isMobile?42:52,borderRadius:14,background:`${t.color}15`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},t.icon),
            React.createElement("div",{style:{flex:1}},
              React.createElement("div",{style:{fontSize:16,fontWeight:700,color:THEME.text,marginBottom:4}},t.title),
              React.createElement("div",{style:{fontSize:12,color:THEME.textMuted}},t.sections.length," חלקי לימוד · ",t.sections.reduce((a,s)=>a+s.concepts.length,0)," מושגים"),
              ts && ts.answered > 0 && React.createElement("div",{style:{marginTop:6,display:"flex",alignItems:"center",gap:6}},
                React.createElement("div",{style:{flex:1,height:4,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden",maxWidth:120}},
                  React.createElement("div",{style:{height:"100%",width:`${ts.pct}%`,background:t.color,borderRadius:2,transition:"width 0.5s"}})
                ),
                React.createElement("span",{style:{fontSize:11,color:t.color,fontWeight:600}},ts.correct,"/",ts.total)
              )
            ),
            React.createElement("span",{style:{fontSize:18,color:THEME.textMuted,flexShrink:0}},"←")
          );
        })
      )
    ),

    // Learn - Topic Detail
    mainTab === "learn" && activeTopic !== null && topic && React.createElement("div",{style:{animation:"fadeSlideIn 0.4s ease"}},
      React.createElement("button",{onClick:()=>{setActiveTopic(null);setActiveSection(0);},style:{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",background:"rgba(255,255,255,0.03)",border:`1px solid ${THEME.border}`,borderRadius:10,color:THEME.textDim,fontSize:13,cursor:"pointer",fontFamily:"inherit",marginBottom:16}},"→ חזרה לנושאים"),
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:14,marginBottom:20,padding:"18px 16px",background:`linear-gradient(135deg, ${topic.colorLight}, rgba(255,255,255,0.01))`,borderRadius:16,border:`1px solid ${topic.color}20`}},
        React.createElement("span",{style:{fontSize:32}},topic.icon),
        React.createElement("div",null,
          React.createElement("h2",{style:{fontSize:20,fontWeight:800,color:THEME.text,marginBottom:2}},topic.title),
          React.createElement("span",{style:{fontSize:12,color:THEME.textMuted}},topic.sections.length," חלקים · ",topic.sections.reduce((a,s)=>a+s.concepts.length,0)," מושגים")
        )
      ),
      React.createElement("div",{style:{display:"flex",flexWrap:isMobile?"wrap":"nowrap",gap:6,marginBottom:20,overflowX:isMobile?"visible":"auto",paddingBottom:4}},
        topic.sections.map((s,i) => React.createElement("button",{key:i,onClick:()=>setActiveSection(i),style:{padding:"8px 14px",borderRadius:10,border:`1px solid ${activeSection===i?topic.color+"40":THEME.border}`,background:activeSection===i?topic.color+"18":"rgba(255,255,255,0.02)",color:activeSection===i?topic.color:THEME.textMuted,fontSize:12.5,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",flexShrink:0}},s.title))
      ),
      React.createElement(TopicSection, { section:topic.sections[activeSection], color:topic.color }),
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginTop:20,marginBottom:40,gap:10}},
        React.createElement("button",{onClick:()=>setActiveSection(Math.max(0,activeSection-1)),disabled:activeSection===0,style:{padding:"10px 18px",borderRadius:10,border:`1px solid ${THEME.border}`,background:activeSection===0?"transparent":"rgba(255,255,255,0.03)",color:activeSection===0?THEME.textMuted:THEME.text,fontSize:13,fontWeight:600,cursor:activeSection===0?"default":"pointer",fontFamily:"inherit",opacity:activeSection===0?0.4:1}},"→ הקודם"),
        React.createElement("button",{onClick:()=>{if(activeSection<topic.sections.length-1){setActiveSection(activeSection+1);}else{setMainTab("quiz");setQuizFilter(String(topic.id));}},style:{padding:"10px 18px",borderRadius:10,border:"none",background:topic.color,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}},activeSection<topic.sections.length-1?"הבא ←":"📝 לשאלות")
      )
    ),

    // Quiz
    mainTab === "quiz" && React.createElement("div",{style:{animation:"fadeSlideIn 0.4s ease"}},
      React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}},
        React.createElement("button",{onClick:()=>setQuizFilter("all"),style:{padding:"6px 14px",borderRadius:10,border:`1px solid ${quizFilter==="all"?THEME.accent+"50":THEME.border}`,background:quizFilter==="all"?THEME.accentGlow:"transparent",color:quizFilter==="all"?THEME.accentLight:THEME.textMuted,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}},"הכל ("+QUESTIONS.length+")"),
        TOPICS.map(t => React.createElement("button",{key:t.id,onClick:()=>setQuizFilter(String(t.id)),style:{padding:"6px 14px",borderRadius:10,border:`1px solid ${quizFilter===String(t.id)?t.color+"50":THEME.border}`,background:quizFilter===String(t.id)?t.colorLight:"transparent",color:quizFilter===String(t.id)?t.color:THEME.textMuted,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}},t.icon+" "+QUESTIONS.filter(q=>q.topic===t.id).length))
      ),
      globalStats.answered > 0 && React.createElement("div",{style:{display:"flex",gap:12,marginBottom:16,padding:"14px 16px",background:THEME.bgCard,borderRadius:14,border:`1px solid ${THEME.border}`,alignItems:"center"}},
        React.createElement("div",{style:{fontFamily:"'Rubik'",fontSize:28,fontWeight:800,color:globalStats.pct>=70?THEME.correct:globalStats.pct>=40?THEME.gold:THEME.wrong}},globalStats.pct+"%"),
        React.createElement("div",{style:{flex:1}},
          React.createElement("div",{style:{fontSize:12,color:THEME.textDim,marginBottom:4}},globalStats.answered+" מתוך "+filteredQuestions.length+" שאלות"),
          React.createElement("div",{style:{height:6,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden"}},
            React.createElement("div",{style:{height:"100%",width:`${(globalStats.answered/filteredQuestions.length)*100}%`,background:`linear-gradient(90deg,${THEME.correct},${THEME.accent})`,borderRadius:3,transition:"width 0.5s"}})
          )
        ),
        React.createElement("button",{onClick:resetQuiz,style:{padding:"6px 12px",borderRadius:8,border:`1px solid ${THEME.border}`,background:"transparent",color:THEME.textMuted,fontSize:11,cursor:"pointer",fontFamily:"inherit"}},"🔄 איפוס")
      ),
      filteredQuestions.map((q,i) => React.createElement(QuizQuestion, { key:q.id, q:q, index:i, onAnswer:handleAnswer, answered:answers[q.id], bookmarked:bookmarks.has(q.id), onBookmark:handleBookmark }))
    ),

    // Generator
    mainTab === "generator" && React.createElement(QuizGenerator, null),

    // Flash Cards
    mainTab === "flashcards" && React.createElement(FlashCardsTab, null),

    // Progress
    mainTab === "progress" && React.createElement("div",{style:{animation:"fadeSlideIn 0.4s ease"}},
      React.createElement("div",{style:{textAlign:"center",padding:"28px 0",marginBottom:20}},
        React.createElement("div",{style:{fontFamily:"'Rubik'",fontSize:52,fontWeight:900,color:globalStats.pct>=70?THEME.correct:globalStats.pct>=40?THEME.gold:globalStats.pct>0?THEME.wrong:THEME.textMuted,lineHeight:1}},globalStats.answered>0?globalStats.pct+"%":"—"),
        React.createElement("div",{style:{fontSize:14,color:THEME.textDim,marginTop:8}},globalStats.answered>0?`${globalStats.correct} נכונות מתוך ${globalStats.answered}`:"עדיין לא ענית על שאלות")
      ),
      React.createElement("h3",{style:{fontSize:15,fontWeight:700,color:THEME.textDim,marginBottom:12}},"ביצועים לפי נושא:"),
      TOPICS.map(t => {
        const ts = topicStats[t.id];
        return React.createElement("div",{key:t.id,style:{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:THEME.bgCard,border:`1px solid ${THEME.border}`,borderRadius:14,marginBottom:8}},
          React.createElement("span",{style:{fontSize:20}},t.icon),
          React.createElement("div",{style:{flex:1}},
            React.createElement("div",{style:{fontSize:13,fontWeight:600,color:THEME.text,marginBottom:4}},t.title),
            React.createElement("div",{style:{height:6,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden"}},
              React.createElement("div",{style:{height:"100%",width:`${ts.pct}%`,background:t.color,borderRadius:3,transition:"width 0.5s"}})
            )
          ),
          React.createElement("span",{style:{fontSize:12,color:t.color,fontWeight:700}},ts.answered>0?ts.pct+"%":"—")
        );
      }),
      React.createElement("div",{style:{textAlign:"center",padding:"30px 0 20px",borderTop:`1px solid ${THEME.border}`,marginTop:20}},
        React.createElement("p",{style:{fontSize:11,color:THEME.textMuted}},"כלי למידה — פסיכולוגיה של הלמידה · 10 נושאים · 280 שאלות · 68 כרטיסיות · בהצלחה! 🎓")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(LearningTool, null));
  </script>
</body>
</html>
