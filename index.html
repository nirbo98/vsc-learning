  {id:21,category:"תוקף המדידה",front:"מהו תוקף המדידה?",back:"המידה שבה כלי המדידה (ההגדרה האופרציונלית) הולם את ההגדרה הנומינלית (התיאורטית) של המשתנה הנמדד. האם מדדתי את מה שהתכוונתי למדוד?"},
  {id:22,category:"תוקף המדידה",front:"מה הקשר בין מהימנות לתוקף?",back:"מהימנות היא חסם עליון לתוקף. כלי לא מהימן לא יכול להיות תקף, אך כלי מהימן לא בהכרח תקף. כלומר – מהימנות הכרחית אך לא מספקת לתוקף."},
  {id:23,category:"תוקף המדידה",front:"מהו תוקף תוכן?",back:"המידה שבה פריטי השאלון מייצגים את עולם התוכן של המשתנה הנמדד. נעשה על ידי ניתוח איכותני – אין שיטה מדויקת לאמידתו."},
  {id:24,category:"תוקף המדידה",front:"מהו תוקף נראה (Face Validity)?",back:"המידה שבה כלי המדידה נראה לנבדק כמודד את מה שהוא אמור למדוד. תוקף נראה גבוה מדי עלול לגרום להטיות."},
  {id:25,category:"תוקף המדידה",front:"מהו תוקף ניבוי (Predictive Validity)?",back:"המידה שבה כלי המדידה מנבא התנהגות או ביצוע עתידי. נמדד על ידי מתאם בין ציוני הכלי לבין קריטריון חיצוני עתידי."},
  {id:26,category:"תוקף המדידה",front:"מהו תוקף מבנה (Construct Validity)?",back:"מידת החפיפה בין ההגדרה הנומינלית של המשתנה הנמדד לבין ההגדרה האופרציונלית שלו. נבדק באמצעות תוקף מתכנס ותוקף מבחין."},
  {id:27,category:"תוקף המדידה",front:"מהו תוקף מתכנס?",back:"מתאם גבוה בין כלי המדידה למבחן מתוקף אחר המודד את אותו משתנה תיאורטי. מתאם גבוה = תוקף מתכנס גבוה."},
  {id:28,category:"תוקף המדידה",front:"מהו תוקף מבחין?",back:"מתאם נמוך בין כלי המדידה למבחן מתוקף המודד משתנה תיאורטי אחר. מתאם נמוך = תוקף מבחין גבוה."},
  {id:29,category:"תוקף המדידה",front:"תוקף מבנה גבוה יבוא לידי ביטוי ב...?",back:"מקדם מתאם גבוה של תוקף מתכנס ומקדם מתאם נמוך של תוקף מבחין."},
  {id:30,category:"תוקף המדידה",front:"מהי הגדרה נומינלית?",back:"ההגדרה התיאורטית/מושגית של משתנה – מה אנחנו מתכוונים למדוד ברמה העקרונית."},
  {id:31,category:"תוקף המדידה",front:"מהי הגדרה אופרציונלית?",back:"ההגדרה המעשית/תפעולית של המשתנה – כיצד בפועל אנו מודדים או מתפעלים את המשתנה בניסוי."},
  {id:32,category:"תוקף תוצאות המחקר",front:"מהו תוקף פנימי?",back:"המידה שבה ניתן להסיק שהמניפולציה היא זו שגרמה לאפקט שהתקבל, ולא גורם חיצוני אחר."},
  {id:33,category:"תוקף תוצאות המחקר",front:"מהו תוקף חיצוני?",back:"המידה שבה ניתן להכליל את תוצאות המחקר מעבר לאוכלוסיות, מצבים וזמן."},
  {id:34,category:"תוקף תוצאות המחקר",front:"מהו תוקף סטטיסטי?",back:"המידה שבה ניתן להסיק כי התוצאה שהתקבלה משקפת קשר שקיים במציאות/באוכלוסייה, ולא התקבלה במקרה."},
  {id:35,category:"תוקף תוצאות המחקר",front:"מהו תוקף מבנה (של תוצאות)?",back:"המידה שבה ההגדרה האופרציונלית של המשתנים משקפת נכונה את ההגדרה הנומינלית שלהם."},
  {id:36,category:"תוקף תוצאות המחקר",front:"מהם איומים על התוקף הסטטיסטי?",back:"1. טעות מסוג I – דחיית השערת האפס כשהיא נכונה\n2. טעות מסוג II – אי-דחיית השערת האפס כשהיא שגויה\n3. עוצמה סטטיסטית נמוכה."},
  {id:37,category:"תוקף תוצאות המחקר",front:"מדגם הטרוגני משפיע על אילו תקפים?",back:"מחזק את התוקף החיצוני אך עלול להחליש את התוקף הסטטיסטי."},
  {id:38,category:"תוקף תוצאות המחקר",front:"שימוש במדגם סטודנטים בלבד מאיים על איזה תוקף?",back:"תוקף חיצוני – מוגבלת היכולת להכליל את הממצאים לאוכלוסייה הכללית."},
  {id:39,category:"איומים על תוקף פנימי",front:"מהו איום היסטוריה?",back:"אירוע חיצוני שהתרחש בין המדידה הראשונה לשנייה ועלול להסביר את השינוי שנמצא, במקום המניפולציה."},
  {id:40,category:"איומים על תוקף פנימי",front:"מהו איום בשילה (Maturation)?",back:"שינויים טבעיים המתרחשים בנבדקים עם חלוף הזמן (גדילה, עייפות, רעב, למידה טבעית)."},
  {id:41,category:"איומים על תוקף פנימי",front:"מהו איום מדידה (Testing)?",back:"עצם המדידה הראשונה משפיעה על תוצאות המדידה השנייה. למשל – הנבדקים לומדים מהמבחן הראשון."},
  {id:42,category:"איומים על תוקף פנימי",front:"מהו איום מכשור (Instrumentation)?",back:"שינוי בכלי המדידה או בתנאי המדידה בין המדידות. למשל – שאלון שונה, שופטים שונים."},
  {id:43,category:"איומים על תוקף פנימי",front:"מהו איום רגרסיה לממוצע?",back:"נטייה של ציונים קיצוניים שהתקבלו במדידה הראשונה להתקרב לממוצע במדידה השנייה."},
  {id:44,category:"איומים על תוקף פנימי",front:"מהו איום ברירה (Selection)?",back:"הבדלים מובנים בין הקבוצות שלא נובעים מהמניפולציה אלא מאופן הבחירה/השמת הנבדקים לקבוצות."},
  {id:45,category:"איומים על תוקף פנימי",front:"מהו איום נשירה (Attrition)?",back:"נבדקים שנושרים מהמחקר באופן שיטתי ולא מקרי, מה שעלול ליצור הבדלים בין הקבוצות."},
  {id:46,category:"איומים על תוקף פנימי",front:"מהם איומי אינטראקציה עם ברירה?",back:"שילוב של ברירה עם איומים אחרים: אינטראקציה של ברירה עם בשילה, היסטוריה, מדידה וכו'."},
  {id:47,category:"איומים על תוקף פנימי",front:"מהו איום היסטוריה מקומית?",back:"אירוע שמשפיע על קבוצה אחת בלבד. רלוונטי גם במערכים עם השמה רנדומלית וקבוצת ביקורת."},
  {id:48,category:"איומים על תוקף פנימי",front:"מהו איום דיפוזיה?",back:"חילופי מידע בין קבוצות הניסוי – נבדקים מקבוצה אחת חושפים מידע לנבדקים מקבוצה אחרת."},
  {id:49,category:"איומים על תוקף פנימי",front:"מהו איום דה-מורליזציה?",back:"נבדקים בקבוצת הביקורת מאבדים מוטיבציה כי הם יודעים שלא קיבלו את הטיפול."},
  {id:50,category:"איומים על תוקף פנימי",front:"מהו איום השוואה מפצה?",back:"מנהלים נותנים לקבוצת הביקורת פיצוי/תנאים משופרים כי 'חבל עליהם'."},
  {id:51,category:"איומים על תוקף פנימי",front:"מהו איום תחרות מפצה?",back:"נבדקים בקבוצת הביקורת משקיעים מאמץ יתר כדי 'להוכיח' שהם טובים גם בלי הטיפול."},
  {id:52,category:"איומים על תוקף פנימי",front:"איזה איומים רלוונטיים למערך ללא קבוצת ביקורת?",back:"היסטוריה, בשילה, מדידה, מכשור, ורגרסיה לממוצע."},
  {id:53,category:"איומים על תוקף פנימי",front:"איזה איומים רלוונטיים למערך עם ביקורת אך ללא רנדומיזציה?",back:"ברירה, אינטראקציות עם ברירה, ונשירה."},
  {id:54,category:"איומים על תוקף פנימי",front:"איזה איומים רלוונטיים למערך עם ביקורת ורנדומיזציה?",back:"היסטוריה מקומית, דיפוזיה, דה-מורליזציה, השוואה מפצה, ותחרות מפצה."},
  {id:55,category:"איומים על תוקף פנימי",front:"מהו הפתרון לאיומים במערך ללא קבוצת ��יקורת?",back:"הוספת קבוצת ביקורת."},
  {id:56,category:"איומים על תוקף פנימי",front:"מהו הפתרון לאיומים במערך עם ביקורת אך ללא רנדומיזציה?",back:"השמה רנדומלית של נבדקים לקבוצות – הופכת שונות שיטתית לשונות מקרית."},
  {id:57,category:"איומים על תוקף פנימי",front:"מהו הפתרון לאיומים במערך עם ביקורת ורנדומיזציה?",back:"עיוורון של הנבדק, מניעת חילופי מידע, וסטנדרטיזציה של התנאים."},
  {id:58,category:"מערכי מחקר",front:"מהו מערך מחקר?",back:"תכנית פעולה לבדיקת קשרים בין משתנים, המאפשרת בחינת שאלות המחקר."},
  {id:59,category:"מערכי מחקר",front:"מהם שלושת סוגי מערכי המחקר?",back:"1. מערכים שגויים – קשה מאוד להסיק סיבתיות\n2. מערכים קוואזי-ניסויים – הסתברות גבוהה יותר\n3. מערכים ניסויים אמיתיים – הסקה חזקה."},
  {id:60,category:"מערכי מחקר",front:"מה מסמלים X, O, R במערכי מחקר?",back:"X = טיפול ניסויי (מניפולציה)\nO = תצפית/מדידה של המשתנה התלוי\nR = רנדומיזציה (הקצאה מקרית)."},
  {id:61,category:"מערכי מחקר",front:"מהו ניתוח מקרה (One-Shot Case Study)?",back:"מערך שגוי: X O – קבוצה אחת, מניפולציה אחת, מדידה אחת. אין קבוצת ביקורת ואין מדידה מקדימה."},
  {id:62,category:"מערכי מחקר",front:"מהו מערך לפני-אחרי (One Group Pretest-Posttest)?",back:"מערך שגוי: O₁ X O₂ – קבוצה אחת, מדידה לפני ואחרי. חשוף לאיומי היסטוריה, בשילה, מדידה ועוד."},
  {id:63,category:"מערכי מחקר",front:"מהן ארבע הקבוצות של סולומון?",back:"4 קבוצות: ניסוי+מדידה לפני, ביקורת+מדידה לפני, ניסוי ללא מדידה לפני, ביקורת ללא מדידה לפני. מאפשר לבודד אפקט המדידה."},
  {id:64,category:"מערכי מחקר",front:"מהי קבוצת ביקורת?",back:"קבוצה שלא מקבלת את הטיפול הניסויי, ומשמשת כבסיס להשוואה מול קבוצת הניסוי."},
  {id:65,category:"מערכי מחקר",front:"מהי רנדומיזציה ומדוע היא חשובה?",back:"הקצאה מקרית של נבדקים לקבוצות. הופכת שונות שיטתית לשונות מקרית."},
  {id:66,category:"הטיות במחקר",front:"מהם שני סוגי ההטיות בניסויים?",back:"1. הטיות נסיין – הטיות הנובעות מהחוקר\n2. הטיות נבדק – הטיות הנובעות מהנבדק."},
  {id:67,category:"הטיות במחקר",front:"מהן הטיות נסיין?",back:"החוקר משפיע על תוצאות המחקר באופן לא מודע: ציפיות החוקר משפיעות על התנהגות הנבדקים (אפקט רוזנטל/פיגמליון)."},
  {id:68,category:"הטיות במחקר",front:"מהן הטיות נבדק?",back:"Demand Characteristics – אפיוני הניסוי מאפשרים לנבדק להבין את מטרותיו ולשנות את התנהגותו בהתאם."},
  {id:69,category:"הטיות במחקר",front:"מהי רציה חברתית (Social Desirability)?",back:"נטייה של נבדקים לענות בצורה שתיראה חיובית בעיני אחרים, במקום לענות בכנות."},
  {id:70,category:"הטיות במחקר",front:"מהו ניסוי עיוור כפול (Double Blind)?",back:"מערך בו גם הנבדק וגם הנסיין אינם יודעים לאיזו קבוצה הנבדק שייך. מונע הטיות משני הצדדים."},
  {id:71,category:"אתיקה במחקר",front:"מהי הסכמה מדעת (Informed Consent)?",back:"יש לתת לנבדקים מספיק מידע על המחקר לפני השתתפותם כדי לאפשר להם לבחור אם להשתתף."},
  {id:72,category:"אתיקה במחקר",front:"מהי ועדת אתיקה (IRB)?",back:"ועדה המאשרת ביצוע מחקרים. בוחנת את היחס בין תועלת למדע לבין סכנה לנבדקים."},
  {id:73,category:"אתיקה במחקר",front:"מהם סכנות/סיכונים אפשריים במחקר בבני אדם?",back:"1. אי-נעימות פסיכולוגית או פיזית\n2. פלישה לפרטיות\n3. הונאה"},
  {id:74,category:"אתיקה במחקר",front:"מהו דה-בריפינג (Debriefing)?",back:"חשיפת ההונאה לנבדקים בהקדם האפשרי בתום המחקר. חובה לבצע כאשר נעשה שימוש בהטעיה."},
  {id:75,category:"אתיקה במחקר",front:"כיצד יש להגן על פרטיות הנבדקים?",back:"לא לקשר נתונים לזהות הנבדק, לשמור פרטים בנפרד מנתונים, להגביל גישה לנתונים לחוקרים בלבד."},
  {id:76,category:"השיטה המדעית",front:"מהו משתנה תלוי?",back:"המשתנה שאותו החוקר מודד – התוצאה. 'תלוי' כי ערכו תלוי במשתנה הבלתי תלוי."},
  {id:77,category:"השיטה המדעית",front:"מהו משתנה בלתי תלוי?",back:"המשתנה שהחוקר מתפעל או מודד כגורם. במערך ניסויי הוא מתופעל, במתאמי הוא נמדד."},
  {id:78,category:"השיטה המדעית",front:"מהו משתנה מתערב (Confound)?",back:"משתנה חיצוני שמשתנה יחד עם המשתנה הבלתי תלוי ועלול להסביר את השפעתו על המשתנה התלוי."},
  {id:79,category:"תוקף תוצאות המחקר",front:"מהו Artifact?",back:"גורם חיצוני למניפולציה שעלול להסביר את ההבדל שנמצא בין הקבוצות. כל האיומים על התוקף הפנימי הם סוגים של artifacts."}

  "תוקף תוצאות המחקר": 4, "איומים על תוקף פנימי": 5,
  "מערכי מחקר": 6, "הטיות במחקר": 5, "אתיקה במחקר": 6
};

function shuffleArray(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function pickRandom(arr, n) {
  return shuffleArray(arr).slice(0, n);
}

function stripFront(front) {
  return front.replace(/^מהו |^מהי |^מהם |^מה |^מתי |^כיצד |^איך |^האם /,"").replace(/\?$/,"");
}

var Q_TEMPLATES = [
  // Type 1: "What is X?" — correct answer is card.back, distractors are backs of other cards
  {
    makeText: function(card) {
      return "מי מהאפשרויות הבאות מתאר בצורה הנכונה ביותר את המושג: <strong>" + stripFront(card.front) + "</strong>?";
    },
    makeOptions: function(card, distractors) {
      var correctText = card.back.split("\n")[0];
      if (correctText.length > 120) correctText = correctText.substring(0, 117) + "...";
      var opts = distractors.map(function(d) {
        var t = d.back.split("\n")[0];
        return t.length > 120 ? t.substring(0, 117) + "..." : t;
      });
      opts = opts.slice(0, 3);
      var correctIdx = Math.floor(Math.random() * 4);
      opts.splice(correctIdx, 0, correctText);
      return { options: opts, correct: correctIdx };
    },
    makeExplanation: function(card) {
      return "<strong>" + stripFront(card.front) + "</strong> — " + card.back.replace(/\n/g, " ");
    }
  },
  // Type 2: "Which concept matches this description?"
  {
    makeText: function(card) {
      var desc = card.back.split("\n")[0];
      if (desc.length > 200) desc = desc.substring(0, 197) + "...";
      return "איזה מושג מתואר בהגדרה הבאה: \"" + desc + "\"?";
    },
    makeOptions: function(card, distractors) {
      var correctText = stripFront(card.front);
      var opts = distractors.map(function(d) { return stripFront(d.front); }).slice(0, 3);
      var correctIdx = Math.floor(Math.random() * 4);
      opts.splice(correctIdx, 0, correctText);
      return { options: opts, correct: correctIdx };
    },
    makeExplanation: function(card) {
      return "ההגדרה מתארת את <strong>" + stripFront(card.front) + "</strong>: " + card.back.replace(/\n/g, " ");
    }
  },
  // Type 3: "Which of the following is NOT correct about X?"
  {
    makeText: function(card) {
      return "מי מהטענות הבאות <strong>אינה נכונה</strong> לגבי " + stripFront(card.front) + "?";
    },
    makeOptions: function(card, distractors) {
      var wrongAnswer = distractors[0].back.split("\n")[0];
      if (wrongAnswer.length > 120) wrongAnswer = wrongAnswer.substring(0, 117) + "...";
      var parts = card.back.split("\n").filter(function(p) { return p.trim().length > 0; });
      var correctParts = [];
      if (parts.length >= 3) {
        correctParts = pickRandom(parts, 3).map(function(p) {
          p = p.replace(/^\d+\.\s*/, "");
          return p.length > 120 ? p.substring(0, 117) + "..." : p;
        });
      } else {
        correctParts.push(parts[0] ? (parts[0].length > 120 ? parts[0].substring(0,117)+"..." : parts[0]) : card.back.substring(0,120));
        for (var ci = 1; ci < distractors.length && correctParts.length < 3; ci++) {
          if (distractors[ci].category === card.category) {
            var dp = distractors[ci].back.split("\n")[0];
            correctParts.push(dp.length > 120 ? dp.substring(0,117)+"..." : dp);
          }
        }
        while (correctParts.length < 3) correctParts.push(parts[0] || card.back.substring(0,120));
      }
      var correctIdx = Math.floor(Math.random() * 4);
      correctParts.splice(correctIdx, 0, wrongAnswer);
      return { options: correctParts.slice(0, 4), correct: correctIdx };
    },
    makeExplanation: function(card, distractors) {
      return "התשובה השגויה מתייחסת ל<strong>" + stripFront(distractors[0].front) + "</strong>, ולא ל" + stripFront(card.front) + ". " + card.back.split("\n")[0];
    }
  },
  // Type 4: "What is the difference between X and Y?"
  {
    makeText: function(card, distractors) {
      var other = distractors[0];
      return "מה ההבדל העיקרי בין <strong>" + stripFront(card.front) + "</strong> לבין <strong>" + stripFront(other.front) + "</strong>?";
    },
    makeOptions: function(card, distractors) {
      var other = distractors[0];
      var correctText = stripFront(card.front) + " — " + card.back.split("\n")[0].substring(0, 60) + "..., ואילו " + stripFront(other.front) + " — " + other.back.split("\n")[0].substring(0, 60) + "...";
      if (correctText.length > 160) correctText = correctText.substring(0, 157) + "...";
      var wrongOpts = [
        "אין הבדל ביניהם — הם מושגים זהים",
        stripFront(card.front) + " הוא תנאי הכרחי ל" + stripFront(other.front),
        "שניהם מתייחסים לאותה תופעה בדיוק, רק בהקשרים שונים"
      ];
      var correctIdx = Math.floor(Math.random() * 4);
      var opts = pickRandom(wrongOpts, 3);
      opts.splice(correctIdx, 0, correctText);
      return { options: opts, correct: correctIdx };
    },
    makeExplanation: function(card, distractors) {
      var other = distractors[0];
      return "<strong>" + stripFront(card.front) + "</strong>: " + card.back.split("\n")[0] + "<br><strong>" + stripFront(other.front) + "</strong>: " + other.back.split("\n")[0];
    }
  }
];

function generateQuestionFromTemplate(usedCardIds) {
  var availableCards = CARDS_DATA.filter(function(c) { return !usedCardIds.has(c.id); });
  if (availableCards.length < 4) availableCards = CARDS_DATA.slice();

  var card = availableCards[Math.floor(Math.random() * availableCards.length)];

  // Get distractors: prefer same category, fallback to any
  var sameCategory = CARDS_DATA.filter(function(c) { return c.id !== card.id && c.category === card.category; });
  var otherCards = CARDS_DATA.filter(function(c) { return c.id !== card.id && c.category !== card.category; });
  var distractors = shuffleArray(sameCategory).concat(shuffleArray(otherCards)).slice(0, 5);

  if (distractors.length < 3) return null;

  var template = Q_TEMPLATES[Math.floor(Math.random() * Q_TEMPLATES.length)];
  var text = template.makeText(card, distractors);
  var result = template.makeOptions(card, distractors);
  var explanation = template.makeExplanation(card, distractors);

  return {
    id: 20000 + Date.now() % 80000 + Math.floor(Math.random() * 1000),
    topic: FC_CATEGORY_TO_TOPIC[card.category] || 1,
    difficulty: "מחולל",
    text: text,
    options: result.options,
    correct: result.correct,
    explanation: explanation,
    isAI: true,
    sourceCard: card.id
  };
}

function generateBatch(count) {
  var questions = [];
  var usedCardIds = new Set();
  for (var i = 0; i < count; i++) {
    var q = generateQuestionFromTemplate(usedCardIds);
    if (q) {
      questions.push(q);
      usedCardIds.add(q.sourceCard);
    }
  }
  return questions;
}
