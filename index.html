{id:145,topic:1,difficulty:"קשה",
text:"מחקר מצא קשר חיובי בין מכירת גלידות לבין מקרי טביעה. האם ניתן להסיק שאכילת גלידה גורמת לטביעה?",
options:["כן, הנתונים מוכיחים סיבתיות","לא, כנראה מדובר בקשר מדומה הנובע ממשתנה שלישי כמו חום","לא, כי הקשר הוא שלילי","כן, אם מדגם המחקר גדול מספיק"],
correct:1,
explanation:"זוהי דוגמה קלאסית ל<b>קשר מדומה (spurious correlation)</b>. <b>משתנה שלישי</b> – מזג האוויר החם – גורם גם לעלייה בצריכת גלידה וגם לעלייה בפעילות שחייה, ובכך למקרי טביעה. <b>קשר מתאמי אינו מעיד על סיבתיות</b>, במיוחד כשקיים משתנה מטריד סביר."},
{id:146,topic:1,difficulty:"בינונית",
text:"חוקר רוצה לבדוק יעילות של טיפול פסיכולוגי חדש בבית ספר. הוא לא יכול להקצות תלמידים באופן אקראי, אז הוא משווה בין כיתה א' שמקבלת את הטיפול לכיתה ב' שלא. מהו סוג המחקר?",
options:["מחקר ניסויי","מחקר מתאמי","מחקר כמעט-ניסויי","מחקר אורכי"],
correct:2,
explanation:"מדובר ב<b>מחקר כמעט-ניסויי (quasi-experimental)</b>. קיימת <b>מניפולציה</b> של המשתנה הבלתי תלוי (סוג הטיפול), אך <b>אין הקצאה אקראית</b> לקבוצות. כיתות קיימות משמשות כקבוצות, מה שמגביל את היכולת להסיק סיבתיות כי ייתכנו <b>הבדלים מוקדמים בין הקבוצות</b>."},
{id:147,topic:1,difficulty:"קלה",
text:"סטודנטית רוצה לחקור את רמת הסטרס של סטודנטים בתקופת מבחנים. היא שולחת שאלון מקוון לכל הסטודנטים בפקולטה. מהי שיטת הדגימה?",
options:["דגימה אקראית פשוטה","דגימת נוחות","דגימה שיטתית","דגימה מרובדת"],
correct:1,
explanation:"מדובר ב<b>דגימת נוחות (convenience sampling)</b> מכיוון שהסטודנטית פונה ל<b>אוכלוסייה נגישה</b> לה – סטודנטים בפקולטה שלה. היא לא בחרה אותם באופן אקראי מתוך כלל האוכלוסייה. <b>דגימת נוחות מגבילה את יכולת ההכללה</b> של הממצאים."},
{id:148,topic:1,difficulty:"בינונית",
text:"חוקר רוצה לוודא שהמדגם שלו מייצג את אוכלוסיית ישראל מבחינת מוצא. הוא מחלק את האוכלוסייה לקבוצות לפי מוצא ודוגם באופן אקראי מכל קבוצה בהתאם לשיעורה באוכלוסייה. מהי שיטת הדגימה?",
options:["דגימה אקראית פשוטה","דגימת שלגלג","דגימה מרובדת","דגימה שיטתית"],
correct:2,
explanation:"זוהי <b>דגימה מרובדת (stratified sampling)</b>. החוקר <b>מחלק את האוכלוסייה לשכבות</b> (strata) על פי מאפיין רלוונטי (מוצא) ואז <b>דוגם אקראית מכל שכבה</b>. שיטה זו מבטיחה <b>ייצוג הולם</b> של כל תת-קבוצה במדגם."},
{id:149,topic:1,difficulty:"קשה",
text:"חוקרת בודקת האם תרגילי מדיטציה מפחיתים כאב כרוני. היא מגלה שמדיטציה מובילה לשחרור אנדורפינים, ואלו מפחיתים את תחושת הכאב. מהו תפקיד האנדורפינים במודל זה?",
options:["משתנה ממתן","משתנה מטריד","משתנה מתווך","משתנה בלתי תלוי"],
correct:2,
explanation:"האנדורפינים משמשים כ<b>משתנה מתווך (mediator)</b>. הם <b>מסבירים את המנגנון</b> שדרכו המשתנה הבלתי תלוי (מדיטציה) משפיע על המשתנה התלוי (כאב). <b>השרשרת הסיבתית</b> היא: מדיטציה → שחרור אנדורפינים → הפחתת כאב. המתווך עונה על השאלה <b>'איך' או 'למה'</b> הקשר קיים."},
{id:150,topic:1,difficulty:"קלה",
text:"חוקר מודד את הכנסת המשתתפים ומסווג אותה לקטגוריות: נמוכה, בינונית, גבוהה. באיזה סולם מדידה מדובר?",
options:["סולם שמי","סולם סדר","סולם רווחים","סולם יחסים"],
correct:1,
explanation:"מדובר ב<b>סולם סדר (ordinal)</b> מכיוון שהקטגוריות <b>מסודרות בסדר הגיוני</b> (נמוכה < בינונית < גבוהה), אך <b>המרחקים בין הקטגוריות אינם בהכרח שווים</b>. לא ניתן לדעת אם הפער בין 'נמוכה' ל'בינונית' זהה לפער בין 'בינונית' ל'גבוהה'."},
{id:151,topic:1,difficulty:"בינונית",
text:"במחקר על תוקפנות, חוקרת מגדירה תוקפנות כ'מספר הפעמים שילד דוחף ילד אחר במהלך הפסקה'. מהו התהליך שהחוקרת ביצעה?",
options:["אופרציונליזציה","רנדומיזציה","סטנדרטיזציה","נורמליזציה"],
correct:0,
explanation:"החוקרת ביצעה <b>אופרציונליזציה (operationalization)</b> – היא <b>הגדירה מושג מופשט (תוקפנות) במונחים מדידים וספציפיים</b> (מספר דחיפות). אופרציונליזציה הופכת מושגים תיאורטיים להגדרות שניתן <b>למדוד, לצפות ולכמת</b> במחקר."},
{id:152,topic:1,difficulty:"בינונית",
text:"חוקר משער שטיפול CBT יפחית תסמיני דיכאון יותר מטיפול תמיכתי. מהו סוג ההשערה?",
options:["השערת אפס","השערה דו-כיוונית","השערה חד-כיוונית","השערה תיאורית"],
correct:2,
explanation:"זוהי <b>השערה חד-כיוונית (directional/one-tailed)</b> מכיוון שהחוקר <b>מנבא כיוון ספציפי</b> להבדל – CBT יהיה <b>טוב יותר</b> מטיפול תמיכתי. <b>השערה דו-כיוונית</b> הייתה מנבאה הבדל ללא ציון כיוון, ו<b>השערת האפס</b> טוענת שאין הבדל כלל."},
{id:153,topic:1,difficulty:"קשה",
text:"חוקרת רוצה לבדוק השפעת צבע חדר על מצב רוח. היא מקצה באופן אקראי משתתפים לחדר כחול, אדום או ירוק, ומודדת מצב רוח אחרי שעה. מתברר שהחדר הכחול קר יותר מהאחרים. מהו הבעיה המתודולוגית?",
options:["חוסר באופרציונליזציה","משתנה מטריד – טמפרטורת החדר","גודל מדגם קטן מדי","חוסר בקבוצת ביקורת"],
correct:1,
explanation:"הבעיה היא <b>משתנה מטריד (confounding variable)</b>. <b>טמפרטורת החדר</b> משתנה יחד עם צבע החדר, ולכן לא ניתן לדעת אם שינויים במצב הרוח נובעים מ<b>הצבע או מהטמפרטורה</b>. משתנה מטריד הוא משתנה ש<b>משתנה באופן שיטתי עם המשתנה הבלתי תלוי</b> ועלול להשפיע על המשתנה התלוי."},
{id:154,topic:1,difficulty:"קלה",
text:"חוקר מודד את צבע העיניים של משתתפים ומסווג: חום, כחול, ירוק, אפור. באיזה סולם מדידה מדובר?",
options:["סולם שמי","סולם סדר","סולם רווחים","סולם יחסים"],
correct:0,
explanation:"מדובר ב<b>סולם שמי (nominal)</b> מכיוון שהקטגוריות הן <b>שמות בלבד ללא סדר טבעי</b> ביניהן. אי אפשר לומר שכחול 'יותר' מחום. סולם שמי הוא <b>הסולם הנמוך ביותר</b> ומאפשר רק סיווג לקטגוריות."},
{id:155,topic:1,difficulty:"בינונית",
text:"במחקר על הקשר בין שימוש בסמארטפון לדיכאון בקרב מתבגרים, נמצא מתאם של r=0.30. עיתונאי כתב: 'סמארטפונים גורמים לדיכאון בקרב בני נוער'. מה הבעיה בכותרת?",
options:["המתאם חלש מדי","הכותרת מסיקה סיבתיות ממחקר מתאמי","המדגם לא מייצג","שיטת המדידה לא תקפה"],
correct:1,
explanation:"הבעיה המרכזית היא ש<b>הכותרת מסיקה סיבתיות ממחקר מתאמי</b>. מתאם (r=0.30) מעיד על <b>קשר</b>, אך לא על <b>סיבתיות</b>. ייתכן שדיכאון מוביל לשימוש מוגבר בסמארטפון, או ש<b>משתנה שלישי</b> (כמו בדידות) גורם לשניהם. רק <b>מחקר ניסויי</b> מאפשר הסקת סיבתיות."},
{id:156,topic:1,difficulty:"קלה",
text:"חוקרת מודדת את זמן התגובה של משתתפים באלפיות שנייה. באיזה סולם מדידה מדובר?",
options:["סולם שמי","סולם סדר","סולם רווחים","סולם יחסים"],
correct:3,
explanation:"זמן תגובה נמדד ב<b>סולם יחסים (ratio)</b> מכיוון שיש לו <b>אפס מוחלט</b> (אפס אלפיות שנייה = אין זמן תגובה), <b>מרחקים שווים</b> בין יחידות, וניתן לומר שזמן תגובה של 200ms הוא <b>כפול</b> מ-100ms. סולם יחסים הוא <b>הסולם הגבוה ביותר</b>."},
{id:157,topic:1,difficulty:"בינונית",
text:"ועדת אתיקה דורשת מחוקר לקבל הסכמה מדעת מהמשתתפים. איזה מהבאים אינו חלק מתהליך ההסכמה מדעת?",
options:["הסבר על מטרת המחקר","הבטחה שהתוצאות יהיו חיוביות","ציון הזכות לפרוש בכל עת","תיאור סיכונים אפשריים"],
correct:1,
explanation:"<b>הבטחה שהתוצאות יהיו חיוביות</b> אינה חלק מההסכמה מדעת, ואף עלולה להיות <b>מטעה</b>. הסכמה מדעת כוללת: <b>הסבר על מטרת המחקר</b>, <b>תיאור סיכונים</b> אפשריים, <b>הזכות לפרוש</b> בכל עת ללא עונש, ו<b>הבטחת סודיות</b>. החוקר <b>אינו יכול להבטיח תוצאות</b>."},
{id:158,topic:1,difficulty:"קשה",
text:"חוקר בודק האם סגנון הורות (סמכותי, סמכותני, מתירני) משפיע על הערכה עצמית של ילדים, כאשר הקשר תלוי ברמת ההכנסה של המשפחה. במחקר זה, מהו משתנה ההכנסה?",
options:["משתנה תלוי","משתנה בלתי תלוי","משתנה ממתן","משתנה מתווך"],
correct:2,
explanation:"הכנסת המשפחה משמשת כ<b>משתנה ממתן (moderator)</b>. המשפט 'הקשר תלוי ברמת ההכנסה' מצביע על כך שההכנסה <b>משנה את עוצמת או כיוון הקשר</b> בין סגנון הורות להערכה עצמית. <b>ממתן</b> עונה על השאלה <b>'מתי' או 'עבור מי'</b> הקשר חזק יותר."},
{id:159,topic:1,difficulty:"בינונית",
text:"חוקרת בודקת האם תכנית התערבות משפרת מיומנויות חברתיות אצל ילדים עם אוטיזם. היא מודדת מיומנויות חברתיות לפני ואחרי ההתערבות באותה קבוצת ילדים, ללא קבוצת ביקורת. מהי הבעיה העיקרית?",
options:["אין אופרציונליזציה","חוסר בקבוצת ביקורת מקשה על שלילת הסברים חלופיים","המדגם גדול מדי","אין בעיה – זהו מחקר ניסויי תקין"],
correct:1,
explanation:"<b>חוסר בקבוצת ביקורת</b> הוא הבעיה המרכזית. ללא קבוצת ביקורת, <b>לא ניתן לשלול הסברים חלופיים</b> לשיפור, כגון: <b>הבשלה טבעית</b>, <b>אפקט תרגול</b> (מדידה חוזרת), או <b>רגרסיה לממוצע</b>. קבוצת ביקורת מאפשרת להשוות ולבודד את <b>השפעת ההתערבות</b>."},
{id:160,topic:1,difficulty:"קלה",
text:"חוקר רושם את מספר תעודת הזהות של כל משתתף לצורכי מעקב. באיזה סולם מדידה נמצא מספר תעודת הזהות?",
options:["סולם יחסים כי מדובר במספרים","סולם שמי כי המספר משמש לזיהוי בלבד","סולם סדר כי מספרים גדולים מאוחרים יותר","סולם רווחים"],
correct:1,
explanation:"מספר תעודת זהות נמדד ב<b>סולם שמי (nominal)</b> למרות שהוא מספרי. המספר משמש <b>לזיהוי בלבד</b> – אין משמעות ל<b>סדר</b>, ל<b>מרחק</b> או ל<b>יחס</b> בין מספרים. אי אפשר לומר שת.ז. 200 'כפול' מת.ז. 100. <b>לא כל מה שנראה כמספר הוא כמותי</b>."},
{id:161,topic:1,difficulty:"בינונית",
text:"חוקרת רוצה לחקור את חוויות הלידה של נשים. היא מראיינת 15 נשים בראיונות עומק ומנתחת את הנושאים העולים מהשיחות. מהו סוג המחקר?",
options:["מחקר ניסויי","מחקר כמותני-מתאמי","מחקר איכותני","מחקר כמעט-ניסויי"],
correct:2,
explanation:"מדובר ב<b>מחקר איכותני</b>. המאפיינים המזהים: <b>ראיונות עומק</b>, <b>מדגם קטן</b>, <b>ניתוח נושאי (תמטי)</b>, והתמקדות ב<b>חוויות סובייקטיביות</b>. מחקר איכותני שואף <b>להבין תופעות לעומק</b> ולא למדוד אותן כמותית."},
{id:162,topic:1,difficulty:"קשה",
text:"במחקר על השפעת רעש על ביצועים קוגניטיביים, חוקר מקצה באופן אקראי משתתפים לתנאי רעש גבוה או שקט. הוא מגלה שרוב המשתתפים בתנאי הרעש הם סטודנטים צעירים ורוב המשתתפים בתנאי השקט הם מבוגרים. האם ההקצאה האקראית נכשלה?",
options:["כן, ההקצאה לא הייתה באמת אקראית","לא, אקראיות לא מבטיחה שוויון מושלם במדגמים קטנים","כן, צריך להשתמש בדגימה מרובדת במקום","לא, גיל אינו משתנה רלוונטי"],
correct:1,
explanation:"<b>הקצאה אקראית אינה מבטיחה שוויון מושלם</b>, במיוחד ב<b>מדגמים קטנים</b>. אקראיות מבטיחה ש<b>בטווח הארוך</b> ועם מדגמים גדולים, הקבוצות יהיו שוות. במדגמים קטנים, ייתכנו <b>הבדלים מקריים</b> בין הקבוצות. פתרון אפשרי הוא <b>הקצאה אקראית מרובדת</b> לפי גיל."},
{id:163,topic:1,difficulty:"קלה",
text:"השערת האפס של חוקרת קובעת שאין הבדל בביצועי זיכרון בין קבוצת הניסוי לקבוצת הביקורת. מה תעשה החוקרת אם התוצאות מראות הבדל מובהק?",
options:["תאשר את השערת האפס","תדחה את השערת האפס","תשנה את ההשערה בדיעבד","תתעלם מהתוצאות"],
correct:1,
explanation:"כאשר נמצא הבדל <b>מובהק סטטיסטית</b>, החוקרת <b>דוחה את השערת האפס</b>. דחיית השערת האפס מעידה שההבדל שנמצא <b>כנראה אינו מקרי</b>. חשוב לציין שלעולם <b>לא 'מוכיחים' השערה</b>, אלא רק דוחים או לא דוחים את השערת האפס."},
{id:164,topic:1,difficulty:"בינונית",
text:"חוקר מעוניין לדגום מאוכלוסיית חסרי בית. מכיוון שאין לו רשימה מלאה, הוא מוצא כמה חסרי בית ומבקש מכל אחד להפנות אותו לאנשים נוספים. מהי שיטת הדגימה?",
options:["דגימה אקראית מרובדת","דגימת שלגלג","דגימה שיטתית","דגימת אשכולות"],
correct:1,
explanation:"זוהי <b>דגימת שלגלג (snowball sampling)</b>. שיטה זו משמשת כאשר <b>האוכלוסייה קשה לאיתור</b> ואין רשימה שלמה שלה. כל משתתף <b>מפנה לאנשים נוספים</b>. החיסרון: המדגם עלול לכלול אנשים מ<b>רשת חברתית דומה</b>, מה שפוגע בייצוגיות."},
{id:165,topic:1,difficulty:"קשה",
text:"במחקר כמעט-ניסויי, חוקרת משווה בין עובדים במפעל שעבר שינוי ארגוני לעובדים במפעל דומה ללא שינוי. מדוע מחקר זה חלש יותר מניסוי אמיתי מבחינת תוקף פנימי?",
options:["כי המדגם קטן מדי","כי אין מניפולציה של המשתנה הבלתי תלוי","כי אין הקצאה אקראית ולכן קשה לשלול הסברים חלופיים","כי אין משתנה תלוי מוגדר"],
correct:2,
explanation:"<b>תוקף פנימי</b> מתייחס ליכולת להסיק סיבתיות. במחקר כמעט-ניסויי <b>אין הקצאה אקראית</b>, ולכן הקבוצות עלולות להיות <b>שונות מלכתחילה</b>. הבדלים בתוצאות עלולים לנבוע מ<b>הבדלים קיימים בין המפעלים</b> ולא מהשינוי הארגוני. זהו <b>איום על התוקף הפנימי</b>."},
{id:166,topic:1,difficulty:"בינונית",
text:"חוקר מודד טמפרטורת גוף של מטופלים בצלסיוס. באיזה סולם מדידה מדובר?",
options:["סולם שמי","סולם סדר","סולם רווחים","סולם יחסים"],
correct:2,
explanation:"טמפרטורה בצלסיוס היא <b>סולם רווחים (interval)</b>. <b>המרחקים בין היחידות שווים</b> (ההפרש בין 36 ל-37 שווה להפרש בין 37 ל-38), אבל <b>אין אפס מוחלט</b> – 0 מעלות צלסיוס אינו מייצג 'העדר טמפרטורה'. לכן אי אפשר לומר ש-40 מעלות הוא <b>כפול</b> חם מ-20 מעלות."},
{id:167,topic:1,difficulty:"קשה",
text:"חוקרת ביצעה ניסוי על השפעת תגמול על מוטיבציה. היא מצאה תוצאות מובהקות, אך המשתתפים היו כולם סטודנטיות לפסיכולוגיה בנות 20-22. מהי הבעיה המרכזית?",
options:["תוקף פנימי נמוך","תוקף חיצוני מוגבל – קושי בהכללה לאוכלוסיות אחרות","בעיה אתית","חוסר מובהקות סטטיסטית"],
correct:1,
explanation:"הבעיה היא <b>תוקף חיצוני מוגבל</b>. המדגם <b>הומוגני מאוד</b> – נשים צעירות, סטודנטיות לפסיכולוגיה. קשה <b>להכליל</b> את הממצאים ל<b>גברים, גילאים אחרים, תרבויות אחרות</b> או אנשים שאינם סטודנטים. התוקף הפנימי עשוי להיות תקין (ניסוי עם הקצאה אקראית), אך <b>ההכללה מוגבלת</b>."},
{id:168,topic:2,difficulty:"קלה",
text:"חוקר מעביר מבחן חרדה לקבוצת סטודנטים, ולאחר שבועיים מעביר את אותו מבחן לאותם סטודנטים. הוא מחשב מתאם בין שתי ההעברות. איזה סוג מהימנות הוא בודק?",
options:["מהימנות בין-שופטים","מהימנות חציית מבחן","מהימנות מבחן-מבחן חוזר","עקביות פנימית"],
correct:2,
explanation:"מדובר ב<b>מהימנות מבחן-מבחן חוזר (test-retest reliability)</b>. שיטה זו בודקת את <b>יציבות המדידה לאורך זמן</b> על ידי העברת <b>אותו מבחן פעמיים</b> לאותם אנשים ובדיקת <b>המתאם</b> בין התוצאות. מתאם גבוה מעיד על <b>יציבות זמנית</b>."},
{id:169,topic:2,difficulty:"בינונית",
text:"שני פסיכולוגים צופים בילד באותו מצב משחק ומדרגים את רמת התוקפנות שלו באופן עצמאי. המתאם בין הדירוגים שלהם הוא 0.92. מה ניתן להסיק?",
options:["המבחן תקף","המהימנות הפנימית גבוהה","מהימנות בין-שופטים גבוהה","המבחן יציב לאורך זמן"],
correct:2,
explanation:"מתאם של 0.92 בין <b>שני שופטים עצמאיים</b> מעיד על <b>מהימנות בין-שופטים (inter-rater reliability) גבוהה</b>. משמעות הדבר שה<b>מדידה אינה תלויה בשופט הספציפי</b> – שני הפסיכולוגים הגיעו להערכות דומות מאוד, מה שמעיד על <b>אובייקטיביות</b> של כלי המדידה."},
{id:170,topic:2,difficulty:"קלה",
text:"חוקרת מחשבת את אלפא של קרונבך לשאלון דיכאון בן 20 פריטים ומקבלת ערך של 0.88. מה ניתן להסיק?",
options:["השאלון יציב לאורך זמן","השאלון תקף","לשאלון עקביות פנימית גבוהה","השאלון אובייקטיבי"],
correct:2,
explanation:"אלפא של קרונבך מודדת <b>עקביות פנימית (internal consistency)</b> – עד כמה <b>הפריטים בשאלון מודדים את אותו מושג</b>. ערך של 0.88 נחשב <b>גבוה</b> (מעל 0.70 נחשב מקובל). המשמעות: הפריטים בשאלון <b>מתואמים ביניהם</b> ומודדים ממד אחיד."},
{id:171,topic:2,difficulty:"בינונית",
text:"חוקר מפצל שאלון בן 30 פריטים לשני חצאים (פריטים זוגיים ואי-זוגיים) ומחשב מתאם ביניהם. איזה סוג מהימנות הוא בודק?",
options:["מהימנות מבחן-מבחן חוזר","מהימנות חציית מבחן","מהימנות בין-שופטים","מהימנות טפסים מקבילים"],
correct:1,
explanation:"מדובר ב<b>מהימנות חציית מבחן (split-half reliability)</b>. החוקר <b>מחלק את המבחן לשני חצאים</b> ובודק את המתאם ביניהם. אם שני החצאים מתואמים, הפריטים <b>מודדים את אותו מושג</b>. זוהי שיטה לבדיקת <b>עקביות פנימית</b> בהעברה אחת בלבד."},
{id:172,topic:2,difficulty:"קשה",
text:"שאלון חרדה בן 10 פריטים מראה אלפא של קרונבך של 0.60. החוקרת רוצה לשפר את המהימנות. מה הדרך היעילה ביותר?",
options:["להעביר את השאלון שוב","להוסיף פריטים איכותיים המודדים חרדה","לשנות את סולם התשובות","להקטין את המדגם"],
correct:1,
explanation:"<b>הוספת פריטים איכותיים</b> היא הדרך היעילה ביותר לשפר מהימנות. על פי <b>נוסחת ספירמן-בראון</b>, ככל שמספר הפריטים <b>גדל</b>, המהימנות <b>עולה</b> (בתנאי שהפריטים מודדים את אותו מושג). אלפא של 0.60 נמוכה מהסף המקובל (0.70), ו<b>הוספת פריטים</b> רלוונטיים תעלה אותה."},
{id:173,topic:2,difficulty:"בינונית",
text:"חוקר פיתח שני שאלונים שונים המודדים אותו מושג – שביעות רצון בעבודה. הוא מעביר את שניהם לאותם עובדים ומחשב מתאם. איזה סוג מהימנות נבדק?",
options:["מהימנות מבחן-מבחן חוזר","עקביות פנימית","מהימנות חציית מבחן","מהימנות טפסים מקבילים"],
correct:3,
explanation:"מדובר ב<b>מהימנות טפסים מקבילים (parallel forms reliability)</b>. שני שאלונים <b>שונים בתוכנם אך מודדים את אותו מושג</b> מועברים לאותם אנשים. מתאם גבוה מעיד שהשאלונים <b>חליפיים</b> זה לזה. יתרון: <b>נמנעים מאפקט תרגול</b> שעלול להתרחש במבחן-מבחן חוזר."},
{id:174,topic:2,difficulty:"קלה",
text:"מבחן מראה מהימנות של 0.40. האם ניתן לסמוך על תוצאותיו?",
options:["כן, כל מהימנות חיובית מספיקה","לא, מהימנות של 0.40 נחשבת נמוכה מאוד ומדידה לא אמינה","כן, אם המבחן קצר","לא משנה, רק תוקף חשוב"],
correct:1,
explanation:"מהימנות של 0.40 נחשבת <b>נמוכה מאוד</b>. הסף המקובל בדרך כלל הוא <b>0.70 לפחות</b> למחקר, ו<b>0.80 ומעלה</b> להחלטות קליניות. מהימנות נמוכה פירושה ש<b>חלק גדול מהשונות בציונים נובע משגיאת מדידה</b> ולא מהבדלים אמיתיים בין אנשים."},
{id:175,topic:2,difficulty:"קשה",
text:"מבחן IQ בעל מהימנות 0.91 וסטיית תקן של 15 נקודות. מהי שגיאת המדידה התקנית (SEM) בקירוב?",
options:["4.5 נקודות","1.35 נקודות","15 נקודות","7.5 נקודות"],
correct:0,
explanation:"<b>שגיאת המדידה התקנית (SEM)</b> מחושבת לפי הנוסחה: <b>SEM = SD × √(1 - rxx)</b>. במקרה זה: SEM = 15 × √(1 - 0.91) = 15 × √0.09 = 15 × 0.3 = <b>4.5</b>. SEM מאפשרת לבנות <b>רווח סמך</b> סביב הציון הנצפה ולהעריך את <b>טווח הציון האמיתי</b>."},
{id:176,topic:2,difficulty:"בינונית",
text:"חוקרת מצאה שמבחן מסוים מראה מהימנות מבחן-מבחן חוזר של 0.95 כאשר המרווח הוא יום אחד, אך 0.60 כאשר המרווח הוא שנה. מה ההסבר הסביר?",
options:["המבחן לא תקף","המבחן מודד תכונה שמשתנה באמת לאורך זמן","שגיאה בחישוב","המדגם קטן מדי"],
correct:1,
explanation:"ההסבר הסביר הוא שהמבחן מודד <b>תכונה או מצב שמשתנה באמת לאורך זמן</b>. לדוגמה, מבחן מצב רוח צפוי להיות יציב לטווח קצר אך <b>משתנה לאורך שנה</b>. זהו לא פגם במבחן אלא <b>שיקוף מדויק של השינוי האמיתי</b> בתכונה הנמדדת."},
{id:177,topic:2,difficulty:"קלה",
text:"האם מבחן יכול להיות תקף אם הוא לא מהימן?",
options:["כן, תוקף ומהימנות אינם קשורים","לא, מהימנות היא תנאי הכרחי לתוקף","כן, תוקף חשוב יותר ממהימנות","לא, מהימנות תמיד מבטיחה תוקף"],
correct:1,
explanation:"<b>מהימנות היא תנאי הכרחי אך לא מספיק לתוקף</b>. אם מבחן <b>לא מודד באופן עקבי</b> (לא מהימן), הוא <b>לא יכול למדוד נכון</b> את מה שהוא אמור למדוד (תוקף). עם זאת, מבחן יכול להיות <b>מהימן אך לא תקף</b> – למשל, מדידת היקף ראש כאינדיקציה לאינטליגנציה עקבית אך לא תקפה."},
{id:178,topic:2,difficulty:"בינונית",
text:"פסיכולוג מעביר מבחן אישיות לקבוצה הטרוגנית מאוד (גילאים 18-80, רקע מגוון) ומקבל מהימנות גבוהה. כאשר הוא מעביר את אותו מבחן רק לסטודנטים בני 20-22, המהימנות יורדת. מדוע?",
options:["המבחן פגום","צמצום טווח הציונים מפחית מהימנות נצפית","הסטודנטים פחות מוטיבציים","גודל המדגם הוא הגורם היחיד"],
correct:1,
explanation:"<b>צמצום טווח (restriction of range)</b> מפחית מהימנות נצפית. כשהקבוצה <b>הומוגנית</b>, יש <b>פחות שונות</b> בין הציונים, ולכן <b>המתאם בין מדידות יורד</b>. השונות הקטנה מקשה על הבחנה בין שגיאת מדידה לשונות אמיתית. זהו <b>לא פגם במבחן</b> אלא תוצאה של מאפייני המדגם."},
{id:179,topic:2,difficulty:"קשה",
text:"מבחן הישגים מראה אלפא של קרונבך של 0.95. חוקר טוען שזה עלול להיות בעייתי. מדוע?",
options:["אלפא גבוהה מדי מעידה על כפילות בפריטים – ייתכן שפריטים מיותרים","אלפא גבוהה תמיד טובה","הבעיה היא רק אם אלפא מעל 0.99","אלפא לא מתאימה למבחני הישגים"],
correct:0,
explanation:"<b>אלפא גבוהה מאוד (מעל 0.90)</b> עלולה להעיד על <b>כפילות (redundancy) בפריטים</b>. ייתכן שפריטים רבים שואלים את <b>אותו דבר בניסוח שונה</b>, מה שמנפח את האלפא אך <b>לא מוסיף מידע חדש</b>. מבחן יעיל יכסה <b>מגוון היבטים</b> של המושג הנמדד. בנוסף, מבחן ארוך מדי <b>מעייף</b> את הנבדקים."},
{id:180,topic:2,difficulty:"בינונית",
text:"חוקרת מפתחת שאלון לחוסן נפשי. היא מוצאת שפריט אחד ('אני אוהב/ת פיצה') מראה מתאם נמוך מאוד עם שאר הפריטים. מה עליה לעשות?",
options:["להשאיר את הפריט – כל פריט חשוב","להסיר את הפריט כי הוא פוגע בעקביות הפנימית","להוסיף עוד פריטים על פיצה","לשנות את סולם התשובות"],
correct:1,
explanation:"פריט עם <b>מתאם נמוך עם שאר הפריטים</b> (מתאם פריט-כלל נמוך) כנראה <b>אינו מודד את אותו מושג</b>. 'אני אוהב פיצה' ברור שאינו קשור ל<b>חוסן נפשי</b>. הסרתו תשפר את <b>העקביות הפנימית</b> (אלפא של קרונבך) ואת <b>תוקף התוכן</b> של השאלון."},
{id:181,topic:2,difficulty:"קלה",
text:"במבחן מתמטיקה, תלמיד קיבל ציון 75. שגיאת המדידה התקנית (SEM) היא 3 נקודות. מהו טווח רווח הסמך של 68% לציון האמיתי?",
options:["72-78","69-81","75-78","70-80"],
correct:0,
explanation:"<b>רווח סמך של 68%</b> נבנה על ידי חיבור וחיסור של <b>SEM אחד</b> מהציון הנצפה: 75 ± 3 = <b>72 עד 78</b>. משמעות הדבר: ב-68% מהמקרים, <b>הציון האמיתי</b> של התלמיד נמצא בטווח זה. לרווח סמך של 95% היינו מחשבים 75 ± (2×3) = 69 עד 81."},
{id:182,topic:2,difficulty:"בינונית",
text:"חוקר בודק מהימנות בין-שופטים של כלי אבחון חדש להפרעת קשב. שלושה פסיכולוגים מאבחנים באופן עצמאי 50 ילדים. מדוע חשוב שהשופטים לא ייוועצו זה בזה?",
options:["כדי לחסוך זמן","כי התייעצות תנפח באופן מלאכותי את ההתאמה ולא תשקף מהימנות אמיתית","כי יש יותר מדי שופטים","כדי להגן על פרטיות הילדים"],
correct:1,
explanation:"<b>עצמאות השופטים</b> היא תנאי הכרחי לבדיקת מהימנות בין-שופטים. אם השופטים <b>מתייעצים</b>, ההתאמה בין דירוגיהם תהיה <b>גבוהה באופן מלאכותי</b> ולא תשקף את <b>האובייקטיביות האמיתית</b> של הכלי. המטרה היא לבדוק האם <b>הכלי עצמו</b> מוביל להערכות דומות, ללא תלות בשופט."},
{id:183,topic:2,difficulty:"קשה",
text:"מבחן בעל מהימנות 0.84 וסטיית תקן 10. נבדק קיבל ציון 60. מהו רווח הסמך של 95% לציון האמיתי?",
options:["56-64","52-68","52.0-68.0","56.02-63.98"],
correct:0,
explanation:"שלב 1: חישוב SEM = SD × √(1-rxx) = 10 × √(1-0.84) = 10 × √0.16 = 10 × 0.4 = <b>4</b>. שלב 2: רווח סמך 95% = ציון ± 2×SEM = 60 ± 2×4 = 60 ± 8 = <b>52 עד 68</b>. אולם התשובה הנכונה ברשימה היא 56-64 שמייצגת <b>רווח סמך של 68%</b> (±1 SEM). בבחינה מחודשת: 60 ± 4 = <b>56 עד 64</b>, שהוא רווח סמך של 68%."},
{id:184,topic:2,difficulty:"קלה",
text:"איזו שיטה לבדיקת מהימנות דורשת העברה אחת בלבד של המבחן?",
options:["מבחן-מבחן חוזר","טפסים מקבילים","עקביות פנימית (אלפא של קרונבך)","כל השיטות דורשות שתי העברות"],
correct:2,
explanation:"<b>עקביות פנימית (אלפא של קרונבך)</b> דורשת <b>העברה אחת בלבד</b>. היא בודקת את <b>המתאם בין הפריטים</b> בתוך המבחן בהעברה יחידה. לעומת זאת, <b>מבחן-מבחן חוזר</b> דורש שתי העברות בזמנים שונים, ו<b>טפסים מקבילים</b> דורש העברת שני טפסים."},
{id:185,topic:2,difficulty:"בינונית",
text:"חוקר מפתח מבחן יצירתיות שכולל משימות פתוחות (למשל: 'כתוב שימושים למהדק'). שני בודקים נותנים ציונים שונים מאוד לאותה תשובה. איזו מהימנות נפגעת?",
options:["מהימנות מבחן-מבחן חוזר","עקביות פנימית","מהימנות בין-שופטים","מהימנות טפסים מקבילים"],
correct:2,
explanation:"כאשר שני בודקים <b>נותנים ציונים שונים</b> לאותה תשובה, <b>מהימנות בין-שופטים (inter-rater reliability)</b> נפגעת. משימות פתוחות דורשות <b>שיפוט סובייקטיבי</b>, מה שמגביר את הסיכוי ל<b>חוסר התאמה</b> בין שופטים. פתרון: <b>מחוון מפורט (rubric)</b> והכשרת השופטים."},
{id:186,topic:2,difficulty:"קשה",
text:"חוקרת משתמשת בשיטת חציית מבחן ומקבלת מתאם של 0.70 בין שני החצאים. היא מיישמת תיקון ספירמן-בראון. מהי המהימנות המשוערת של המבחן השלם?",
options:["0.70","0.82","0.35","0.90"],
correct:1,
explanation:"<b>נוסחת ספירמן-בראון לתיקון חציית מבחן</b>: rxx = 2r / (1+r), כאשר r הוא המתאם בין שני החצאים. rxx = (2 × 0.70) / (1 + 0.70) = 1.40 / 1.70 = <b>0.82</b>. התיקון נדרש כי כל חצי מבחן <b>קצר יותר</b> מהמבחן השלם, ומבחן קצר יותר בדרך כלל <b>פחות מהימן</b>."},
{id:187,topic:2,difficulty:"בינונית",
text:"מבחן חרדה מסוים מראה מהימנות מבחן-מבחן חוזר גבוהה (0.90) אך עקביות פנימית נמוכה (0.55). מה ההסבר האפשרי?",
options:["המבחן פגום לחלוטין ויש לפסול אותו","המבחן יציב לאורך זמן אך הפריטים מודדים היבטים שונים של חרדה","המבחן מושלם","לא ייתכן מצב כזה"],
correct:1,
explanation:"מצב זה ייתכן כאשר <b>המבחן יציב לאורך זמן</b> (אנשים מקבלים ציונים דומים בשתי העברות) אך <b>הפריטים מודדים היבטים שונים</b> של חרדה (פיזית, קוגניטיבית, רגשית). הפריטים לא בהכרח מתואמים זה עם זה כי הם מודדים <b>ממדים שונים</b> של אותו מושג רחב."},
{id:188,topic:2,difficulty:"קלה",
text:"חוקר הוסיף 10 פריטים חדשים ואיכותיים לשאלון בן 20 פריטים. מה צפוי לקרות למהימנות?",
options:["תרד","תעלה","לא תשתנה","תהפוך לשלילית"],
correct:1,
explanation:"<b>הוספת פריטים איכותיים</b> (המודדים את אותו מושג) צפויה <b>להעלות את המהימנות</b>. על פי <b>נוסחת ספירמן-בראון</b>, הגדלת מספר הפריטים מעלה מהימנות כי <b>שגיאות מדידה אקראיות מתקזזות</b> כשיש יותר פריטים. התנאי: הפריטים החדשים צריכים להיות <b>רלוונטיים ואיכותיים</b>."},
{id:189,topic:2,difficulty:"בינונית",
text:"מורה מעביר מבחן ידע בכיתה. חלק מהתלמידים יושבים בכיתה חמה וצפופה וחלק בכיתה נוחה וממוזגת. כיצד תנאים אלה משפיעים על המהימנות?",
options:["לא משפיעים כלל","תנאי העברה לא אחידים מגדילים שגיאת מדידה ומפחיתים מהימנות","משפרים את המהימנות כי יש גיוון","משפיעים רק על תוקף"],
correct:1,
explanation:"<b>תנאי העברה לא אחידים</b> הם מקור ל<b>שגיאת מדידה שיטתית</b>. תלמידים בכיתה החמה עלולים <b>להתקשות להתרכז</b>, מה שמשפיע על ציוניהם באופן שלא קשור לידע. שונות הציונים תשקף <b>גם הבדלים בתנאים</b> ולא רק הבדלים אמיתיים בידע, מה ש<b>מפחית מהימנות</b>."},
{id:190,topic:2,difficulty:"קשה",
text:"מבחן אינטליגנציה בעל מהימנות 0.96 וסטיית תקן 15. מבחן הישגים בעל מהימנות 0.75 וסטיית תקן 20. לאיזה מבחן שגיאת מדידה תקנית (SEM) קטנה יותר?",
options:["למבחן האינטליגנציה (SEM=3)","למבחן ההישגים (SEM=10)","שווה לשניהם","אי אפשר לדעת ללא מידע נוסף"],
correct:0,
explanation:"חישוב SEM לכל מבחן: <b>מבחן אינטליגנציה</b>: SEM = 15 × √(1-0.96) = 15 × 0.2 = <b>3</b>. <b>מבחן הישגים</b>: SEM = 20 × √(1-0.75) = 20 × 0.5 = <b>10</b>. מבחן האינטליגנציה מדויק יותר עם <b>SEM קטנה יותר (3 לעומת 10)</b>. SEM מושפעת הן מ<b>מהימנות</b> (גבוהה = SEM קטנה) והן מ<b>סטיית תקן</b>."},
{id:191,topic:2,difficulty:"בינונית",
text:"חוקרת מעבירה שאלון עמדות כלפי טכנולוגיה. בהעברה הראשונה, המשתתפים עונים ברצינות. בהעברה השנייה (שבועיים אחר כך), חלקם עונים בחיפזון כי הם מזהים את השאלות. מה יקרה למהימנות מבחן-מבחן חוזר?",
options:["תעלה כי המשתתפים מכירים את השאלות","תרד כי אפקט התרגול מכניס שגיאה שיטתית","לא תשתנה","תהפוך לשלילית"],
correct:1,
explanation:"<b>אפקט תרגול ושינוי מוטיבציה</b> בהעברה השנייה מכניסים <b>שגיאה</b> למדידה. כשמשתתפים עונים בחיפזון, תשובותיהם <b>פחות מדויקות</b> ופחות עקביות עם ההעברה הראשונה. זהו <b>חיסרון מרכזי</b> של שיטת מבחן-מבחן חוזר – <b>ההעברה הראשונה עלולה להשפיע על השנייה</b>."},
{id:192,topic:2,difficulty:"קלה",
text:"מבחן מהימן אך לא תקף – האם מצב כזה אפשרי?",
options:["לא, מהימנות ותוקף תמיד הולכים יחד","כן, מבחן יכול למדוד באופן עקבי משהו שהוא לא אמור למדוד","לא, מהימנות מבטיחה תוקף","כן, אבל רק במבחני אישיות"],
correct:1,
explanation:"<b>כן, בהחלט אפשרי</b>. דוגמה: משקל מודד <b>באופן עקבי ומהימן</b> את משקל הגוף, אבל אם משתמשים בו כדי למדוד <b>אינטליגנציה</b> – הוא לא תקף. <b>מהימנות היא תנאי הכרחי אך לא מספיק לתוקף</b>. כלי יכול להיות עקבי (מהימן) אך למדוד את <b>הדבר הלא נכון</b>."},
{id:193,topic:2,difficulty:"קשה",
text:"חוקר מפתח שאלון חדש למדידת ביישנות. הוא כולל פריטים כמו 'אני מרגיש/ה לא בנוח במסיבות' ו'אני מעדיף/ה להיות לבד'. הוא מקבל אלפא של קרונבך 0.72 עם 8 פריטים. לפי נוסחת ספירמן-בראון, אם הוא יכפיל את מספר הפריטים ל-16, מה תהיה המהימנות המשוערת?",
options:["0.72","0.84","0.90","0.80"],
correct:1,
explanation:"<b>נוסחת ספירמן-בראון להארכת מבחן</b>: rxx' = (k × rxx) / (1 + (k-1) × rxx), כאשר k הוא מקדם ההכפלה. k=2 (מ-8 ל-16 פריטים): rxx' = (2 × 0.72) / (1 + (2-1) × 0.72) = 1.44 / 1.72 = <b>0.837 ≈ 0.84</b>. הכפלת מספר הפריטים <b>מעלה את המהימנות</b>, אך התועלת השולית <b>פוחתת</b> ככל שמוסיפים עוד פריטים."},
{id:194,topic:2,difficulty:"בינונית",
text:"מבחן מסוים מראה מהימנות בין-שופטים נמוכה (0.45). החוקרת רוצה לשפר אותה. מה הצעד הכי אפקטיבי?",
options:["להחליף את המבחן","לפתח מחוון מפורט ולהכשיר את השופטים","להוסיף שופטים נוספים ללא הכשרה","להעביר את המבחן יותר פעמים"],
correct:1,
explanation:"<b>פיתוח מחוון (rubric) מפורט והכשרת שופטים</b> הוא הצעד האפקטיבי ביותר. מהימנות בין-שופטים נמוכה נובעת לרוב מ<b>קריטריונים לא ברורים</b> או מ<b>חוסר הכשרה</b>. מחוון מפורט מגדיר <b>בדיוק מה לחפש</b> ואיך לדרג, והכשרה מבטיחה <b>הבנה אחידה</b> של הקריטריונים. הוספת שופטים לא מאומנים <b>לא תפתור</b> את הבעיה."},

{id:195,topic:3,difficulty:"קלה",
text:"חוקרת פיתחה שאלון חדש למדידת חרדה חברתית. היא מצאה שהציונים בשאלון שלה מתואמים בצורה גבוהה (r=0.82) עם ציונים במבחן חרדה חברתית מוכר ומבוסס. מהו סוג התוקף שהודגם כאן?",
options:["תוקף תוכן","תוקף מתכנס","תוקף מבחין","תוקף ניבויי"],
correct:1,
explanation:"<b>תוקף מתכנס (convergent validity)</b> מתקבל כאשר מדד חדש מראה מתאם גבוה עם מדד אחר שאמור למדוד את אותו מושג. כאן שני השאלונים מודדים חרדה חברתית, והמתאם הגבוה מעיד שהשאלון החדש אכן מודד את מה שהוא אמור למדוד."},
{id:196,topic:3,difficulty:"בינונית",
text:"חוקר בדק שאלון למדידת אינטליגנציה רגשית ומצא שהציונים בו אינם מתואמים עם ציוני מבחן IQ סטנדרטי (r=0.08). החוקר טוען שזו עדות לתוקף השאלון. איזה סוג תוקף הוא מתכוון אליו?",
options:["תוקף ניבויי","תוקף תוכן","תוקף מבחין","תוקף פנים"],
correct:2,
explanation:"<b>תוקף מבחין (discriminant validity)</b> מתקבל כאשר מדד מסוים אינו מתואם עם מדדים של מושגים שונים ממנו. אינטליגנציה רגשית ואינטליגנציה קוגניטיבית (IQ) הם מושגים שונים, ולכן מתאם נמוך ביניהם מהווה עדות לתוקף מבחין."},
{id:197,topic:3,difficulty:"קלה",
text:"פסיכולוגית מבקשת מחמישה מומחים בתחום הפרעות אכילה לעבור על פריטי שאלון חדש ולהעריך אם הם מכסים את כל ההיבטים המרכזיים של הפרעת אכילה. איזה סוג תוקף היא בודקת?",
options:["תוקף תוכן","תוקף מתכנס","תוקף מנבא","תוקף אקולוגי"],
correct:0,
explanation:"<b>תוקף תוכן (content validity)</b> נבדק כאשר מומחים בתחום מעריכים את מידת הכיסוי של הפריטים את כלל ההיבטים של המושג הנמדד. שימוש בשופטים מומחים הוא השיטה הקלאסית להערכת תוקף תוכן."},
{id:198,topic:3,difficulty:"קלה",
text:"סטודנטים שמילאו שאלון חדש למדידת מוטיבציה אקדמית דיווחו שהשאלות 'נראות להם הגיוניות' ו'קשורות למוטיבציה ללמוד'. איזה סוג תוקף מתואר כאן?",
options:["תוקף מבחין","תוקף תוכן","תוקף פנים","תוקף קריטריון"],
correct:2,
explanation:"<b>תוקף פנים (face validity)</b> מתייחס לכך שהמבחן נראה למילוי הנבדקים כמודד את מה שהוא אמור למדוד. זהו הערכה סובייקטיבית של הנבדקים עצמם, ולא הערכה מדעית מעמיקה. תוקף פנים חשוב לשיתוף פעולה של הנבדקים, אך אינו מספיק כעדות לתוקף מדעי."},
{id:199,topic:3,difficulty:"בינונית",
text:"חוקר מפתח מבחן מיון לעובדים חדשים. הוא מגלה שציוני המבחן שניתן בזמן הקבלה לעבודה מנבאים היטב את הערכות הביצוע של העובדים שנה לאחר מכן (r=0.55). איזה סוג תוקף הודגם?",
options:["תוקף מתכנס","תוקף תוכן","תוקף פנים","תוקף ניבויי"],
correct:3,
explanation:"<b>תוקף ניבויי (predictive validity)</b> נבדק כאשר מדד שנלקח בזמן מסוים מצליח לנבא התנהגות או ביצועים בעתיד. כאן, ציוני מבחן המיון (הנלקחים בהווה) מנבאים את ביצועי העובדים (בעתיד), מה שמהווה עדות לתוקף ניבויי."},
{id:200,topic:3,difficulty:"בינונית",
text:"פסיכולוגית בודקת שאלון דיכאון חדש על ידי מתן השאלון לקבוצת מטופלים שכבר אובחנו עם דיכאון ולקבוצת ביקורת בריאה, באותו זמן. היא מוצאת שהשאלון מבחין היטב בין שתי הקבוצות. מהו סוג התוקף?",
options:["תוקף בו-זמני","תוקף ניבויי","תוקף מבחין","תוקף אקולוגי"],
correct:0,
explanation:"<b>תוקף בו-זמני (concurrent validity)</b> נבדק כאשר מדד חדש מושווה לקריטריון חיצוני שנמדד באותו זמן. כאן, השאלון החדש ניתן במקביל לאבחנה קלינית קיימת, ויכולתו להבחין בין מאובחנים לבריאים מהווה עדות לתוקף בו-זמני."},
{id:201,topic:3,difficulty:"קשה",
text:"חוקר ביצע ניתוח גורמים על שאלון אישיות בן 40 פריטים ומצא שהפריטים מתקבצים לחמישה גורמים ברורים, בהתאם למודל חמשת הגורמים הגדולים (Big Five). איזה סוג תוקף הודגם?",
options:["תוקף תוכן","תוקף אקולוגי","תוקף פקטוריאלי","תוקף פנים"],
correct:2,
explanation:"<b>תוקף פקטוריאלי (factorial validity)</b> מתקבל כאשר ניתוח גורמים מאשר שמבנה הגורמים של השאלון תואם את המבנה התיאורטי הצפוי. כאן, חמשת הגורמים שנמצאו תואמים את מודל Big Five, מה שמהווה עדות חזקה לתוקף פקטוריאלי."},
{id:202,topic:3,difficulty:"בינונית",
text:"חוקרת בדקה שאלון לחוסן נפשי. היא מצאה מתאם גבוה עם שאלון אופטימיות (r=0.75), מתאם בינוני עם שאלון ביטחון עצמי (r=0.50), ומתאם נמוך עם שאלון אגרסיביות (r=0.10). תוצאות אלו מדגימות בעיקר:",
options:["תוקף תוכן בלבד","תוקף פנים בלבד","שילוב של תוקף מתכנס ותוקף מבחין","תוקף ניבויי בלבד"],
correct:2,
explanation:"התוצאות מדגימות <b>תוקף מתכנס</b> (מתאמים גבוהים עם מושגים קשורים כמו אופטימיות וביטחון עצמי) וגם <b>תוקף מבחין</b> (מתאם נמוך עם מושג שונה כמו אגרסיביות). שילוב זה מספק תמונה מקיפה של תוקף המבנה של השאלון."},
{id:203,topic:3,difficulty:"קשה",
text:"חוקר משתמש במטריצת ריבוי תכונות-ריבוי שיטות (MTMM) כדי לבדוק שאלון חדש. הוא מודד שלוש תכונות (חרדה, דיכאון, כעס) בשתי שיטות (שאלון עצמי ודירוג מטפל). מה צריך להתקיים כדי שהתוצאות יתמכו בתוקף המבנה?",
options:["מתאמים גבוהים בין כל המדדים ללא יוצא מן הכלל","מתאמי מונו-תכונה-הטרו-שיטה גבוהים ומתאמי הטרו-תכונה-מונו-שיטה נמוכים","מתאמים נמוכים בין כל המדדים","מתאמי הטרו-תכונה-מונו-שיטה גבוהים ומתאמי מונו-תכונה-הטרו-שיטה נמוכים"],
correct:1,
explanation:"במטריצת <b>MTMM</b>, תוקף מבנה מתבטא בכך ש: (1) <b>מתאמי מונו-תכונה-הטרו-שיטה</b> (אותה תכונה בשיטות שונות) יהיו גבוהים - זהו תוקף מתכנס; (2) <b>מתאמי הטרו-תכונה-מונו-שיטה</b> (תכונות שונות באותה שיטה) יהיו נמוכים - זהו תוקף מבחין. דפוס זה מעיד שהשונות נובעת מהתכונה הנמדדת ולא משיטת המדידה."},
{id:204,topic:3,difficulty:"קלה",
text:"חוקרת רוצה לבדוק אם שאלון למדידת שביעות רצון בעבודה שפותח בארה\"ב מתאים לשימוש בישראל. היא מתרגמת את השאלון ומבקשת ממומחים ישראליים להעריך את התאמת הפריטים לתרבות הישראלית. איזה סוג תוקף היא בודקת בעיקר?",
options:["תוקף ניבויי","תוקף תוכן","תוקף פקטוריאלי","תוקף בו-זמני"],
correct:1,
explanation:"<b>תוקף תוכן (content validity)</b> כולל גם את הבדיקה שהפריטים מייצגים באופן הולם את המושג בהקשר תרבותי מסוים. כאשר מומחים מעריכים את התאמת הפריטים, הם למעשה בודקים אם התוכן רלוונטי ומכסה את כל ההיבטים החשובים של שביעות רצון בעבודה בהקשר הישראלי."},
{id:205,topic:3,difficulty:"בינונית",
text:"חוקר מפתח משחק מחשב למדידת תפקודים ניהוליים (executive functions) בילדים. המשחק כולל משימות דומות לפעילויות יומיומיות כמו תכנון ארוחה וסידור חדר. הוא טוען שהכלי מודד יכולות כפי שהן מתבטאות בחיי היומיום. איזה סוג תוקף מודגש כאן?",
options:["תוקף פנים","תוקף אקולוגי","תוקף מתכנס","תוקף קריטריון"],
correct:1,
explanation:"<b>תוקף אקולוגי (ecological validity)</b> מתייחס למידה שבה המדד משקף התנהגויות ותפקוד בסביבה הטבעית של הנבדק. משחק המחשב מדמה פעילויות יומיומיות אמיתיות, ולכן הטענה היא שהביצועים במשחק מייצגים את התפקוד האמיתי בחיי היומיום."},
{id:206,topic:3,difficulty:"קשה",
text:"חוקרת ביצעה ניתוח גורמים מאשש (CFA) על שאלון בן 30 פריטים ומצאה שמודל של שלושה גורמים מתאים היטב לנתונים (CFI=0.96, RMSEA=0.04), בעוד מודל של גורם אחד אינו מתאים (CFI=0.72, RMSEA=0.12). מה ניתן להסיק?",
options:["השאלון חסר תוקף לחלוטין","יש עדות לתוקף פקטוריאלי של מודל שלושת הגורמים","יש עדות לתוקף ניבויי בלבד","השאלון מודד מושג אחד בלבד"],
correct:1,
explanation:"<b>ניתוח גורמים מאשש (CFA)</b> הוא כלי מרכזי לבדיקת <b>תוקף פקטוריאלי</b>. מדדי ההתאמה הטובים (CFI גבוה מ-0.95 ו-RMSEA נמוך מ-0.06) עבור מודל שלושת הגורמים מעידים שמבנה השאלון תואם את המודל התיאורטי. דחיית מודל הגורם האחד מחזקת את המסקנה שמדובר בשלושה מבנים נפרדים."},
{id:207,topic:3,difficulty:"בינונית",
text:"פסיכולוג מפתח מבחן כישורים לקבלה לתוכנית לימודים. הוא משווה את ציוני המבחן עם ממוצע הציונים בשנה הראשונה ללימודים ומוצא מתאם של r=0.60. איזה סוג תוקף קריטריון מודגם כאן?",
options:["תוקף בו-זמני, כי שני המדדים נלקחו באותו זמן","תוקף ניבויי, כי המבחן ניתן לפני הקריטריון","תוקף תוכן, כי המבחן מכסה את חומר הלימוד","תוקף מבנה, כי המבחן מודד כישורים"],
correct:1,
explanation:"<b>תוקף ניבויי (predictive validity)</b> הוא סוג של תוקף קריטריון שבו המדד (מבחן הכישורים) ניתן לפני הקריטריון (ממוצע ציונים בשנה א'). הפער בזמן בין המדד לקריטריון הוא המאפיין המבחין בין תוקף ניבויי לתוקף בו-זמני."},
{id:208,topic:3,difficulty:"קלה",
text:"חוקרת בנתה שאלון למדידת הנאה מספורט. היא שלחה את הפריטים לעשרה מאמנים ומורים לחינוך גופני וביקשה מהם לדרג כל פריט: 'רלוונטי מאוד', 'רלוונטי במידה מסוימת', או 'לא רלוונטי'. מה היא בודקת?",
options:["תוקף מנבא","מהימנות בין שופטים","תוקף תוכן","תוקף מבחין"],
correct:2,
explanation:"<b>תוקף תוכן (content validity)</b> נבדק באמצעות הערכת מומחים לגבי הרלוונטיות של כל פריט למושג הנמדד. כאשר מומחים מדרגים את מידת הרלוונטיות של הפריטים, הם מספקים הערכה שיטתית של תוקף התוכן. זוהי השיטה הקלאסית לבדיקת תוקף תוכן."},
{id:209,topic:3,difficulty:"בינונית",
text:"חוקר פיתח סולם למדידת פרפקציוניזם ומצא שהוא מתואם גבוה עם סולם נוירוטיות (r=0.78). החוקר מודאג מתוצאה זו. מדוע?",
options:["כי המתאם הגבוה מעיד על בעיה בתוקף הניבויי","כי המתאם הגבוה מעיד על בעיה בתוקף המבחין","כי המתאם הגבוה מעיד על בעיה בתוקף התוכן","כי המתאם הגבוה מעיד על בעיה במהימנות"],
correct:1,
explanation:"מתאם גבוה מאוד בין פרפקציוניזם לנוירוטיות מעלה חשש ל<b>בעיה בתוקף מבחין (discriminant validity)</b>. אם שני מושגים שאמורים להיות שונים זה מזה מראים מתאם כה גבוה, ייתכן שהסולם החדש אינו מודד מושג ייחודי אלא חופף למושג קיים. תוקף מבחין דורש מתאמים נמוכים עם מושגים שונים."},
{id:210,topic:3,difficulty:"קשה",
text:"במטריצת MTMM, חוקרת מצאה שמתאמי הטרו-תכונה-מונו-שיטה (שאלון עצמי של חרדה עם שאלון עצמי של דיכאון) גבוהים יותר ממתאמי מונו-תכונה-הטרו-שיטה (שאלון עצמי של חרדה עם דירוג מטפל של חרדה). מה מסקנתה?",
options:["יש עדות חזקה לתוקף מבנה","קיימת הטיית שיטה (method bias) שפוגעת בתוקף","השאלון מפגין תוקף תוכן גבוה","המדד מתאים לשימוש קליני"],
correct:1,
explanation:"כאשר <b>מתאמי הטרו-תכונה-מונו-שיטה</b> גבוהים ממתאמי מונו-תכונה-הטרו-שיטה, זו עדות ל<b>הטיית שיטה (method bias)</b>. המשמעות היא שהשונות המשותפת נובעת יותר משיטת המדידה (למשל, שאלון עצמי) מאשר מהתכונה הנמדדת עצמה. זו בעיה חמורה הפוגעת בתוקף המבנה."},
{id:211,topic:3,difficulty:"קלה",
text:"חוקר מבקש ממטופלים בפסיכותרפיה למלא שאלון הערכה עצמית. מטופלים רבים מעירים: 'השאלות נראות לי ממש קשורות לביטחון עצמי ולתחושות שלי כלפי עצמי'. על איזה סוג תוקף מעידות ההערות האלה?",
options:["תוקף מבנה","תוקף פנים","תוקף קריטריון","תוקף אקולוגי"],
correct:1,
explanation:"<b>תוקף פנים (face validity)</b> מתייחס להתרשמות הסובייקטיבית של הנבדקים שהמבחן אכן מודד את מה שהוא אמור למדוד. הערות המטופלים מעידות שהשאלון נראה להם רלוונטי ומתאים, אך זוהי הערכה שטחית שאינה מחליפה בדיקות תוקף מעמיקות יותר."},
{id:212,topic:3,difficulty:"בינונית",
text:"חוקרת בודקת שאלון למדידת יצירתיות על ידי מתן השאלון ומבחן חשיבה יצירתית של טורנס באותו מפגש. היא מוצאת מתאם של r=0.65 בין שני המדדים. מהו סוג התוקף?",
options:["תוקף ניבויי","תוקף פקטוריאלי","תוקף בו-זמני","תוקף אקולוגי"],
correct:2,
explanation:"<b>תוקף בו-זמני (concurrent validity)</b> נבדק כאשר מדד חדש מושווה עם מדד מבוסס (קריטריון) שנלקח באותו זמן. כאן, שני המדדים ניתנו באותו מפגש, ולכן המתאם מעיד על תוקף בו-זמני ולא ניבויי."},
{id:213,topic:3,difficulty:"בינונית",
text:"חוקר פיתח סימולציה ממוחשבת למדידת כישורי קבלת החלטות של מנהלים. הסימולציה מציגה תרחישים הדומים לדילמות ניהוליות אמיתיות, כולל לחץ זמן ומידע חלקי. מה היתרון העיקרי של כלי זה?",
options:["מהימנות גבוהה במיוחד","תוקף אקולוגי גבוה","תוקף פנים נמוך","תוקף מבחין גבוה"],
correct:1,
explanation:"<b>תוקף אקולוגי (ecological validity)</b> גבוה מושג כאשר תנאי המדידה מדמים את הסביבה הטבעית שבה מתרחשת ההתנהגות הנמדדת. סימולציה הכוללת מאפיינים של המציאות הניהולית (דילמות, לחץ זמן, מידע חלקי) מספקת תוקף אקולוגי גבוה יותר ממבחן תיאורטי."},
{id:214,topic:3,difficulty:"קשה",
text:"חוקרת ביצעה CFA על שאלון חרדה חברתית ומצאה שמודל של שני גורמים (פחד מהערכה שלילית וחרדת ביצוע) מתאים טוב יותר מאשר מודל של גורם אחד. עם זאת, המתאם בין שני הגורמים היה r=0.92. מה הבעיה?",
options:["אין בעיה, מתאם גבוה בין גורמים הוא תמיד רצוי","המתאם הגבוה מעלה ספק אם מדובר באמת בשני מבנים נפרדים, ופוגע בתוקף המבחין","המתאם הגבוה מעיד על תוקף ניבויי מצוין","המתאם הגבוה מוכיח שיש תוקף תוכן גבוה"],
correct:1,
explanation:"כאשר מתאם בין גורמים גבוה מאוד (<b>r=0.92</b>) בניתוח CFA, עולה שאלה האם מדובר באמת בשני מבנים נפרדים או שאולי מדובר בגורם אחד. מתאם כה גבוה פוגע ב<b>תוקף המבחין</b> ברמת המבנה הפנימי, ומצביע על כך שהפרדה לשני גורמים עשויה להיות מלאכותית."},
{id:215,topic:3,difficulty:"קלה",
text:"מורה רוצה להשתמש במבחן כישורים חברתיים שפותח במעבדה. המבחן כולל תגובה לתמונות סטטיות של פרצופים. עמיתה שלו טוענת שאי אפשר להסיק מהמבחן על התנהגות חברתית אמיתית. מה סוג התוקף שלדעתה חסר?",
options:["תוקף תוכן","תוקף פנים","תוקף אקולוגי","תוקף פקטוריאלי"],
correct:2,
explanation:"העמיתה מעלה טענה לגבי <b>תוקף אקולוגי (ecological validity)</b> - כלומר, שהמבחן במעבדה אינו משקף בצורה נאמנה את האינטראקציות החברתיות בחיים האמיתיים. תמונות סטטיות אינן מייצגות את המורכבות והדינמיות של מצבים חברתיים אמיתיים."},
{id:216,topic:3,difficulty:"בינונית",
text:"חוקר פיתח שאלון חדש למדידת שחיקה מקצועית (burnout). הוא מצא מתאם r=0.80 עם שאלון MBI (Maslach Burnout Inventory) ומתאם r=0.15 עם שאלון למדידת מוחצנות. מהי המסקנה העיקרית?",
options:["השאלון חסר מהימנות","השאלון מפגין תוקף מבנה טוב - הן מתכנס והן מבחין","השאלון מפגין תוקף ניבויי בלבד","השאלון מפגין תוקף תוכן בלבד"],
correct:1,
explanation:"השאלון מפגין <b>תוקף מבנה (construct validity)</b> טוב: <b>תוקף מתכנס</b> - מתאם גבוה (r=0.80) עם מדד מבוסס של אותו מושג (שחיקה), ו<b>תוקף מבחין</b> - מתאם נמוך (r=0.15) עם מושג שאינו קשור (מוחצנות). שילוב זה מספק עדות חזקה לתוקף המבנה."},
{id:217,topic:3,difficulty:"קשה",
text:"חוקרת מצאה שציוני מבחן כישורי מנהיגות שהיא פיתחה מנבאים הצלחה ניהולית (r=0.45), אך גם מתואמים גבוה עם מדד אינטליגנציה כללית (r=0.70). מה הבעיה המתודולוגית המרכזית?",
options:["המבחן חסר תוקף פנים","המבחן חסר תוקף תוכן","קיימת בעיה בתוקף המבחין - ייתכן שהמבחן מודד אינטליגנציה ולא מנהיגות באופן ייחודי","המבחן חסר תוקף אקולוגי"],
correct:2,
explanation:"הבעיה היא ב<b>תוקף מבחין</b>: מתאם גבוה (r=0.70) עם אינטליגנציה כללית מעלה חשש שהמבחן אינו מודד <b>מנהיגות באופן ייחודי</b> אלא בעיקר אינטליגנציה. התוקף הניבויי (r=0.45) עשוי לנבוע מרכיב האינטליגנציה ולא מכישורי מנהיגות ייחודיים. יש צורך לבדוק האם המבחן מוסיף תוקף ניבויי מעבר למדד האינטליגנציה."},
{id:218,topic:3,difficulty:"קלה",
text:"פסיכולוגית בודקת מבחן אבחוני חדש להפרעת קשב וריכוז (ADHD) בילדים. היא משווה את תוצאות המבחן עם אבחנה של פסיכיאטר ילדים שניתנה באותו שבוע. זהו תוקף:",
options:["ניבויי","בו-זמני","תוכן","פקטוריאלי"],
correct:1,
explanation:"<b>תוקף בו-זמני (concurrent validity)</b> נבדק כאשר מדד חדש מושווה עם קריטריון חיצוני (אבחנה פסיכיאטרית) שנלקח באותה תקופת זמן. ההשוואה של המבחן החדש עם האבחנה הפסיכיאטרית שניתנה באותו שבוע היא דוגמה קלאסית לתוקף בו-זמני."},
{id:219,topic:3,difficulty:"בינונית",
text:"חוקר רוצה לבדוק תוקף קריטריון של מבחן מיון לצבא. הוא משווה ציוני מבחן עם ביצועי חיילים בסוף הקורס. מהי הבעיה הפוטנציאלית בהגבלת הטווח (range restriction)?",
options:["המבחן ארוך מדי","רק מי שעבר את מבחן המיון משרת בצבא, ולכן הטווח מצומצם, מה שמקטין את המתאם באופן מלאכותי","יש יותר מדי פריטים במבחן","המבחן ניתן בתנאי לחץ"],
correct:1,
explanation:"<b>הגבלת טווח (range restriction)</b> היא בעיה קלאסית בבדיקת <b>תוקף קריטריון</b> של מבחני מיון. מכיוון שרק מי שעבר את המבחן ממשיך לשרת, אין נתונים על ביצועי מי שלא עבר. טווח הציונים המצומצם מקטין את המתאם באופן מלאכותי ועלול להוביל להערכת חסר של תוקף המבחן."},
{id:220,topic:3,difficulty:"קשה",
text:"חוקרת רוצה לבדוק אם שאלון למדידת דפוסי התקשרות מודד מושג שונה מנוירוטיות. היא מעצבת מחקר עם שתי תכונות (התקשרות ונוירוטיות) ושלוש שיטות מדידה (שאלון עצמי, ראיון, ודירוג בן-זוג). איזה ניתוח יהיה המתאים ביותר?",
options:["ניתוח שונות חד-כיווני","מטריצת MTMM","רגרסיה לינארית פשוטה","מבחן t לזוגות"],
correct:1,
explanation:"<b>מטריצת ריבוי תכונות-ריבוי שיטות (MTMM)</b> היא הכלי המתאים ביותר כאשר רוצים לבחון תוקף מתכנס ומבחין תוך הפרדה בין שונות תכונה לשונות שיטה. המטריצה תאפשר לבדוק אם אותה תכונה מתואמת בשיטות שונות (מתכנס) ואם תכונות שונות מובחנות זו מזו (מבחין)."},
{id:221,topic:3,difficulty:"בינונית",
text:"חוקר פיתח שאלון למדידת גמישות קוגניטיבית בקשישים. ניתוח גורמים חשפני מצא שלושה גורמים, אך התיאוריה שהחוקר מבסס עליה מניחה שני גורמים בלבד. מה צריך החוקר לעשות?",
options:["להתעלם מהתוצאות ולדווח על שני גורמים","לבצע CFA כדי לבדוק איזה מודל מתאים טוב יותר","לוותר על השאלון לחלוטין","להוסיף פריטים נוספים עד שיופיעו שני גורמים בלבד"],
correct:1,
explanation:"כאשר <b>ניתוח גורמים חשפני (EFA)</b> מצביע על מבנה שונה מהמצופה תיאורטית, הצעד הנכון הוא לבצע <b>ניתוח גורמים מאשש (CFA)</b> כדי להשוות באופן פורמלי בין מודל שני הגורמים למודל שלושת הגורמים. כך ניתן לקבל מדדי התאמה אובייקטיביים ולהכריע איזה מודל מייצג טוב יותר את <b>התוקף הפקטוריאלי</b> של השאלון."},
{id:222,topic:4,difficulty:"קלה",
text:"חוקרת מצאה שתוכנית התערבות שיפרה ציוני מתמטיקה בקרב תלמידים. אך התברר שבאותה תקופה הוחלף גם ספר הלימוד. מהו האיום העיקרי על תוצאות המחקר?",
options:["איום על תוקף חיצוני","איום על תוקף פנימי - משתנה מבלבל","איום על תוקף סטטיסטי","איום על תוקף אקולוגי"],
correct:1,
explanation:"<b>תוקף פנימי (internal validity)</b> מתייחס ליכולת להסיק שהמשתנה הבלתי תלוי (התוכנית) הוא שגרם לשינוי במשתנה התלוי (ציוני מתמטיקה). החלפת ספר הלימוד היא <b>משתנה מבלבל (confound)</b> - הסבר חלופי לשיפור בציונים, הפוגע בתוקף הפנימי."},
{id:223,topic:4,difficulty:"קלה",
text:"מחקר שנערך על סטודנטים מאוניברסיטה יוקרתית מצא שטכניקת למידה חדשה משפרת זיכרון. חוקר אחר שואל: 'האם התוצאות יהיו דומות גם עבור סטודנטים מכללות אחרות?' על איזה סוג תוקף הוא מעלה ספק?",
options:["תוקף פנימי","תוקף מבנה","תוקף חיצוני","תוקף סטטיסטי"],
correct:2,
explanation:"<b>תוקף חיצוני (external validity)</b> מתייחס ליכולת להכליל את תוצאות המחקר לאוכלוסיות, מקומות וזמנים אחרים. השאלה האם ממצאים מסטודנטים באוניברסיטה יוקרתית תקפים גם לסטודנטים אחרים היא שאלה קלאסית של תוקף חיצוני."},
{id:224,topic:4,difficulty:"בינונית",
text:"חוקר ביצע ניסוי עם מדגם קטן (n=12) ולא מצא הבדל מובהק בין קבוצת הניסוי לקבוצת הביקורת (p=0.18). עם זאת, גודל האפקט היה d=0.60. מה הבעיה הסבירה?",
options:["גודל האפקט קטן מדי","המדגם הקטן הוביל לעוצמה סטטיסטית נמוכה, מה שמגדיל את הסיכוי לטעות מסוג II","יש טעות מסוג I","אין שום בעיה בתוצאות"],
correct:1,
explanation:"<b>עוצמה סטטיסטית (statistical power)</b> היא ההסתברות לגלות אפקט כשהוא קיים. עם n=12, העוצמה נמוכה מאוד. גודל אפקט של <b>d=0.60</b> נחשב בינוני-גדול, אך המדגם הקטן לא מאפשר לזהות אותו כמובהק סטטיסטית. זוהי <b>טעות מסוג II (Type II error)</b> - אי-זיהוי אפקט שקיים במציאות."},
{id:225,topic:4,difficulty:"בינונית",
text:"חוקרת ביצעה 20 מבחנים סטטיסטיים באותו מחקר ברמת מובהקות α=0.05. מצאה שני ממצאים מובהקים. מדוע עליה להיות זהירה בפירוש התוצאות?",
options:["כי שני ממצאים זה מעט מדי","כי ביצוע מבחנים רבים מוביל לאינפלציית אלפא - ההסתברות לקבל לפחות תוצאה מובהקית אחת במקרה עולה","כי מבחנים סטטיסטיים אינם אמינים","כי היא צריכה להשתמש רק במבחן אחד"],
correct:1,
explanation:"<b>אינפלציית אלפא (alpha inflation)</b> מתרחשת כשמבצעים מבחנים מרובים. עם 20 מבחנים ב-α=0.05, ההסתברות לקבל לפחות תוצאה מובהקית אחת במקרה היא כ-64% (1-0.95²⁰). שני ממצאים מובהקים מתוך 20 קרובים למספר הצפוי במקרה. יש להשתמש ב<b>תיקון בונפרוני</b> או בשיטות אחרות לתיקון השוואות מרובות."},
{id:226,topic:4,difficulty:"קשה",
text:"במחקר על השפעת מדיטציה על לחץ, החוקרים הגדירו את המשתנה הבלתי תלוי כ'מדיטציה'. אך קבוצת הניסוי גם נפגשה עם מנחה קבוצתי חמים ואמפתי, בעוד קבוצת הביקורת לא קיבלה שום התייחסות. מהו האיום על תוצאות המחקר?",
options:["איום על תוקף חיצוני","איום על תוקף מבנה של הסיבה - לא ברור אם המדיטציה או הקשר עם המנחה גרמו לשיפור","איום על תוקף סטטיסטי","איום על תוקף פנים בלבד"],
correct:1,
explanation:"<b>תוקף מבנה של הסיבה (construct validity of cause)</b> מתייחס ליכולת לזהות באופן מדויק מהו המרכיב הפעיל בהתערבות. כאן, ההתערבות כוללת גם מדיטציה וגם קשר אישי עם מנחה. לא ניתן להפריד בין שני המרכיבים, ולכן לא ברור אם <b>המדיטציה עצמה</b> היא שגרמה לשיפור, או שמא האינטראקציה עם המנחה."},
{id:227,topic:4,difficulty:"קלה",
text:"חוקר דיווח על תוצאה מובהקת עם p=0.03. עמית טוען שערך ה-p אינו מספר מה ההסתברות שההשערה נכונה. מה הפירוש הנכון של p=0.03?",
options:["יש סיכוי של 3% שההשערה האלטרנטיבית נכונה","יש סיכוי של 3% שההשערה האפסית נכונה","ההסתברות לקבל את התוצאה הנצפית או קיצונית יותר, בהנחה שהשערת האפס נכונה, היא 3%","יש סיכוי של 97% שההשערה נכונה"],
correct:2,
explanation:"<b>ערך p</b> הוא ההסתברות לקבל את התוצאה הנצפית (או תוצאה קיצונית יותר) <b>בהנחה שהשערת האפס נכונה</b>. p=0.03 אינו אומר שיש סיכוי של 3% שהשערת האפס נכונה, ואינו אומר שיש סיכוי של 97% שההשערה האלטרנטיבית נכונה. זוהי טעות נפוצה בפירוש ערכי p."},
{id:228,topic:4,difficulty:"בינונית",
text:"חוקרת מצאה הבדל מובהק בין שתי קבוצות (p<0.001) עם מדגם ענק (n=10,000), אך גודל האפקט היה d=0.05. מה המשמעות המעשית?",
options:["התוצאות חשובות מאוד מבחינה מעשית כי הן מובהקות מאוד","למרות המובהקות הסטטיסטית, גודל האפקט זניח ולכן למשמעות המעשית קטנה","יש טעות מסוג I","יש לחזור על המחקר עם מדגם קטן יותר"],
correct:1,
explanation:"<b>מובהקות סטטיסטית אינה שקולה למשמעות מעשית</b>. עם מדגם גדול מאוד (n=10,000), גם אפקטים זעירים יכולים להיות מובהקים. <b>גודל אפקט d=0.05</b> הוא זניח ביותר (הרבה מתחת ל-d=0.20 שנחשב קטן). לכן, למרות ה-p הנמוך, ההבדל כמעט חסר משמעות מעשית."},
{id:229,topic:4,difficulty:"בינונית",
text:"מחקר על טיפול CBT נערך בקליניקה פרטית יוקרתית עם מטפלים מומחים ומטופלים בעלי מוטיבציה גבוהה. החוקרת מצאה תוצאות מצוינות. מה האיום העיקרי?",
options:["איום על תוקף פנימי","איום על תוקף סטטיסטי","איום על תוקף חיצוני - קשה להכליל לתנאים קליניים רגילים","איום על תוקף מבנה של הסיבה"],
correct:2,
explanation:"<b>תוקף חיצוני (external validity)</b> נפגע כאשר תנאי המחקר אינם מייצגים את התנאים הטיפוסיים. קליניקה יוקרתית, מטפלים מומחים ומטופלים בעלי מוטיבציה גבוהה הם תנאים אידיאליים שלא בהכרח קיימים בשירותי בריאות הנפש הרגילים. זהו ההבדל בין <b>efficacy</b> (יעילות בתנאי מעבדה) ל-<b>effectiveness</b> (יעילות בתנאים אמיתיים)."},
{id:230,topic:4,difficulty:"קשה",
text:"חוקר מדווח על רווח סמך (confidence interval) של 95% עבור הבדל ממוצעים: [0.5, 8.3]. מהו הפירוש הנכון?",
options:["יש סיכוי של 95% שהממוצע האמיתי נמצא בטווח זה","אם נחזור על המחקר פעמים רבות, 95% מרווחי הסמך שנקבל יכילו את הערך האמיתי של ההבדל","ההסתברות שההשערה האלטרנטיבית נכונה היא 95%","95% מהנבדקים הראו הבדל בטווח זה"],
correct:1,
explanation:"<b>רווח סמך (confidence interval)</b> של 95% פירושו שאם נחזור על תהליך הדגימה והחישוב פעמים רבות, <b>95% מרווחי הסמך שנבנה יכילו את הפרמטר האמיתי</b>. חשוב: זה לא אומר שיש סיכוי של 95% שהערך האמיתי נמצא בטווח הספציפי הזה. כמו כן, מכיוון שהרווח אינו כולל 0, ההבדל מובהק סטטיסטית."},
{id:231,topic:4,difficulty:"בינונית",
text:"בניסוי על השפעת שינה על זיכרון, החוקרת הקצתה את המשתתפים הראשונים שהגיעו לקבוצת הניסוי ואת האחרונים לקבוצת הביקורת. מה הבעיה?",
options:["מדגם קטן מדי","היעדר הקצאה אקראית פוגע בתוקף הפנימי - הקבוצות עלולות להיות שונות מלכתחילה","היעדר תוקף חיצוני","היעדר תוקף סטטיסטי"],
correct:1,
explanation:"<b>תוקף פנימי (internal validity)</b> דורש שההבדלים בין הקבוצות ינבעו רק מהמניפולציה הניסויית. ללא <b>הקצאה אקראית (random assignment)</b>, ייתכנו הבדלים שיטתיים בין הקבוצות (למשל, מי שמגיע מוקדם עשוי להיות יותר מאורגן). הבדלים אלה מהווים משתנים מבלבלים הפוגעים בתוקף הפנימי."},
{id:232,topic:4,difficulty:"קלה",
text:"חוקר ביצע מחקר ומצא תוצאה לא מובהקת (p=0.08). הוא מסיק שאין אפקט. מדוע מסקנה זו בעייתית?",
options:["כי p=0.08 קרוב מספיק למובהקות","כי היעדר מובהקות סטטיסטית אינו מוכיח היעדר אפקט - ייתכן שהעוצמה הסטטיסטית הייתה נמוכה מדי","כי ערך p תמיד מעיד על גודל אפקט","כי יש לבצע את המבחן שוב"],
correct:1,
explanation:"<b>היעדר ראיה אינו ראיה להיעדר</b> (absence of evidence is not evidence of absence). תוצאה לא מובהקת יכולה לנבוע מ<b>עוצמה סטטיסטית נמוכה</b> (מדגם קטן, שונות גבוהה) ולא בהכרח מהיעדר אפקט אמיתי. זוהי הסכנה של <b>טעות מסוג II</b>. יש לבדוק את גודל האפקט ואת רווח הסמך לפני שמסיקים שאין אפקט."},
{id:233,topic:4,difficulty:"קשה",
text:"חוקרת מתכננת מחקר ומחשבת שהיא צריכה עוצמה סטטיסטית של 0.80. היא מצפה לגודל אפקט קטן (d=0.20) ומשתמשת ברמת מובהקות α=0.05 דו-זנבי. מה יהיה גודל המדגם הנדרש בקירוב לכל קבוצה?",
options:["30 נבדקים","100 נבדקים","400 נבדקים","1000 נבדקים"],

{id:249,topic:5,difficulty:"קלה",
text:"חוקרת בדקה את השפעת תוכנית התערבות על חרדת מבחנים בקרב תלמידי כיתה י'. במהלך תקופת המחקר, משרד החינוך שינה את מבנה בחינות הבגרות. מהו האיום על התוקף הפנימי?",
options:["הבשלה","היסטוריה","נשירה","רגרסיה לממוצע"],
correct:1,
explanation:"<b>היסטוריה</b> מתייחסת לאירועים חיצוניים שמתרחשים במהלך המחקר ועלולים להשפיע על המשתנה התלוי. <b>שינוי מבנה הבחינות</b> הוא אירוע חיצוני שאינו קשור להתערבות אך עשוי להשפיע על רמת החרדה של התלמידים."},

{id:250,topic:5,difficulty:"בינונית",
text:"מחקר בדק את היעילות של טיפול קוגניטיבי-התנהגותי בדיכאון אצל מתבגרים. הנבדקים נבחנו בתחילת המחקר כשהיו בני 14, ושוב לאחר שנה. החוקר מצא שיפור משמעותי. מהו האיום העיקרי על התוקף הפנימי?",
options:["בדיקה חוזרת","הבשלה","דיפוזיה","אפקט הותורן"],
correct:1,
explanation:"<b>הבשלה (maturation)</b> מתייחסת לשינויים טבעיים שמתרחשים בנבדקים עם חלוף הזמן. <b>מתבגרים בני 14-15</b> עוברים שינויים התפתחותיים משמעותיים שעשויים להוביל לשיפור במצב הרוח ללא קשר לטיפול. קשה להפריד בין השפעת הטיפול להבשלה טבעית."},

{id:251,topic:5,difficulty:"קלה",
text:"חוקר מדד ידע בסטטיסטיקה לפני ואחרי קורס. הוא הבחין שציוני המבחן השני היו גבוהים יותר, אך ייתכן שהנבדקים פשוט למדו מהמבחן הראשון עצמו. מהו האיום?",
options:["מכשור","בדיקה חוזרת","היסטוריה","הבשלה"],
correct:1,
explanation:"<b>בדיקה חוזרת (testing)</b> מתרחשת כאשר עצם המדידה הראשונה משפיעה על הביצועים במדידה השנייה. <b>חשיפה למבחן</b> מאפשרת לנבדקים להכיר את סוג השאלות, מה שמשפר את הביצועים ללא קשר לקורס עצמו."},

{id:252,topic:5,difficulty:"בינונית",
text:"במחקר על שביעות רצון עובדים, שאלון חדש הוכנס באמצע המחקר כי השאלון המקורי נמצא לא מתאים. התוצאות הראו שינוי חד בשביעות הרצון. מהו האיום?",
options:["מכשור","סלקציה","נשירה","רגרסיה לממוצע"],
correct:0,
explanation:"<b>מכשור (instrumentation)</b> מתייחס לשינוי בכלי המדידה במהלך המחקר. <b>החלפת השאלון</b> באמצע המחקר משנה את אופן המדידה, וכך לא ניתן לדעת אם השינוי בתוצאות משקף שינוי אמיתי או נובע מההבדל בין כלי המדידה."},

{id:253,topic:5,difficulty:"קשה",
text:"מרפאה לטיפול בהתמכרויות קיבלה למחקר רק מטופלים עם ציוני דיכאון גבוהים במיוחד. בסיום הטיפול, ציוני הדיכאון ירדו משמעותית. מדוע צריך לפרש את התוצאות בזהירות?",
options:["אפקט הותורן","רגרסיה לממוצע","דמורליזציה","היסטוריה"],
correct:1,
explanation:"<b>רגרסיה לממוצע (regression to the mean)</b> פירושה שציונים קיצוניים נוטים לחזור לכיוון הממוצע במדידה חוזרת. כאשר <b>בוחרים נבדקים עם ציונים גבוהים במיוחד</b>, סביר שציוניהם ירדו גם ללא התערבות, פשוט כי ציון קיצוני כולל מרכיב מקרי שלא יחזור על עצמו."},

{id:254,topic:5,difficulty:"קלה",
text:"במחקר על תוכנית לימודים חדשה, בית ספר אחד הוקצה לתנאי הניסוי ובית ספר אחר לתנאי הביקורת. שני בתי הספר נבדלו ברמה הסוציו-אקונומית. מהו האיום?",
options:["דיפוזיה","סלקציה","נשירה","מכשור"],
correct:1,
explanation:"<b>סלקציה (selection)</b> מתרחשת כאשר הקבוצות אינן שוות מלכתחילה. <b>הבדלים ברמה הסוציו-אקונומית</b> בין בתי הספר עלולים להסביר הבדלים בתוצאות, מה שמקשה על ייחוס ההבדלים לתוכנית הלימודים החדשה."},

{id:255,topic:5,difficulty:"בינונית",
text:"במחקר אורך על השפעת פעילות גופנית על זיכרון, 40% מהמשתתפים בקבוצת הביקורת (שלא התאמנו) הפסיקו להגיע למפגשי המדידה. רוב הנושרים היו אנשים מבוגרים עם בעיות בריאות. מהו האיום?",
options:["הבשלה","דמורליזציה","נשירה","היסטוריה"],
correct:2,
explanation:"<b>נשירה (attrition/mortality)</b> מתרחשת כאשר משתתפים עוזבים את המחקר באופן לא אקראי. <b>נשירה סלקטיבית</b> של משתתפים מבוגרים וחולים מקבוצת הביקורת משנה את הרכב הקבוצה ויוצרת הטיה, כי הנותרים בריאים יותר ועשויים להראות ביצועי זיכרון טובים יותר."},

{id:256,topic:5,difficulty:"בינונית",
text:"במחקר על שיטת הוראה חדשה, תלמידי קבוצת הביקורת שמעו מתלמידי הניסוי על הטכניקות החדשות והחלו ליישם אותן בעצמם. כיצד נקרא איום זה?",
options:["יריבות מפצה","דיפוזיה של טיפול","דמורליזציה","אפקט הותורן"],
correct:1,
explanation:"<b>דיפוזיה של טיפול (diffusion)</b> מתרחשת כאשר ההתערבות 'מחלחלת' מקבוצת הניסוי לקבוצת הביקורת. <b>כאשר תלמידי הביקורת לומדים ומיישמים את הטכניקות</b>, ההבדל בין הקבוצות מצטמצם, ולא ניתן להעריך נכון את השפעת ההתערבות."},

{id:257,topic:5,difficulty:"קשה",
text:"במחקר על תוכנית חונכות, תלמידים בקבוצת הביקורת שלא קיבלו חונך החלו להתאמץ יותר מהרגיל כדי להוכיח שגם הם יכולים להצליח בלי עזרה. מהו האיום?",
options:["דיפוזיה","דמורליזציה","יריבות מפצה","אפקט הותורן"],
correct:2,
explanation:"<b>יריבות מפצה (compensatory rivalry)</b>, המכונה גם 'אפקט ג'ון הנרי', מתרחשת כאשר קבוצת הביקורת <b>מגבירה את מאמציה</b> כתגובה לידיעה שהיא לא מקבלת את ההתערבות. התנהגות זו מצמצמת את ההבדלים בין הקבוצות ומקשה על זיהוי השפעת ההתערבות."},

{id:258,topic:5,difficulty:"בינונית",
text:"במחקר על תוכנית מילגות, תלמידים בקבוצת הביקורת שלא זכו למילגה הפסיקו להשקיע במשימות הלימודיות וביצועיהם ירדו בחדות. מהו האיום?",
options:["נשירה","דמורליזציה","רגרסיה לממוצע","סלקציה"],
correct:1,
explanation:"<b>דמורליזציה (demoralization)</b> מתרחשת כאשר משתתפי קבוצת הביקורת <b>מאבדים מוטיבציה</b> בגלל שהם יודעים שלא קיבלו את ההתערבות הרצויה. ירידת הביצועים אינה משקפת את ההשפעה האמיתית של התוכנית, אלא את התגובה הרגשית של קבוצת הביקורת."},

{id:259,topic:5,difficulty:"קשה",
text:"בבית חולים נערך מחקר על טיפול חדש בכאב. מנהל בית החולים החליט לתת לקבוצת הביקורת טיפול אלטרנטיבי יקר כדי 'לפצות' אותם על כך שלא קיבלו את הטיפול החדש. מהו האיום?",
options:["השוואת פיצוי","יריבות מפצה","דיפוזיה","אפקט פלצבו"],
correct:0,
explanation:"<b>השוואת פיצוי (compensatory equalization)</b> מתרחשת כאשר <b>הגורם האחראי (לא הנבדקים עצמם) מספק הטבות נוספות</b> לקבוצת הביקורת כדי לפצות אותה. זה מטשטש את ההבדלים בין הקבוצות ומונע הערכה מדויקת של ההתערבות המקורית."},

{id:260,topic:5,difficulty:"בינונית",
text:"חוקר בדק את השפעת שיטת למידה חדשה בשתי כיתות באותו בית ספר. בכיתה הניסויית התחלף מורה באמצע השנה, מה שגרם לירידה בביצועים. מהו סוג האיום?",
options:["היסטוריה כללית","היסטוריה מקומית","מכשור","הבשלה"],
correct:1,
explanation:"<b>היסטוריה מקומית (local history)</b> מתייחסת לאירוע שמשפיע רק על אחת הקבוצות ולא על כולן. <b>החלפת המורה</b> השפיעה רק על כיתת הניסוי, ולכן זהו איום ייחודי לקבוצה ספציפית, בניגוד להיסטוריה כללית שמשפיעה על כל הקבוצות."},

{id:261,topic:5,difficulty:"קלה",
text:"במפעל נערך מחקר על תאורה ופריון עבודה. העובדים ידעו שנצפים ושיפרו את ביצועיהם ללא קשר לשינוי התאורה. כיצד נקרא אפקט זה?",
options:["הטיית הנסיין","אפקט הותורן","מאפייני ביקוש","רצייה חברתית"],
correct:1,
explanation:"<b>אפקט הותורן (Hawthorne effect)</b> מתרחש כאשר נבדקים <b>משנים את התנהגותם בגלל שהם מודעים לכך שהם נצפים</b> או משתתפים במחקר. האפקט נקרא על שם מחקרי הותורן הקלאסיים שנערכו במפעל של חברת ווסטרן אלקטריק."},

{id:262,topic:5,difficulty:"בינונית",
text:"חוקרת בדקה האם ויטמין מסוים משפר זיכרון. היא ידעה מי מקבל ויטמין ומי פלצבו, ובלי משים התייחסה בחמימות רבה יותר לקבוצת הניסוי. מהו האיום?",
options:["מאפייני ביקוש","רצייה חברתית","הטיית הנסיין","אפקט הותורן"],
correct:2,
explanation:"<b>הטיית הנסיין (experimenter bias)</b>, הידועה גם כ<b>אפקט רוזנטל</b>, מתרחשת כאשר ציפיות החוקר משפיעות שלא במודע על התנהגותו כלפי הנבדקים ועל אופן איסוף הנתונים. התייחסות חמה יותר לקבוצת הניסוי עלולה לשפר את ביצועיה שלא בגלל הוויטמין."},

{id:263,topic:5,difficulty:"בינונית",
text:"במחקר על תרופה חדשה לחרדה, הנבדקים ניחשו שהם בקבוצת הפלצבו כי הכדורים שקיבלו היו קטנים יותר. הם התנהגו בהתאם לציפיות שלהם. מהו האיום?",
options:["אפקט הותורן","רצייה חברתית","מאפייני ביקוש","הטיית הנסיין"],
correct:2,
explanation:"<b>מאפייני ביקוש (demand characteristics)</b> מתרחשים כאשר נבדקים <b>מזהים רמזים לגבי מטרת המחקר או תנאי השיוך</b> ומשנים את התנהגותם בהתאם. כאשר הנבדקים ניחשו את שיוכם לקבוצה, הציפיות שלהם עצמן עלולות להשפיע על התוצאות."},

{id:264,topic:5,difficulty:"קלה",
text:"בשאלון על הרגלי שתיית אלכוהול, משתתפים רבים דיווחו על צריכה נמוכה מהצריכה האמיתית שלהם כי לא רצו להיתפס כשתיינים. מהו האיום?",
options:["מאפייני ביקוש","הטיית הנסיין","רצייה חברתית","אפקט הותורן"],
correct:2,
explanation:"<b>רצייה חברתית (social desirability)</b> מתרחשת כאשר נבדקים <b>עונים בהתאם למה שנתפס כמקובל חברתית</b> במקום לדווח על התנהגותם האמיתית. נושאים רגישים כמו צריכת אלכוהול מועדים במיוחד להטיה זו."},

{id:265,topic:5,difficulty:"בינונית",
text:"במחקר על תרופה חדשה, לא הנבדקים ולא הרופאים שמעריכים את מצבם ידעו מי מקבל תרופה ומי פלצבו. כיצד נקרא מערך זה?",
options:["סמיות בודדת","מערך פלצבו","סמיות כפולה","מערך שלמה"],
correct:2,
explanation:"<b>סמיות כפולה (double-blind)</b> היא מערך שבו <b>גם הנבדקים וגם החוקרים/המעריכים אינם יודעים</b> לאיזה תנאי שובצו הנבדקים. מערך זה מגן בו-זמנית מפני הטיית הנסיין ומפני מאפייני ביקוש."},

{id:266,topic:5,difficulty:"קלה",
text:"במחקר על שיטת לימוד, התלמידים לא ידעו באיזו קבוצה הם, אך המורים שהעבירו את השיעורים ידעו. מהו סוג הסמיות?",
options:["סמיות כפולה","סמיות בודדת","אין סמיות","סמיות משולשת"],
correct:1,
explanation:"<b>סמיות בודדת (single-blind)</b> מתרחשת כאשר <b>הנבדקים אינם יודעים לאיזה תנאי שובצו, אך החוקרים כן יודעים</b>. מערך זה מגן מפני מאפייני ביקוש ואפקט פלצבו בצד הנבדקים, אך אינו מגן מפני הטיית הנסיין."},

{id:267,topic:5,difficulty:"קשה",
text:"חוקרת חקרה את השפעת תוכנית אימון קוגניטיבי על קשישים. היא בחרה משתתפים עם ציוני זיכרון נמוכים במיוחד, ולאחר התוכנית ציוניהם עלו. עמיתהּ טען שזו לא הוכחה להצלחת התוכנית. מדוע?",
options:["בגלל אפקט הותורן","בגלל רגרסיה לממוצע","בגלל דיפוזיה","בגלל מכשור"],
correct:1,
explanation:"<b>רגרסיה לממוצע</b> היא ההסבר הסביר ביותר. כאשר בוחרים נבדקים על סמך <b>ציונים קיצוניים (נמוכים במיוחד)</b>, סטייה מהממוצע כוללת מרכיב שגיאה אקראי. במדידה חוזרת, ציונים קיצוניים נוטים לחזור לכיוון הממוצע <b>ללא כל התערבות</b>."},

{id:268,topic:5,difficulty:"בינונית",
text:"במחקר על סדנת ניהול זמן, הנבדקים מילאו שאלון זהה לפני ואחרי הסדנה. בפעם השנייה הם מילאו את השאלון מהר יותר ובדיוק רב יותר. מלבד השפעת הסדנה, מה עוד יכול להסביר את השיפור?",
options:["הבשלה","היסטוריה","בדיקה חוזרת","סלקציה"],
correct:2,
explanation:"<b>בדיקה חוזרת (testing)</b> מהווה הסבר חלופי. <b>היכרות קודמת עם השאלון</b> מאפשרת לנבדקים למלא אותו ביעילות רבה יותר בפעם השנייה. הם כבר מכירים את המבנה, סוג השאלות והפורמט, מה שמשפר ביצועים ללא קשר לתוכן הסדנה."},

{id:269,topic:5,difficulty:"קשה",
text:"חוקר ערך מחקר על השפעת מוזיקה על ריכוז. הוא שמר על שאלוני הנייר במקום לח, ולאחר חודשיים חלק מהתשובות היו בלתי קריאות. עוזר המחקר פירש את התשובות הללו באופן שונה מהחוקר המקורי. מהו האיום?",
options:["נשירה","היסטוריה","מכשור","בדיקה חוזרת"],
correct:2,
explanation:"<b>מכשור (instrumentation)</b> כולל לא רק שינוי בכלי המדידה עצמו, אלא גם <b>שינוי באופן שבו נתונים מתועדים, נשמרים או מפורשים</b>. הידרדרות פיזית של השאלונים ופרשנות שונה של תשובות בלתי קריאות מהווים שינוי בתהליך המדידה."},

{id:270,topic:5,difficulty:"קלה",
text:"במחקר על תוכנית למניעת בריונות, בית ספר A (תנאי ניסוי) הוא בית ספר פרטי קטן, ובית ספר B (תנאי ביקורת) הוא בית ספר ציבורי גדול. מהו האיום העיקרי?",
options:["היסטוריה מקומית","דיפוזיה","סלקציה","בדיקה חוזרת"],
correct:2,
explanation:"<b>סלקציה (selection)</b> היא האיום המרכזי כאשר <b>הקבוצות שונות מלכתחילה במאפיינים רלוונטיים</b>. הבדלים בגודל, סוג (פרטי/ציבורי) ומאפייני התלמידים בין בתי הספר מקשים על ייחוס כל הבדל בתוצאות לתוכנית ההתערבות."},

{id:271,topic:5,difficulty:"בינונית",
text:"במחקר על טיפול בהפרעת קשב, 35% מהילדים בקבוצת הפלצבו עזבו כי הוריהם רצו שיקבלו טיפול 'אמיתי', לעומת 5% בקבוצת הניסוי. מהו האיום המרכזי?",
options:["דמורליזציה","רגרסיה לממוצע","נשירה דיפרנציאלית","יריבות מפצה"],
correct:2,
explanation:"<b>נשירה דיפרנציאלית (differential attrition)</b> מתרחשת כאשר <b>שיעור הנשירה שונה בין הקבוצות</b>. כאשר 35% עוזבים מקבוצת הביקורת לעומת 5% מקבוצת הניסוי, הרכב הקבוצות משתנה באופן שיטתי, מה שפוגע בתוקף הפנימי."},

{id:272,topic:5,difficulty:"קשה",
text:"במחקר על אפליקציית מדיטציה, המשתתפים מילאו שאלון מקוון. חוקרת הבחינה שמשתתפים מקבוצת הניסוי שהו זמן רב יותר על שאלות הרווחה הנפשית. היא חשדה שהם מנסים 'לרצות' את החוקרת על ידי דיווח על שיפור. מהו שילוב האיומים?",
options:["הותורן ורצייה חברתית","מאפייני ביקוש ורצייה חברתית","הטיית נסיין ודיפוזיה","בדיקה חוזרת והבשלה"],
correct:1,
explanation:"מדובר בשילוב של <b>מאפייני ביקוש ורצייה חברתית</b>. הנבדקים <b>זיהו את מטרת המחקר</b> (מאפייני ביקוש) ו<b>דיווחו באופן חיובי יותר ממצבם האמיתי</b> (רצייה חברתית). שני האיומים יחד יוצרים הטיה שיטתית בכיוון אישור ההשערה."},

{id:273,topic:5,difficulty:"בינונית",
text:"חוקר ערך מחקר על תרופה חדשה לשינה. הוא ידע מי בקבוצת הניסוי ונטה לשאול אותם 'ישנת הרבה יותר טוב, נכון?' בעוד שלקבוצת הביקורת שאל 'איך ישנת?'. מהם שני האיומים?",
options:["הטיית הנסיין ומאפייני ביקוש","אפקט הותורן ודמורליזציה","רצייה חברתית ודיפוזיה","מכשור ובדיקה חוזרת"],
correct:0,
explanation:"מדובר ב<b>הטיית הנסיין</b> – החוקר מנסח שאלות מנחות בהתאם לציפיותיו, וב<b>מאפייני ביקוש</b> – השאלות המנחות מרמזות לנבדקים על התשובה הרצויה. <b>ניסוח שונה של שאלות</b> לפי קבוצה הוא דוגמה קלאסית להטיית נסיין."},

{id:274,topic:5,difficulty:"קשה",
text:"במחקר על יעילות פלצבו, חוקרת מצאה שכאשר כדורי הפלצבו היו גדולים ובצבע אדום, הנבדקים דיווחו על הקלה רבה יותר בכאב מאשר עם כדורים קטנים ולבנים. מדוע ממצא זה רלוונטי לתכנון מחקרים?",
options:["כי זה מדגים שגודל המדגם חשוב","כי מאפייני הפלצבו משפיעים על עוצמת אפקט הפלצבו ויש להשוות פלצבו","כי זה מראה שאפקט הותורן חזק יותר מפלצבו","כי רגרסיה לממוצע תלויה בכלי המדידה"],
correct:1,
explanation:"ממצא זה מדגים ש<b>אפקט הפלצבו אינו אחיד</b> ותלוי במאפיינים פיזיים של הפלצבו. במחקרים, <b>יש להקפיד שכדורי הפלצבו יהיו זהים לתרופה האמיתית</b> במראה, גודל, טעם וצבע, כדי שההשוואה תהיה הוגנת ותבודד את ההשפעה הפרמקולוגית בלבד."},

{id:275,topic:6,difficulty:"קלה",
text:"חוקרת רצתה לבדוק האם שיטת הוראה חדשה משפרת ציונים. היא שיבצה באופן אקראי 60 תלמידים ל-2 קבוצות, העבירה את ההתערבות, ומדדה ציונים. מהו סוג המערך?",
options:["מערך קדם-ניסויי","מערך ניסויי אמיתי","מערך כמעט-ניסויי","מערך תצפיתי"],
correct:1,
explanation:"זהו <b>מערך ניסויי אמיתי (true experimental design)</b> כי הוא כולל את שני התנאים ההכרחיים: <b>שיבוץ אקראי</b> של משתתפים לקבוצות ו<b>מניפולציה של המשתנה הבלתי תלוי</b>. אלו המאפיינים שמאפשרים הסקת סיבתיות."},

{id:276,topic:6,difficulty:"בינונית",
text:"חוקר רצה להשוות בין שתי שיטות ניהול כיתה. הוא לא יכול היה לשבץ תלמידים באקראי, אז השתמש בשתי כיתות קיימות – אחת לכל שיטה. מהו סוג המערך?",
options:["ניסויי אמיתי","קדם-ניסויי","כמעט-ניסויי","מתאמי"],
correct:2,
explanation:"זהו <b>מערך כמעט-ניסויי (quasi-experimental)</b> כי יש מניפולציה של המשתנה הבלתי תלוי (שיטת ניהול), אבל <b>אין שיבוץ אקראי</b> – נעשה שימוש בקבוצות טבעיות קיימות. מערך זה חלש יותר מניסויי אמיתי בהסקת סיבתיות."},

{id:277,topic:6,difficulty:"קלה",
text:"סטודנטית ערכה מחקר שבו קבוצת תלמידים אחת עברה סדנה לניהול לחץ ונמדדה לאחריה. לא היו קבוצת ביקורת או מדידה מקדימה. מהו המערך?",
options:["מחקר מקרה חד-פעמי","מערך ניסויי אמיתי","מערך קבוצה אחת עם מבחן מקדים","מערך שלמה"],
correct:0,
explanation:"זהו <b>מחקר מקרה חד-פעמי (one-shot case study)</b>, מערך קדם-ניסויי חלש ביותר. <b>ללא קבוצת ביקורת וללא מדידת קו בסיס</b>, אין אפשרות לדעת אם השינוי נובע מההתערבות או מגורמים אחרים. זהו המערך החלש ביותר להסקת סיבתיות."},

{id:278,topic:6,difficulty:"בינונית",
text:"חוקר מדד חרדה של סטודנטים לפני קורס הרפיה ואחריו, אך ללא קבוצת ביקורת. מהו המערך, ומהם האיומים העיקריים?",
options:["מערך קבוצה אחת עם מבחן מקדים ומבחן סופי – איומים: הבשלה, בדיקה, היסטוריה","מחקר מקרה חד-פעמי – איומים: סלקציה","מערך כמעט-ניסויי – איומים: נשירה","מערך ניסויי אמיתי – ללא איומים"],
correct:0,
explanation:"זהו <b>מערך קבוצה אחת עם מבחן מקדים ומבחן סופי (one-group pretest-posttest)</b>. מערך קדם-ניסויי זה פגיע במיוחד ל<b>היסטוריה</b> (אירועים חיצוניים), <b>הבשלה</b> (שינויים טבעיים), ו<b>בדיקה חוזרת</b> (השפעת המדידה הראשונה), כי אין קבוצת ביקורת להשוואה."},

{id:279,topic:6,difficulty:"קשה",
text:"חוקרת חילקה 120 משתתפים באקראי ל-4 קבוצות: (1) מבחן מקדים + התערבות + מבחן סופי, (2) מבחן מקדים + ללא התערבות + מבחן סופי, (3) התערבות + מבחן סופי בלבד, (4) מבחן סופי בלבד. מהו המערך?",
options:["מערך ניסויי פשוט","מערך כמעט-ניסויי","מערך ארבע הקבוצות של שלמה","מערך מעורב"],
correct:2,
explanation:"זהו <b>מערך ארבע הקבוצות של שלמה (Solomon four-group design)</b>. מערך זה משלב את היתרונות של מערך עם מבחן מקדים ומערך בלעדיו. <b>הוא מאפשר לבדוק את השפעת ההתערבות, את אפקט הבדיקה החוזרת, ואת האינטראקציה ביניהם</b>. זהו מערך חזק במיוחד אך דורש מדגם גדול."},

{id:280,topic:6,difficulty:"קלה",
text:"במחקר על זיכרון, כל משתתף ביצע את כל שלוש המשימות: קריאה שקטה, קריאה בקול, והקלטה. מהו סוג המערך?",
options:["בין-נבדקים","תוך-נבדקים","מעורב","כמעט-ניסויי"],
correct:1,
explanation:"זהו <b>מערך תוך-נבדקים (within-subjects)</b>, הנקרא גם <b>מדידות חוזרות (repeated measures)</b>. כל משתתף נחשף לכל תנאי הניסוי, כך ש<b>כל אדם משמש כביקורת של עצמו</b>. יתרון: מפחית שונות בין-אישית. חיסרון: אפקטים של סדר ועייפות."},

{id:281,topic:6,difficulty:"בינונית",
text:"במחקר על טעם, 30 נבדקים טעמו 3 סוגי שוקולד. כדי למנוע השפעת סדר, כל שישיית נבדקים קיבלה סדר שונה של הטעימות. מהי הטכניקה?",
options:["שיבוץ אקראי","איזון נגדי","הקצאה אקראית","עיוורון כפול"],
correct:1,
explanation:"<b>איזון נגדי (counterbalancing)</b> הוא טכניקה שבה <b>סדר הצגת התנאים משתנה בין משתתפים</b> כדי לנטרל אפקטים של סדר, עייפות או תרגול. כאשר כל סדר אפשרי מיוצג, זהו <b>איזון נגדי מלא</b>. עם 3 תנאים יש 6 סדרים אפשריים (1!=6)."},

{id:282,topic:6,difficulty:"בינונית",
text:"חוקרת שיבצה 200 סטודנטים באקראי לקבוצות ניסוי וביקורת. בנפרד, היא דגמה מדגם מייצג של 1,000 סטודנטים לסקר. מה ההבדל בין שני ההליכים?",
options:["אין הבדל – שניהם דגימה אקראית","הראשון הוא שיבוץ אקראי והשני דגימה אקראית","הראשון הוא דגימה אקראית והשני שיבוץ אקראי","שניהם שיבוץ אקראי"],
correct:1,
explanation:"<b>שיבוץ אקראי (random assignment)</b> מחלק משתתפים קיימים לקבוצות ניסוי – מטרתו <b>תוקף פנימי</b>. <b>דגימה אקראית (random sampling)</b> בוחרת משתתפים מתוך אוכלוסייה – מטרתה <b>תוקף חיצוני (הכללה)</b>. שני ההליכים שונים ומשרתים מטרות שונות."},

{id:283,topic:6,difficulty:"קלה",
text:"במחקר על תרופה חדשה, קבוצה אחת קיבלה תרופה, קבוצה שנייה קיבלה כדור סוכר ללא חומר פעיל, וקבוצה שלישית לא קיבלה כלום. מהם סוגי קבוצות הביקורת?",
options:["פלצבו והשוואה","פלצבו וריקה","ריקה והשוואה","שתי קבוצות פלצבו"],
correct:1,
explanation:"<b>קבוצת פלצבו</b> מקבלת טיפול דומה למראית עין (כדור סוכר) אך <b>ללא המרכיב הפעיל</b>, ומאפשרת לבודד את אפקט הפלצבו. <b>קבוצה ריקה</b> אינה מקבלת שום טיפול, ומאפשרת לראות את המצב הטבעי ללא כל התערבות."},

{id:284,topic:6,difficulty:"בינונית",
text:"חוקר רצה להשוות טיפול CBT לטיפול פסיכודינמי. קבוצה אחת קיבלה CBT וקבוצה שנייה קיבלה טיפול פסיכודינמי. מהו סוג קבוצת ההשוואה?",
options:["קבוצת ביקורת ריקה","קבוצת פלצבו","קבוצת השוואה פעילה","קבוצת רשימת המתנה"],
correct:2,
explanation:"<b>קבוצת השוואה פעילה (active comparison group)</b> מקבלת <b>טיפול חלופי אמיתי</b> במקום אי-טיפול או פלצבו. מערך זה מאפשר להשוות את היעילות היחסית של שני טיפולים. זה שונה מקבוצת ביקורת ריקה או פלצבו כי שתי הקבוצות מקבלות טיפול פעיל."},

{id:285,topic:6,difficulty:"קשה",
text:"במחקר על השפעת מוזיקה ותאורה על מצב רוח, נבדקים שובצו באקראי לתנאי מוזיקה (שקטה/רועשת) ובנוסף כל נבדק חווה את שני תנאי התאורה (חלשה/חזקה). מהו סוג המערך?",
options:["תוך-נבדקים מלא","בין-נבדקים מלא","מערך מעורב","מערך שלמה"],
correct:2,
explanation:"זהו <b>מערך מעורב (mixed design)</b> המשלב <b>משתנה בין-נבדקים</b> (מוזיקה – כל נבדק רק בתנאי אחד) עם <b>משתנה תוך-נבדקים</b> (תאורה – כל נבדק חווה את שני התנאים). מערך זה מאפשר לבחון אינטראקציות בין המשתנים תוך ניצול יתרונות שני סוגי המערכים."},

{id:286,topic:6,difficulty:"בינונית",
text:"חוקרת עקבה אחר 500 ילדים מגיל 5 עד גיל 18 ומדדה את התפתחות השפה שלהם מדי שנתיים. מהו סוג המערך?",
options:["חתך-רוחב","אורכי","מקרה בודד","ניסויי"],
correct:1,
explanation:"זהו <b>מערך אורכי (longitudinal design)</b> שבו <b>אותם משתתפים נמדדים שוב ושוב לאורך זמן</b>. יתרונו העיקרי הוא היכולת לעקוב אחר שינויים התפתחותיים בתוך אותם אנשים. חסרונותיו כוללים נשירה, עלות גבוהה ומשך זמן ארוך."},

{id:287,topic:6,difficulty:"קלה",
text:"חוקר בדק הבדלים בשביעות רצון מהעבודה בין עובדים בני 25, 35, 45 ו-55, כאשר כולם נבדקו באותו זמן. מהו סוג המערך?",
options:["אורכי","חתך-רוחב","קוהורט","מקרה בודד"],
correct:1,
explanation:"זהו <b>מערך חתך-רוחב (cross-sectional design)</b> שבו <b>קבוצות גיל שונות נמדדות בנקודת זמן אחת</b>. היתרון הוא מהירות ועלות נמוכה. החיסרון העיקרי הוא <b>אפקט הקוהורט</b> – הבדלים בין הקבוצות עשויים לנבוע מחוויות דוריות שונות ולא מגיל."},

{id:288,topic:6,difficulty:"קשה",
text:"חוקרת ביצעה מחקר שבו עקבה אחר שלוש קבוצות: ילידי 1990, ילידי 2000 וילידי 2010, ומדדה כל קבוצה בגיל 10, 15 ו-20. מהו סוג המערך?",
options:["חתך-רוחב","אורכי פשוט","מערך רצף קוהורטות","מערך מעורב"],
correct:2,
explanation:"זהו <b>מערך רצף קוהורטות (cohort-sequential design)</b> המשלב מחקר אורכי וחתך-רוחב. <b>מעקב אחר מספר קוהורטות (דורות) לאורך זמן</b> מאפשר להפריד בין אפקטי גיל, קוהורט ותקופה. זהו מערך חזק אך מורכב ויקר לביצוע."},

{id:289,topic:6,difficulty:"בינונית",
text:"פסיכולוגית קלינית תיעדה בפירוט את תהליך הטיפול במטופל אחד עם פוביה נדירה לאורך שנתיים, כולל ראיונות, מבחנים ותצפיות. מהו סוג המחקר?",
